<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

<title>AlumCalc Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f4f6fb;color:#1e2840;font-family:'Segoe UI',system-ui,sans-serif}
input,select,textarea{font-family:inherit;outline:none;background:#fff;border:1px solid #dde2ee;border-radius:6px;color:#1e2840;padding:7px 10px;font-size:13px;width:100%}
input:focus,select:focus{border-color:#2563eb;box-shadow:0 0 0 3px #dbeafe}
table{border-collapse:collapse;width:100%}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#c8d0e0;border-radius:4px}
.ntab{padding:9px 13px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:transparent;border-bottom:3px solid transparent;color:rgba(255,255,255,0.7);transition:.15s;white-space:nowrap}
.ntab.on{color:#fff;border-bottom-color:#fff}
.ntab:hover{color:#fff}
.pill{padding:5px 11px;border-radius:6px;border:1px solid;cursor:pointer;font-size:11px;font-weight:700;white-space:nowrap;transition:.15s}
.card{background:#fff;border:1px solid #e4e8f0;border-radius:10px;padding:14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.lbl{font-size:11px;color:#6b7a99;font-weight:600;display:block;margin-bottom:3px;margin-top:8px}
.th{padding:7px 8px;font-size:11px;font-weight:700;color:#2563eb;background:#eff6ff;border-bottom:1px solid #dde8ff;text-align:left;white-space:nowrap}
.thr{padding:7px 8px;font-size:11px;font-weight:700;color:#2563eb;background:#eff6ff;border-bottom:1px solid #dde8ff;text-align:right;white-space:nowrap}
.td{padding:6px 8px;font-size:12px;border-bottom:1px solid #f0f2f8}
.tdr{padding:6px 8px;font-size:12px;border-bottom:1px solid #f0f2f8;text-align:right}
.g2{display:grid;grid-template-columns:320px 1fr;gap:14px}
.g2s{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:700px){.g2{grid-template-columns:1fr}.g2s{grid-template-columns:1fr}.g3{grid-template-columns:1fr}.hidemob{display:none}}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .2s ease}
.tblwrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
input[type=range]{padding:0;touch-action:pan-x;cursor:pointer;accent-color:#2563eb}
button:active{opacity:.85}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;color:#6b7a99"><div style="font-size:36px">🪟</div><div>Loading AlumCalc Pro...</div></div></div>
<script type="text/babel">
const {useState,useMemo,useEffect,useRef}=React;

// ─── STORAGE ────────────────────────────────────────────────────────────────
const SK="acp_v2";
function load(k,d){try{const s=JSON.parse(localStorage.getItem(SK)||"{}");return s[k]??d;}catch{return d;}}
function save(k,v){try{const s=JSON.parse(localStorage.getItem(SK)||"{}");s[k]=v;localStorage.setItem(SK,JSON.stringify(s));}catch{}}
function useSaved(k,d){
  const [v,sv]=useState(()=>load(k,d));
  function set(x){const n=typeof x==="function"?x(v):x;sv(n);save(k,n);}
  return [v,set];
}
const HK="acp_hist_v2";
function loadHist(){try{return JSON.parse(localStorage.getItem(HK)||"[]");}catch{return[];}}
function saveHist(h){try{localStorage.setItem(HK,JSON.stringify(h));}catch{}}
const uid=()=>Math.random().toString(36).slice(2,9);

// ─── DATA ────────────────────────────────────────────────────────────────────
const SERIES={
  "29slim":{id:"29slim",label:"29mm Slim",color:"#2563eb",wt:{t2:1.317,t3:1.943,sH:.942,sW:.942,cap:1.17,kpa:1.063,slim:.547,cc:.532},hasCap:true,hasKPA:true,types:["2T2S","3T3S","2T4SCO","3T6SCO","3T2S1N","3T4S2N"]},
  "25mm":{id:"25mm",label:"25mm Prestige",color:"#7c3aed",wt:{t2:1.01,t3:1.238,sH:.741,sW:.741,cap:.18,kpa:.975,slim:.461,csW:.741},hasCap:true,hasKPA:true,types:["2T2S","3T3S"]},
  "27mm":{id:"27mm",label:"27mm",color:"#059669",wt:{t2:.725,t3:1.172,sH:.716,sW:.716,interlock:.309},hasCap:false,hasKPA:false,types:["2T2S","3T3S","3T2S1N"]},
  "35mm":{id:"35mm",label:"35mm",color:"#d97706",wt:{t2:1.996,t3:2.809,sH:1.326,sW:1.326,kpa:1.063,slim:.481,csW:1.326},hasCap:false,hasKPA:true,types:["2T2S","3T3S"]},
  "37mm":{id:"37mm",label:"37mm",color:"#dc2626",wt:{t2:1.84,t3:2.678,sH:1.364,sW:1.364,kpa:1.063,slim:.689,csW:1.364},hasCap:false,hasKPA:true,types:["2T2S","3T3S"]},
};
const TYPES=[
  {id:"2T2S",  label:"2T-2S",  full:"2 Track 2 Shutter",        tr:2,sh:2,net:false,co:false},
  {id:"3T3S",  label:"3T-3S",  full:"3 Track 3 Shutter",        tr:3,sh:3,net:false,co:false},
  {id:"2T4SCO",label:"2T-4SCO",full:"2 Track 4 Shutter Centre",tr:2,sh:4,net:false,co:true},
  {id:"3T6SCO",label:"3T-6SCO",full:"3 Track 6 Shutter Centre",tr:3,sh:6,net:false,co:true},
  {id:"3T2S1N",label:"3T-2S+N",full:"3 Track 2 Shutter + Net",  tr:3,sh:2,net:true, co:false,nc:1},
  {id:"3T4S2N",label:"3T-4S+2N",full:"3 Track 4 Shutter + 2Net",tr:3,sh:4,net:true, co:false,nc:2},
];
const COLORS=[
  {id:"white", label:"White",      hex:"#F0F0EB",add:12},
  {id:"black", label:"Black",      hex:"#2a2a2a",add:15},
  {id:"grey",  label:"Grey",       hex:"#8a8a8a",add:12},
  {id:"custom",label:"Custom RAL", hex:"#c084fc",add:25},
];
const DR={al:350,wst:.10,g5:55,net:35,ep:10,lb2:60,lb3:65,tr:100,pc:0,
  b2:80,b3:110,cl:90,cl3:210,mp:300,nh:45,tn:25,pr:23,crd:45,
  alp:5,wp:1,wd:7,fn:4,ws:3,bs:35,st:33,ad:45,si:185,kp:25,sl:3,ic:4.5};

const mf=m=>m/304.8;
const sf=(w,h)=>(w/304.8)*(h/304.8);
const fm=n=>"₹"+Math.round(n).toLocaleString("en-IN");
const fn=(n,d=0)=>typeof n==="number"?n.toFixed(d):"-";

// ─── CALC ENGINE ─────────────────────────────────────────────────────────────
function doCalc(W,H,type,series,rates,lock,cid){
  const w=+W,h=+H;
  if(!w||!h||w<200||h<200)return null;
  const wt=series.wt,isKPA=series.hasKPA&&h>1800;
  const {tr,sh:SH,co,net:hn,nc=0}=type;
  const secs=[];
  const add=(n,sz,q,wg)=>{const kg=(sz/1000)*q*wg;secs.push({n,sz,q,mtr:(sz/1000)*q,wt:wg,kg,amt:kg*rates.al});};
  const tw=tr===2?wt.t2:wt.t3;
  add(tr+" Track W",w,2,tw);add(tr+" Track H",h,2,tw);
  let sw;
  if(!co){
    if(tr===2){sw=(w-107)/2;add("Shutter Bot",sw,4,wt.sW);add("Shutter H",h-85,SH,wt.sH);}
    else{sw=(w-106)/3;add("Shutter Bot",sw,4,wt.sW);add("Shutter H",h-85,2,wt.sH);add("Centre Shut",sw-23,2,wt.csW||wt.sW);}
  }else{sw=(w-136)/4;add("Shutter Bot",sw,8,wt.sW);if(tr===3)add("Centre Shut",sw-22,4,wt.csW||wt.sW);add("Shutter H",h-85,4,wt.sH);}
  if(series.hasCap)add("Track Cap",w-101,tr,wt.cap);
  let ik=co?(tr===2?2:4):(tr===2?1:2),is2=ik;
  if(!isKPA||!series.hasKPA)ik=0;
  if(series.id==="27mm"){add("Interlock",h-85,is2,wt.interlock);}
  else{if(ik>0)add("Interlock KPA",h-85,ik,wt.kpa);add("Interlock Slim",h-85,is2,wt.slim);if(co)add("Centre Clip",h-85,1,.532);}
  if(hn){add("Mesh H",h-85,nc,.982);add("Mesh W",sw||(w-107)/2,nc*2,.982);add("Mesh IL",h-85,nc,.505);add("Mesh Clip",h-103,nc*4,.144);}
  const twt=secs.reduce((s,x)=>s+x.kg,0),wst=twt*rates.wst,alAmt=(twt+wst)*rates.al;
  const glass=[];
  const gsw=co?sw-37:(tr===2?(w-107)/2:(w-106)/3)-37,gsh=h-85-103;
  glass.push({n:"5mm Clear Glass",sw:gsw,sh:gsh,q:co?4:2});
  if(tr===3&&!co)glass.push({n:"5mm Clear (Centre)",sw:(w-106)/3-23+27,sh:gsh,q:1});
  if(co&&tr===3)glass.push({n:"5mm Clear (Centre)",sw:sw-22+27,sh:gsh,q:2});
  if(hn)glass.push({n:"Mosquito Net SS304",sw:(w/SH)*nc,sh:h,q:nc,isNet:true});
  glass.forEach(g=>{g.sqe=sf(g.sw,g.sh);g.tsq=g.sqe*g.q;g.amt=g.tsq*(g.isNet?rates.net:rates.g5);});
  const glAmt=glass.reduce((s,g)=>s+g.amt,0);
  const hw=[];const tSq=sf(w,h);
  hw.push({n:"Bearing",q:SH*2,r:tr===3?rates.b3:rates.b2});
  hw.push({n:"Lock",q:Math.ceil(SH/2),r:tr===3?rates.cl3:rates.cl,note:"OPT"});
  hw.push({n:"Wool Pile W",q:+(mf(w)*(tr===2?3:SH)).toFixed(2),r:rates.wp,u:"rft"});
  hw.push({n:"Wool Pile H",q:+(mf(h)*(tr===2?3:SH)).toFixed(2),r:rates.wp,u:"rft"});
  hw.push({n:"Drain Cap",q:tr===2?3:4,r:rates.wd});
  hw.push({n:"Fastener",q:SH*3,r:rates.fn});hw.push({n:"Wall Screw",q:SH*3,r:rates.ws});
  hw.push({n:"Bump Stop",q:Math.ceil(SH/2),r:rates.bs});hw.push({n:"Sticker",q:SH*2,r:rates.st});
  hw.push({n:"Anti Dust",q:Math.ceil(SH/2),r:rates.ad});hw.push({n:"Silicon",q:1,r:rates.si});
  if(isKPA&&series.hasKPA)hw.push({n:"KPA Cover",q:ik*2,r:rates.kp});
  hw.push({n:"Silicon Labour",q:+tSq.toFixed(2),r:rates.sl,u:"sqft"});
  hw.push({n:"Interlock Cap",q:(ik+is2)*2,r:rates.ic});
  if(hn)hw.push({n:"Anti Lift",q:4,r:rates.alp});
  const lockAmt=lock==="mp"?rates.mp*Math.ceil(SH/2)+(SH<=2?3:SH*1.5)*(rates.nh+rates.tn)+Math.ceil(h/1000)*rates.pr+Math.ceil(SH/2)*rates.crd:0;
  const hwAmt=hw.reduce((s,x)=>s+(+x.q)*x.r,0)+lockAmt;
  const epW=mf(w)*SH,epH=mf(h)*SH,epT=(mf(w)+mf(h))*tr;
  let totEp=epW+epH+epT;if(hn)totEp+=mf(w/SH*nc+h)*nc;
  const epAmt=totEp*rates.ep;
  const lbR=tr===2?rates.lb2:rates.lb3,lbAmt=tSq*lbR;
  const color=COLORS.find(c=>c.id===cid)||COLORS[0];
  const pcAmt=((rates.pc||0)+color.add)*tSq;
  const unitTotal=alAmt+glAmt+hwAmt+epAmt+lbAmt+rates.tr+pcAmt;
  return{w,h,type,series,tSq,secs,twt,wst,alAmt,glass,glAmt,hw,hwAmt,lockAmt,lock,epW,epH,epT,totEp,epAmt,lbR,lbAmt,pcAmt,color,transport:rates.tr,unitTotal,sqR:unitTotal/tSq,isKPA,ik,is2,sw};
}

// ─── WINDOW DIAGRAM ───────────────────────────────────────────────────────────
function WinDiag({type,colorHex,W,H,seriesColor,sm}){
  const PW=sm?170:290,PH=sm?120:190,FR=sm?8:11,pd=7;
  const iW=PW-pd*2,iH=PH-pd*2;
  const {tr,sh,co,net:hn,nc=0}=type;
  const fc=colorHex||"#ccc";
  const gc="#b8d8f4",nc2="#5aba8a";
  const dim=W&&H?W+"×"+H+" mm":"";
  const fs=sm?7:10;
  const TK=FR*0.5;
  const IX=pd+FR,IY=pd+FR+TK,IW2=iW-FR*2,IH2=iH-FR*2-TK*2;

  // Shutter width — each shutter takes equal share of full width
  const shW=IW2/sh;
  // For net types: net panel parks on RIGHT half, overlapping last shutter (correct — different tracks)
  const netW=hn?IW2*0.5/nc:0;

  const arrow=i=>co?i<sh/2?"←":"→":i%2===0?"←":"→";

  return (
    React.createElement("svg",{viewBox:"0 0 "+PW+" "+(PH+18),style:{width:"100%",display:"block",margin:"0 auto"}},
      React.createElement("rect",{x:0,y:0,width:PW,height:PH+18,fill:"#eef2f8",rx:5}),
      // Outer frame
      React.createElement("rect",{x:pd,y:pd,width:iW,height:iH,fill:fc,stroke:"#888",strokeWidth:2,rx:2}),
      // Top track
      React.createElement("rect",{x:IX,y:pd+FR,width:IW2,height:TK,fill:"rgba(0,0,0,0.28)",rx:1}),
      // Bottom track
      React.createElement("rect",{x:IX,y:IY+IH2,width:IW2,height:TK,fill:"rgba(0,0,0,0.22)",rx:1}),

      // Glass shutters
      ...Array.from({length:sh},(_,i)=>{
        const SX=IX+i*shW;
        const GX=SX+2,GY=IY+2,GW=shW-4,GH=IH2-4;
        const isHandle=co?(i===Math.floor(sh/2)-1):(i===sh-1);
        return React.createElement("g",{key:"s"+i},
          React.createElement("rect",{x:SX,y:IY,width:shW,height:IH2,fill:i%2===0?fc:fc+"dd",stroke:"#999",strokeWidth:0.8,rx:0.5}),
          React.createElement("rect",{x:GX,y:GY,width:GW,height:GH,fill:gc,fillOpacity:0.45,stroke:"#80b0d0",strokeWidth:0.5,rx:0.5}),
          React.createElement("rect",{x:GX+1,y:GY+1,width:GW*0.4,height:GH*0.3,fill:"white",fillOpacity:0.22,rx:0.5}),
          React.createElement("text",{x:GX+GW/2,y:GY+GH/2+4,textAnchor:"middle",fill:"#2060a0",fontSize:fs,opacity:0.65},arrow(i)),
          React.createElement("circle",{cx:SX+4,cy:IY+IH2-2,r:sm?1.5:2.2,fill:"#555"}),
          React.createElement("circle",{cx:SX+shW-4,cy:IY+IH2-2,r:sm?1.5:2.2,fill:"#555"}),
          i<sh-1?React.createElement("rect",{x:SX+shW-2,y:IY,width:4,height:IH2,fill:"#aaa",rx:0.5}):null,
          isHandle?React.createElement("rect",{x:SX+shW-FR*0.4,y:GY+GH*0.37,width:FR*0.38,height:GH*0.26,rx:FR*0.18,fill:"#888",stroke:"#666",strokeWidth:0.4}):null
        );
      }),

      // CO centre divider
      co?React.createElement("rect",{x:IX+IW2/2-FR*0.55,y:pd+FR,width:FR*1.1,height:iH-FR*2,fill:fc,stroke:"#888",strokeWidth:0.4,rx:0.5}):null,

      // NET PANELS — park on right side (track 3, front track)
      // Visually overlaps last glass shutter — correct because different tracks in depth
      ...Array.from({length:nc},(_,ni)=>{
        const NPX=IX+IW2-netW*(nc-ni);
        const NGX=NPX+2,NGY=IY+2,NGW=netW-4,NGH=IH2-4;
        const rows=Math.max(4,Math.floor(NGH/6));
        const cols=Math.max(2,Math.floor(NGW/6));
        return React.createElement("g",{key:"n"+ni},
          React.createElement("rect",{x:NPX,y:IY,width:netW,height:IH2,fill:"#0a2016",stroke:"#3a8050",strokeWidth:1.2,rx:0.5}),
          ...Array.from({length:rows+1},(_,r)=>React.createElement("line",{key:"r"+r,x1:NGX,y1:NGY+r*(NGH/rows),x2:NGX+NGW,y2:NGY+r*(NGH/rows),stroke:nc2,strokeWidth:0.55,opacity:0.6})),
          ...Array.from({length:cols+1},(_,c)=>React.createElement("line",{key:"c"+c,x1:NGX+c*(NGW/cols),y1:NGY,x2:NGX+c*(NGW/cols),y2:NGY+NGH,stroke:nc2,strokeWidth:0.55,opacity:0.45})),
          React.createElement("rect",{x:NGX,y:NGY,width:NGW,height:NGH,fill:"none",stroke:nc2,strokeWidth:0.9,rx:0.5}),
          React.createElement("text",{x:NGX+NGW/2,y:NGY+NGH/2+3,textAnchor:"middle",fill:nc2,fontSize:sm?6:9,fontWeight:"500"},"NET"),
          React.createElement("circle",{cx:NPX+4,cy:IY+IH2-2,r:sm?1.5:2,fill:"#2a6a3a"}),
          React.createElement("circle",{cx:NPX+netW-4,cy:IY+IH2-2,r:sm?1.5:2,fill:"#2a6a3a"})
        );
      }),

      // Track count dots
      ...Array.from({length:tr},(_,t)=>React.createElement("circle",{key:"td"+t,cx:pd+3,cy:IY+IH2/2+(t-tr/2+0.5)*8,r:sm?1.5:2,fill:seriesColor||fc,opacity:0.5})),

      // Dimension label
      React.createElement("text",{x:PW/2,y:PH+13,textAnchor:"middle",fill:"#6b7a99",fontSize:sm?7:9},dim||type.label)
    )
  );
}

// ─── WHATSAPP ────────────────────────────────────────────────────────────────
function shareWA(text){window.open("https://wa.me/?text="+encodeURIComponent(text),"_blank");}
function singleMsg(res,qty,cName,pName){
  const L=[];
  L.push("🪟 *WINDOW ESTIMATE — ALUFABB FENESTRATION*");
  L.push("─────────────────────");
  if(cName)L.push("👤 Customer: *"+cName+"*");
  if(pName)L.push("📍 Project: "+pName);
  L.push("");L.push("📐 *Specifications*");
  L.push("Series: "+res.series.label);
  L.push("Type: "+res.type.full);
  L.push("Size: "+res.w+" × "+res.h+" mm");
  L.push("Colour: "+res.color.label);
  L.push("Area: "+fn(res.tSq,1)+" sq.ft"+(qty>1?" | Qty: "+qty:""));
  L.push("");L.push("💰 *Cost Breakdown*");
  L.push("Aluminium:  "+fm(res.alAmt));
  L.push("Glass:      "+fm(res.glAmt));
  L.push("Hardware:   "+fm(res.hwAmt));
  L.push("EPDM:       "+fm(res.epAmt));
  L.push("Labour:     "+fm(res.lbAmt));
  L.push("Transport:  "+fm(res.transport));
  if(res.pcAmt>0)L.push("Powder Coat:"+fm(res.pcAmt));
  L.push("─────────────────────");
  L.push("✅ *Unit Total: "+fm(res.unitTotal)+"*");
  if(qty>1)L.push("✅ *Total ("+qty+"): "+fm(res.unitTotal*qty)+"*");
  L.push("📊 Rate: "+fm(res.sqR)+"/sqft");
  L.push("");L.push("⏰ Valid 15 days | 💳 50% advance");
  return L.join("\n");
}
function multiMsg(rows,cName,pName,pRef,GT,GQ,GS){
  const valid=rows.filter(r=>r.calc);
  const L=[];
  L.push("🪟 *WINDOW QUOTATION — ALUFABB FENESTRATION*");
  L.push("─────────────────────");
  if(cName)L.push("👤 Customer: *"+cName+"*");
  if(pName)L.push("📍 Project: "+pName);
  if(pRef)L.push("🔢 Ref: "+pRef);
  L.push("📅 Date: "+new Date().toLocaleDateString("en-IN"));
  L.push("");L.push("📋 *Windows*");
  valid.forEach((row,i)=>{
    const r=row.calc,q=row.qty||1;
    L.push((i+1)+". "+(row.location||"Win "+(i+1))+" | "+r.series.label+" | "+r.w+"×"+r.h+"mm | Qty:"+q+" | *"+fm(r.unitTotal*q)+"*");
  });
  L.push("─────────────────────");
  L.push("📐 "+fn(GS,1)+" sq.ft | "+GQ+" windows");
  L.push("✅ *GRAND TOTAL: "+fm(GT)+"*");
  L.push("");L.push("⏰ Valid 15 days | 💳 50% advance");
  return L.join("\n");
}

// ─── COST CHART ──────────────────────────────────────────────────────────────
function CostChart({res}){
  const [ready,setReady]=useState(false);
  const [hov,setHov]=useState(null);
  useEffect(()=>{const t=setTimeout(()=>setReady(true),60);return()=>clearTimeout(t);},[res]);
  const items=[
    {label:"Aluminium",amt:res.alAmt,color:"#2563eb",icon:"🔩"},
    {label:"Glass",amt:res.glAmt,color:"#0ea5e9",icon:"🪟"},
    {label:"Hardware",amt:res.hwAmt,color:"#7c3aed",icon:"🔧"},
    {label:"EPDM",amt:res.epAmt,color:"#d97706",icon:"⭕"},
    {label:"Labour",amt:res.lbAmt,color:"#16a34a",icon:"👷"},
    {label:"Transport",amt:res.transport,color:"#6b7280",icon:"🚛"},
  ];
  if(res.pcAmt>0)items.push({label:"Powder Coat",amt:res.pcAmt,color:"#ec4899",icon:"🎨"});
  const total=res.unitTotal;
  return (

// ─── SERIES COMPARE ──────────────────────────────────────────────────────────
function SeriesCompare({sid,W,H,typeId,rates,lock,cid,onSelect}){
  const type=TYPES.find(t=>t.id===typeId);
  if(!type||!W||!H)return null;
  const list=Object.values(SERIES).filter(s=>s.types.includes(typeId));
  if(list.length<2)return null;
  const results=list.map(s=>({s,r:doCalc(W,H,type,s,rates,lock,cid)})).filter(x=>x.r);
  const base=results.find(x=>x.s.id===sid);
  if(!base)return null;
  return (
    <div style={{background:"#fff",border:"1px solid #e4e8f0",borderRadius:10,padding:14,boxShadow:"0 1px 4px rgba(0,0,0,.04)",marginTop:12}}>
      <div style={{fontSize:11,fontWeight:700,color:"#6b7a99",textTransform:"uppercase",letterSpacing:.8,marginBottom:10,paddingBottom:7,borderBottom:"1px solid #eef0f8"}}>📊 Series Comparison</div>
      {results.map(({s,r})=>{
        const isCur=s.id===sid;
        const diff=r.unitTotal-base.r.unitTotal;
        return (
          <div key={s.id} onClick={()=>!isCur&&onSelect(s.id)}
            style={{padding:"9px 11px",borderRadius:8,border:"2px solid",cursor:isCur?"default":"pointer",borderColor:isCur?s.color:"#e4e8f0",background:isCur?s.color+"08":"#fafbfd",marginBottom:6,transition:"all .15s"}}
            onMouseEnter={e=>{if(!isCur)e.currentTarget.style.borderColor=s.color;}}
            onMouseLeave={e=>{if(!isCur)e.currentTarget.style.borderColor="#e4e8f0";}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <div style={{width:9,height:9,borderRadius:"50%",background:s.color}}/>
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:5}}>
                    <span style={{fontSize:13,fontWeight:700,color:s.color}}>{s.label}</span>
                    {isCur&&<span style={{fontSize:9,padding:"1px 6px",background:s.color,color:"#fff",borderRadius:10,fontWeight:700}}>SELECTED</span>}
                  </div>
                  <div style={{fontSize:10,color:"#6b7a99",marginTop:1}}>
                    {s.id==="29slim"&&"Slim profile"}
                    {s.id==="25mm"&&"Economy option"}
                    {s.id==="27mm"&&"Lightweight"}
                    {s.id==="35mm"&&"Heavy duty"}
                    {s.id==="37mm"&&"Premium heavy"}
                  </div>
                </div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:14,fontWeight:800,color:isCur?s.color:"#1e2840"}}>{fm(r.unitTotal)}</div>
                {!isCur&&diff!==0&&<div style={{fontSize:10,fontWeight:700,color:diff<0?"#16a34a":"#dc2626"}}>
                  {diff<0?"▼ Save ₹"+Math.abs(Math.round(diff)):"▲ ₹"+Math.round(diff)+" more"}
                </div>}
                <div style={{fontSize:9,color:"#6b7a99"}}>{fm(r.sqR)}/sqft</div>
              </div>
            </div>
            <div style={{marginTop:7,height:4,background:"#f0f2f8",borderRadius:2,overflow:"hidden"}}>
              <div style={{height:"100%",width:Math.min(100,r.unitTotal/Math.max(...results.map(x=>x.r.unitTotal))*100)+"%",background:s.color,borderRadius:2}}/>
            </div>
            {!isCur&&<div style={{marginTop:5,fontSize:10,color:s.color,fontWeight:600}}>Click to switch →</div>}
          </div>
        );
      })}
    </div>
  );
}

              <div style={{display:"flex",gap:8,marginBottom:4}}>
                <div style={{padding:"7px 10px",background:"#f0f4ff",border:"1px solid #dde2ee",borderRadius:6,fontSize:13,color:"#6b7a99",flexShrink:0}}>🇮🇳 +91</div>
                <input type="tel" maxLength={10} value={ph} onChange={e=>setPh(e.target.value.replace(/\D/g,""))} placeholder="9876543210" onKeyDown={e=>e.key==="Enter"&&send()} style={{fontSize:16,letterSpacing:2}}/>
              </div>
              {err&&<div style={{fontSize:11,color:"#dc2626",marginBottom:4}}>{err}</div>}
              <button onClick={send} disabled={busy} style={{width:"100%",marginTop:12,padding:"12px",background:busy?"#93c5fd":"#2563eb",color:"#fff",border:"none",borderRadius:8,fontWeight:700,fontSize:14,cursor:"pointer"}}>
                {busy?"Sending...":"Send OTP →"}
              </button>
            </div>
          ):(
            <div>
              <div style={{fontSize:16,fontWeight:700,color:"#1e2840",marginBottom:4}}>Enter OTP</div>
              <div style={{fontSize:12,color:"#6b7a99",marginBottom:14}}>Sent to +91 {ph} <span style={{color:"#2563eb",cursor:"pointer"}} onClick={()=>{setStep("ph");setOtp("");setErr("");}}>Change</span></div>
              <input type="tel" maxLength={6} value={otp} onChange={e=>setOtp(e.target.value.replace(/\D/g,""))} placeholder="● ● ● ● ● ●" onKeyDown={e=>e.key==="Enter"&&verify()} style={{fontSize:22,letterSpacing:10,textAlign:"center"}}/>
              {err&&<div style={{fontSize:11,color:"#dc2626",marginTop:5}}>{err}</div>}
              <button onClick={verify} style={{width:"100%",marginTop:12,padding:"12px",background:"#16a34a",color:"#fff",border:"none",borderRadius:8,fontWeight:700,fontSize:14,cursor:"pointer"}}>Verify & Login ✓</button>
              <div style={{textAlign:"center",marginTop:10,fontSize:12,color:"#6b7a99"}}>Didn't receive? <span style={{color:"#2563eb",cursor:"pointer"}} onClick={send}>Resend</span></div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

}

function newRow(){return{id:uid(),location:"",seriesId:"29slim",typeId:"2T2S",W:"",H:"",qty:1,lock:"concealed",cid:"white",calc:null};}
function QuoteTab({rates,co,logo,lic,rows,setRows}){

  const [detail,setDetail]=useState(null);
  const [hist,setHist]=useState(loadHist);

  const calcRow=(id)=>setRows(prev=>prev.map(r=>{if(r.id!==id)return r;const s=SERIES[r.seriesId],at=TYPES.filter(t=>s.types.includes(t.id)),ty=at.find(t=>t.id===r.typeId)||at[0];return{...r,calc:doCalc(r.W,r.H,ty,s,rates,r.lock,r.cid)};}));
  const calcAll=()=>setRows(prev=>prev.map(r=>{const s=SERIES[r.seriesId],at=TYPES.filter(t=>s.types.includes(t.id)),ty=at.find(t=>t.id===r.typeId)||at[0];return{...r,calc:doCalc(r.W,r.H,ty,s,rates,r.lock,r.cid)};}));
  const totals=useMemo(()=>{const v=rows.filter(r=>r.calc);return{GT:v.reduce((s,r)=>s+r.calc.unitTotal*(r.qty||1),0),GS:v.reduce((s,r)=>s+r.calc.tSq*(r.qty||1),0),GQ:v.reduce((s,r)=>s+(r.qty||1),0),cnt:v.length};},[rows]);
  const dRow=detail?rows.find(r=>r.id===detail):null;
  function saveQuote(){const entry={id:uid(),savedAt:new Date().toLocaleString("en-IN"),cName,pName,pRef,rows:[...rows],total:totals.GT,cnt:totals.cnt};const updated=[entry,...hist].slice(0,50);setHist(updated);saveHist(updated);alert("✅ Quotation saved!");}
  function loadQuote(h){if(!confirm("Load? Current data will be replaced."))return;setCName(h.cName||"");setPName(h.pName||"");setPRef(h.pRef||"");setRows(h.rows&&h.rows.length?h.rows:[newRow()]);}
  function delQuote(id){if(!confirm("Delete?"))return;const u=hist.filter(x=>x.id!==id);setHist(u);saveHist(u);}
  const inp2={background:"#fff",border:"1px solid #dde2ee",borderRadius:6,color:"#1e2840",padding:"5px 7px",fontSize:11,boxSizing:"border-box",width:"100%"};

  return (

        </div>
        {hist.length===0&&<div style={{fontSize:12,color:"#c5cde0",textAlign:"center",padding:"10px 0"}}>No saved quotations yet</div>}
        <div style={{display:"flex",flexDirection:"column",gap:5,maxHeight:200,overflowY:"auto"}}>
          {hist.map((h,i)=>(
            <div key={h.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:i%2===0?"#f8f9fc":"#fff",borderRadius:7,border:"1px solid #eef0f8"}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:700,color:"#1e2840",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{h.cName||"Unnamed"}{h.pName?" – "+h.pName:""}</div>
                <div style={{fontSize:10,color:"#6b7a99",marginTop:1}}>{h.savedAt} • {h.cnt} win • <span style={{color:"#16a34a",fontWeight:700}}>{fm(h.total)}</span></div>
              </div>
              <button onClick={()=>loadQuote(h)} style={{padding:"3px 10px",background:"#2563eb",color:"#fff",border:"none",borderRadius:5,cursor:"pointer",fontSize:11,fontWeight:700}}>📂</button>

            </div>
          ))}
        </div>
      </div>
      <div className="card">
        <div className="g3">
          <div><label className="lbl">Customer Name</label><input value={cName} onChange={e=>setCName(e.target.value)} placeholder="Mr. Sharma"/></div>

          <div><label className="lbl">Quote Ref No.</label><input value={pRef} onChange={e=>setPRef(e.target.value)} placeholder="AF-2026-001"/></div>
        </div>

// ═══════════════════════════════════════════════════════════════════════
// LICENSE SYSTEM
// ═══════════════════════════════════════════════════════════════════════
const LIC_SECRET = "ALUFABB2026";
// ── SERIES DEFINITIONS ───────────────────────────────────────────────────────
const ALL_SERIES_IDS = ["29","25","27","35","37"];

// ── TIER DEFINITIONS ─────────────────────────────────────────────────────────
const LIC_TIERS = {
  "S": {name:"Starter", badge:"#2563eb", features:["calc","pdf","quote","compare","logo","rates"]},
  "X": {name:"Premium", badge:"#d97706", features:["calc","pdf","quote","compare","logo","rates","visual"]},
};

// ── CHECKSUM ─────────────────────────────────────────────────────────────────
function sha4(str){
  let h=0;
  for(let i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i);h=h&h;}
  return Math.abs(h).toString(16).toUpperCase().padStart(8,"0").slice(0,4);
}

// ── VERIFY LICENSE ────────────────────────────────────────────────────────────
// New format: TIER+EXPIRY-NAME4-SERIES-CHECK
// e.g. X20270101-SHRM-2935-XXXX  (29mm+35mm, Premium)
//      S20270101-PATE-A-XXXX     (all series, Starter)
function verifyLicense(code){
  try{
    code=(code||"").trim().toUpperCase().replace(/\s/g,"");
    const parts=code.split("-");
    if(parts.length!==4)return{valid:false,reason:"Invalid format. Expected: XYYYYMMDD-NAME-SERIES-CHCK"};
    const [part1,name4,seriesCode,check]=parts;
    if(part1.length!==9)return{valid:false,reason:"Invalid code length"};
    const tierKey=part1[0],expiry=part1.slice(1);
    if(!LIC_TIERS[tierKey])return{valid:false,reason:"Invalid tier"};
    // Verify checksum
    const raw=tierKey+"|"+expiry+"|"+name4+"|"+seriesCode+"|"+LIC_SECRET;
    if(sha4(raw)!==check)return{valid:false,reason:"Invalid license key — please check and re-enter"};
    // Check expiry
    const yr=+expiry.slice(0,4),mo=+expiry.slice(4,6)-1,dy=+expiry.slice(6,8);
    const expDate=new Date(yr,mo,dy);
    const today=new Date();today.setHours(0,0,0,0);
    const daysLeft=Math.floor((expDate-today)/(1000*60*60*24));
    if(daysLeft<0)return{valid:false,expired:true,
      reason:"License expired on "+expiry.slice(6)+"/"+expiry.slice(4,6)+"/"+expiry.slice(0,4)};
    // Decode allowed series
    let allowedSeries;
    if(seriesCode==="A"){
      allowedSeries=ALL_SERIES_IDS.slice();
    } else {
      allowedSeries=[];
      let s=seriesCode,i=0;
      while(i<s.length){
        const two=s.slice(i,i+2);
        if(ALL_SERIES_IDS.includes(two)){allowedSeries.push(two);i+=2;}
        else i++;
      }
      if(!allowedSeries.length)allowedSeries=ALL_SERIES_IDS.slice();
    }
    return{
      valid:true, tierKey,
      tierName:LIC_TIERS[tierKey].name,
      badge:LIC_TIERS[tierKey].badge,
      features:LIC_TIERS[tierKey].features,
      series:allowedSeries, seriesCode,
      expiry, daysLeft, name:name4
    };
  }catch(e){return{valid:false,reason:"Error: "+e.message};}
}

function hasFeature(lic,feat){return lic&&lic.valid&&(lic.features||[]).includes(feat);}
function hasSeries(lic,sid){
  if(!lic||!lic.valid)return false;
  // Map full series id to short code
  const map={"29slim":"29","25mm":"25","27mm":"27","35mm":"35","37mm":"37"};
  const code=map[sid]||sid.slice(0,2);
  return (lic.series||[]).includes(code);
}

// ── GENERATE LICENSE (run in browser console) ─────────────────────────────────
// Usage: _genLic("Sharma Fab", "X", "20270101", ["29","35"])
// Series: ["29"] or ["29","35"] or ["A"] for all
function generateLicense(fabricatorName, tierKey, expiryYYYYMMDD, seriesList){
  seriesList=seriesList||["A"];
  const name4=(fabricatorName.toUpperCase().replace(/\s/g,"")+"XXXX").slice(0,4);
  let seriesCode;
  if(!seriesList||seriesList.includes("A")||seriesList.length>=5){
    seriesCode="A";
  } else {
    seriesCode=seriesList.filter(s=>ALL_SERIES_IDS.includes(s))
      .sort((a,b)=>ALL_SERIES_IDS.indexOf(a)-ALL_SERIES_IDS.indexOf(b)).join("");
  }
  const raw=tierKey+"|"+expiryYYYYMMDD+"|"+name4+"|"+seriesCode+"|"+LIC_SECRET;
  const check=sha4(raw);
  return tierKey+expiryYYYYMMDD+"-"+name4+"-"+seriesCode+"-"+check;
}
window._genLic=generateLicense;
// Examples:
// _genLic("Sharma Fab",  "S", "20270101", ["29","35"])      → Starter, 29+35mm only
// _genLic("Patel Alum",  "X", "20270101", ["29","25","27"]) → Premium, 3 series
// _genLic("Metro Win",   "X", "20270101", ["A"])            → Premium, all series

// ═══════════════════════════════════════════════════════════════════════
// BEFORE / AFTER SLIDER COMPONENT
// ═══════════════════════════════════════════════════════════════════════
function BeforeAfter({beforeCanvas,afterCanvas,width,height}){
  const [pos,setPos]=useState(50);
  const [dragging,setDragging]=useState(false);
  const containerRef=useRef(null);
  const canvasRef=useRef(null);

  useEffect(()=>{
    if(!beforeCanvas||!afterCanvas||!canvasRef.current)return;
    const cv=canvasRef.current;
    const ctx=cv.getContext("2d");
    cv.width=width;cv.height=height;
    const splitX=Math.round(width*pos/100);
    // Draw before (left)
    ctx.drawImage(beforeCanvas,0,0,width,height);
    // Draw after (right portion)
    ctx.save();ctx.beginPath();ctx.rect(splitX,0,width-splitX,height);ctx.clip();
    ctx.drawImage(afterCanvas,0,0,width,height);
    ctx.restore();
    // Divider line
    ctx.fillStyle="rgba(255,255,255,0.95)";ctx.fillRect(splitX-1.5,0,3,height);
    // Divider handle circle
    const cy=height/2;
    ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(splitX,cy,18,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#2563eb";ctx.beginPath();ctx.arc(splitX,cy,14,0,Math.PI*2);ctx.fill();
    // Arrows in handle
    ctx.fillStyle="#fff";ctx.font="bold 11px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText("◀ ▶",splitX,cy);
    // Labels
    ctx.fillStyle="rgba(0,0,0,0.6)";ctx.fillRect(8,8,60,22);
    ctx.fillStyle="#fff";ctx.font="bold 11px sans-serif";ctx.textAlign="left";ctx.textBaseline="middle";
    ctx.fillText("BEFORE",14,19);
    ctx.fillStyle="rgba(37,99,235,0.85)";ctx.fillRect(splitX+8,8,55,22);
    ctx.fillStyle="#fff";ctx.textAlign="left";ctx.fillText("AFTER",splitX+14,19);
  },[beforeCanvas,afterCanvas,pos,width,height]);

  function getXFromEvent(e){
    const cv=canvasRef.current;if(!cv)return 50;
    const r=cv.getBoundingClientRect();
    const sc=cv.width/r.width;
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    return Math.max(5,Math.min(95,((cx-r.left)*sc/cv.width)*100));
  }

  return React.createElement("div",{ref:containerRef,style:{position:"relative",userSelect:"none",cursor:"col-resize",borderRadius:10,overflow:"hidden"}},
    React.createElement("canvas",{
      ref:canvasRef,
      style:{display:"block",maxWidth:"100%",cursor:"col-resize"},
      onMouseDown:e=>{setDragging(true);setPos(getXFromEvent(e));},
      onMouseMove:e=>{if(dragging)setPos(getXFromEvent(e));},
      onMouseUp:()=>setDragging(false),
      onMouseLeave:()=>setDragging(false),
      onTouchStart:e=>{e.preventDefault();setDragging(true);setPos(getXFromEvent(e));},
      onTouchMove:e=>{e.preventDefault();if(dragging)setPos(getXFromEvent(e));},
      onTouchEnd:()=>setDragging(false),
    })
  );
}

                <span style={{fontSize:9,padding:"1px 7px",borderRadius:10,background:lic?lic.badge:"#374151",color:"#fff",fontWeight:700}}>{lic?lic.tierName:"?"}</span>
