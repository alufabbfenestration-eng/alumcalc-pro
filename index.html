<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#666;flex-direction:column;gap:12px"><div style="font-size:32px">🪟</div><div>Loading AlumCalc Pro...</div></div></div>
<script type="text/babel">
const {useState,useMemo,useRef,useEffect}=React;

// ── STORAGE ──────────────────────────────────────────────────────────────────
const SK="acp_v2";
function load(key,def){try{const d=JSON.parse(localStorage.getItem(SK)||"{}");return d[key]??def;}catch{return def;}}
function save(key,val){try{const d=JSON.parse(localStorage.getItem(SK)||"{}");d[key]=val;localStorage.setItem(SK,JSON.stringify(d));}catch{}}
function useSaved(key,def){
  const [v,sv]=useState(()=>load(key,def));
  function set(x){const n=typeof x==="function"?x(v):x;sv(n);save(key,n);}
  return[v,set];
}
const HK="acp_hist_v2";
function loadHist(){try{return JSON.parse(localStorage.getItem(HK)||"[]");}catch{return[];}}
function saveHist(h){try{localStorage.setItem(HK,JSON.stringify(h));}catch{}}
const uid=()=>Math.random().toString(36).slice(2,9);

// ── DATA ─────────────────────────────────────────────────────────────────────
const SERIES={
  "29slim":{id:"29slim",label:"29mm Slim",color:"#2563eb",wt:{t2:1.317,t3:1.943,sH:.942,sW:.942,cap:1.17,kpa:1.063,slim:.547,cc:.532,msH:.982,msW:.982,mi:.505,mc:.144},hasCap:true,hasKPA:true,types:["2T2S","3T3S","2T4SCO","3T6SCO","3T2S1N","3T4S2N"]},
  "25mm":{id:"25mm",label:"25mm Prestige",color:"#7c3aed",wt:{t2:1.01,t3:1.238,sH:.741,sW:.741,cap:.18,kpa:.975,slim:.461,csW:.741},hasCap:true,hasKPA:true,types:["2T2S","3T3S"]},
  "27mm":{id:"27mm",label:"27mm",color:"#059669",wt:{t2:.725,t3:1.172,sH:.716,sW:.716,interlock:.309},hasCap:false,hasKPA:false,types:["2T2S","3T3S","3T2S1N"]},
  "35mm":{id:"35mm",label:"35mm",color:"#d97706",wt:{t2:1.996,t3:2.809,sH:1.326,sW:1.326,kpa:1.063,slim:.481,csW:1.326},hasCap:false,hasKPA:true,types:["2T2S","3T3S"]},
  "37mm":{id:"37mm",label:"37mm",color:"#dc2626",wt:{t2:1.84,t3:2.678,sH:1.364,sW:1.364,kpa:1.063,slim:.689,csW:1.364},hasCap:false,hasKPA:true,types:["2T2S","3T3S"]},
};
const TYPES=[
  {id:"2T2S",  label:"2T-2S",full:"2 Track 2 Shutter",        tr:2,sh:2,net:false,co:false},
  {id:"3T3S",  label:"3T-3S",full:"3 Track 3 Shutter",        tr:3,sh:3,net:false,co:false},
  {id:"2T4SCO",label:"2T-4S(CO)",full:"2 Track 4 Shutter Centre",tr:2,sh:4,net:false,co:true},
  {id:"3T6SCO",label:"3T-6S(CO)",full:"3 Track 6 Shutter Centre",tr:3,sh:6,net:false,co:true},
  {id:"3T2S1N",label:"3T-2S+Net",full:"3 Track 2 Shutter + 1 Net",tr:3,sh:2,net:true,co:false,nc:1},
  {id:"3T4S2N",label:"3T-4S+2Net",full:"3 Track 4 Shutter + 2 Net",tr:3,sh:4,net:true,co:false,nc:2},
];
const COLORS=[
  {id:"white",label:"White",hex:"#F0F0EB",ral:"RAL 9016",add:12},
  {id:"black",label:"Black",hex:"#2a2a2a",ral:"RAL 9005",add:15},
  {id:"grey", label:"Grey", hex:"#8a8a8a",ral:"RAL 7040",add:12},
  {id:"custom",label:"Custom RAL",hex:"#c084fc",ral:"Custom",add:25},
];
const DR={al:350,wst:.10,g5:55,net:35,ep:10,lb2:60,lb3:65,tr:100,pc:0,b2:80,b3:110,cl:90,cl3:210,mp:300,nh:45,tn:25,pr:23,crd:45,alp:5,wp:1,wd:7,fn:4,ws:3,bs:35,st:33,ad:45,si:185,kp:25,sl:3,ic:4.5};

const mf=m=>m/304.8;
const sf=(w,h)=>(w/304.8)*(h/304.8);
const fm=n=>"₹"+Math.round(n).toLocaleString("en-IN");
const fn=(n,d=0)=>typeof n==="number"?n.toFixed(d):"-";

// ── CALC ENGINE ──────────────────────────────────────────────────────────────
function doCalc(W,H,type,series,rates,lock,cid){
  const w=+W,h=+H;
  if(!w||!h||w<200||h<200)return null;
  const wt=series.wt,isKPA=series.hasKPA&&h>1800;
  const {tr,sh:SH,co,net:hn,nc=0}=type;
  const secs=[];
  const add=(n,sz,q,wg)=>{const kg=(sz/1000)*q*wg;secs.push({n,sz,q,mtr:(sz/1000)*q,wt:wg,kg,amt:kg*rates.al});};
  const tw=tr===2?wt.t2:wt.t3;
  add(tr+" Track W",w,2,tw);add(tr+" Track H",h,2,tw);
  let sw;
  if(!co){
    if(tr===2){sw=(w-107)/2;add("Shutter Bottom",sw,4,wt.sW);add("Shutter H",h-85,SH,wt.sH);}
    else{sw=(w-106)/3;add("Shutter Bottom",sw,4,wt.sW);add("Shutter H",h-85,2,wt.sH);add("Centre Shutter",sw-23,2,wt.csW||wt.sW);}
  }else{sw=(w-136)/4;add("Shutter Bottom",sw,8,wt.sW);if(tr===3)add("Centre Shutter",sw-22,4,wt.csW||wt.sW);add("Shutter H",h-85,4,wt.sH);}
  if(series.hasCap)add("Track Cap",w-101,tr,wt.cap);
  let ik=co?(tr===2?2:4):(tr===2?1:2),is=ik;
  if(!isKPA||!series.hasKPA)ik=0;
  if(series.id==="27mm"){add("Interlock",h-85,is,wt.interlock);}
  else{if(ik>0)add("Interlock KPA",h-85,ik,wt.kpa);add("Interlock Slim",h-85,is,wt.slim);if(co)add("Centre Clip",h-85,1,.532);}
  if(hn){add("Mesh H",h-85,nc,.982);add("Mesh W",sw||(w-107)/2,nc*2,.982);add("Mesh Interlock",h-85,nc,.505);add("Mesh Clip H",h-103,nc*2,.144);add("Mesh Clip W",(w/(SH/nc))-35,nc*2,.144);}
  const twt=secs.reduce((s,x)=>s+x.kg,0),wst=twt*rates.wst,alAmt=(twt+wst)*rates.al;
  const glass=[];
  const gsw=co?sw-37:(tr===2?(w-107)/2:(w-106)/3)-37,gsh=h-85-103;
  glass.push({n:"5mm Clear Glass",sw:gsw,sh:gsh,q:co?4:2});
  if(tr===3&&!co)glass.push({n:"5mm Clear (Centre)",sw:(w-106)/3-23+27,sh:gsh,q:1});
  if(co&&tr===3)glass.push({n:"5mm Clear (Centre)",sw:sw-22+27,sh:gsh,q:2});
  if(hn)glass.push({n:"Mosquito Net SS304",sw:(w/SH)*nc,sh:h,q:nc,isNet:true});
  glass.forEach(g=>{g.sqe=sf(g.sw,g.sh);g.tsq=g.sqe*g.q;g.amt=g.tsq*(g.isNet?rates.net:rates.g5);});
  const glAmt=glass.reduce((s,g)=>s+g.amt,0);
  const hw=[];const tSq=sf(w,h);
  hw.push({n:"Bearing",q:SH*2,r:tr===3?rates.b3:rates.b2});
  hw.push({n:"Concealed Lock",q:Math.ceil(SH/2),r:tr===3?rates.cl3:rates.cl,note:"OPT"});
  hw.push({n:"Wool Pile W",q:+(mf(w)*(tr===2?3:SH)).toFixed(2),r:rates.wp,u:"rft"});
  hw.push({n:"Wool Pile H",q:+(mf(h)*(tr===2?3:SH)).toFixed(2),r:rates.wp,u:"rft"});
  hw.push({n:"Water Drain Cap",q:tr===2?3:4,r:rates.wd});
  hw.push({n:"Fastener",q:SH*3,r:rates.fn});hw.push({n:"Wall Screw",q:SH*3,r:rates.ws});
  hw.push({n:"Bump Stopper",q:Math.ceil(SH/2),r:rates.bs});hw.push({n:"Sticker",q:SH*2,r:rates.st});
  hw.push({n:"Anti Dust",q:Math.ceil(SH/2),r:rates.ad});hw.push({n:"Silicon",q:1,r:rates.si});
  if(isKPA&&series.hasKPA)hw.push({n:"KPA Cover",q:ik*2,r:rates.kp});
  hw.push({n:"Silicon Labour",q:+tSq.toFixed(2),r:rates.sl,u:"sqft"});
  hw.push({n:"Interlock Cap",q:(ik+is)*2,r:rates.ic});
  if(hn)hw.push({n:"Anti Lift Patti",q:4,r:rates.alp});
  const lockAmt=lock==="mp"?rates.mp*Math.ceil(SH/2)+(SH<=2?3:SH*1.5)*(rates.nh+rates.tn)+Math.ceil(h/1000)*rates.pr+Math.ceil(SH/2)*rates.crd:0;
  const hwAmt=hw.reduce((s,x)=>s+(+x.q)*x.r,0)+lockAmt;
  const epW=mf(w)*SH,epH=mf(h)*SH,epT=(mf(w)+mf(h))*tr;
  let totEp=epW+epH+epT;if(hn)totEp+=mf(w/SH*nc+h)*nc;
  const epAmt=totEp*rates.ep;
  const lbR=tr===2?rates.lb2:rates.lb3,lbAmt=tSq*lbR;
  const color=COLORS.find(c=>c.id===cid)||COLORS[0];
  const pcAmt=((rates.pc||0)+color.add)*tSq;
  const unitTotal=alAmt+glAmt+hwAmt+epAmt+lbAmt+rates.tr+pcAmt;
  return{w,h,type,series,tSq,secs,twt,wst,alAmt,glass,glAmt,hw,hwAmt,lockAmt,lock,epW,epH,epT,totEp,epAmt,lbR,lbAmt,pcAmt,color,transport:rates.tr,unitTotal,sqR:unitTotal/tSq,isKPA,ik,is,sw};
}

// ── WINDOW DIAGRAM ───────────────────────────────────────────────────────────
function WinDiag({type,colorHex,W,H,seriesColor,sm}){
  const PW=sm?180:300,PH=sm?130:200,fr=sm?8:11,pd=8;
  const iW=PW-pd*2,iH=PH-pd*2;
  const {tr,sh,co,net:hn,nc=0}=type;
  const fc=colorHex||"#ccc";
  const gc="#a8d8f0",nc2="#5aba8a";
  const dim=W&&H?W+"×"+H+" mm":"";
  const shAW=hn?iW*0.68:iW,ntAW=hn?iW*0.32:0;
  const shPW=shAW/sh,ntPW=nc>0?ntAW/nc:0;
  const gy=pd+fr,gh=iH-fr*2;
  const arrow=i=>co?i<Math.floor(sh/2)?"←":"→":i%2===0?"←":"→";
  const fs=sm?8:12;
  return(
    <svg viewBox={"0 0 "+PW+" "+(PH+20)} style={{width:"100%",display:"block",margin:"0 auto"}}>
      <rect x={0} y={0} width={PW} height={PH+20} fill="#f0f4ff" rx={6}/>
      <rect x={pd} y={pd} width={iW} height={iH} fill="none" stroke={fc} strokeWidth={fr} rx={2}/>
      <rect x={pd+fr/2} y={pd+fr} width={iW-fr} height={fr*0.6} fill="rgba(0,0,0,0.15)" rx={1}/>
      <rect x={pd+fr/2} y={pd+iH-fr-fr*0.6} width={iW-fr} height={fr*0.6} fill="rgba(0,0,0,0.15)" rx={1}/>
      {Array.from({length:sh},(_,i)=>{
        const px=pd+fr/2+i*shPW,pw=shPW,gx=px+3,gw=pw-6;
        return <g key={"s"+i}>
          <rect x={px} y={gy} width={pw} height={gh} fill={fc+"22"} stroke={fc} strokeWidth={3} rx={1}/>
          <rect x={gx+2} y={gy+3} width={gw-4} height={gh-6} fill={gc} opacity={.35} rx={1}/>
          <rect x={gx+3} y={gy+4} width={gw*0.4} height={gh*0.3} fill="#e8f4ff" opacity={.5} rx={1}/>
          <line x1={gx+4} y1={gy+6} x2={gx+4} y2={gy+gh*0.5} stroke="#fff" strokeWidth={1} opacity={.4}/>
          <text x={gx+gw/2} y={gy+gh/2+4} textAnchor="middle" fill="#2563eb" fontSize={fs} opacity={.7}>{arrow(i)}</text>
          <circle cx={px+4} cy={gy+gh-2} r={sm?1.5:2.5} fill="#666"/>
          <circle cx={px+pw-4} cy={gy+gh-2} r={sm?1.5:2.5} fill="#666"/>
          {i<sh-1&&<rect x={px+pw-2} y={gy} width={4} height={gh} fill="#aaa" rx={1}/>}
        </g>;
      })}
      {hn&&<rect x={pd+fr/2+shAW-fr/2} y={gy-1} width={fr} height={gh+2} fill={fc} opacity={.9}/>}
      {hn&&Array.from({length:nc},(_,i)=>{
        const px=pd+fr/2+shAW+i*ntPW,pw=ntPW,gx=px+2,gw=pw-4;
        const rows=Math.max(5,Math.floor(gh/6)),cols=Math.max(3,Math.floor(gw/6));
        return <g key={"n"+i}>
          <rect x={px} y={gy} width={pw} height={gh} fill="#0a2a16" stroke={nc2} strokeWidth={1.5} rx={1}/>
          {Array.from({length:rows},(_,j)=><line key={"h"+j} x1={gx+1} y1={gy+4+j*(gh-8)/(rows-1)} x2={gx+gw-1} y2={gy+4+j*(gh-8)/(rows-1)} stroke={nc2} strokeWidth={.6} opacity={.5}/>)}
          {Array.from({length:cols},(_,j)=><line key={"v"+j} x1={gx+1+j*(gw-2)/(cols-1)} y1={gy+2} x2={gx+1+j*(gw-2)/(cols-1)} y2={gy+gh-2} stroke={nc2} strokeWidth={.6} opacity={.4}/>)}
          <text x={gx+gw/2} y={gy+gh/2+3} textAnchor="middle" fill={nc2} fontSize={sm?6:9} fontWeight="bold">NET</text>
        </g>;
      })}
      {co&&<rect x={pd+fr/2+shAW/2-fr*0.6} y={pd+fr} width={fr*1.2} height={iH-fr*2} fill={fc} opacity={.8}/>}
      {Array.from({length:tr},(_,i)=><line key={i} x1={pd+fr} y1={pd+iH-fr*0.5-i*3} x2={PW-pd-fr} y2={pd+iH-fr*0.5-i*3} stroke={seriesColor||fc} strokeWidth={1} opacity={.3}/>)}
      <text x={PW/2} y={PH+14} textAnchor="middle" fill="#6b7a99" fontSize={sm?7:9}>{dim||type.label}</text>
    </svg>
  );
}

// ── SHARED UI ────────────────────────────────────────────────────────────────
const S={
  card:{background:"#fff",border:"1px solid #e4e8f0",borderRadius:10,padding:14,marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,0.04)"},
  lbl:{fontSize:11,color:"#6b7a99",fontWeight:600,display:"block",marginBottom:3,marginTop:8},
  th:{padding:"7px 8px",fontSize:11,fontWeight:700,color:"#2563eb",borderBottom:"1px solid #dde8ff",background:"#eff6ff",textAlign:"left"},
  thr:{padding:"7px 8px",fontSize:11,fontWeight:700,color:"#2563eb",borderBottom:"1px solid #dde8ff",background:"#eff6ff",textAlign:"right"},
  td:{padding:"6px 8px",fontSize:11,borderBottom:"1px solid #f0f2f8"},
  tdr:{padding:"6px 8px",fontSize:11,borderBottom:"1px solid #f0f2f8",textAlign:"right"},
};
function Card({title,children,style={}}){
  return <div style={{...S.card,...style}}>
    {title&&<div style={{fontSize:11,fontWeight:700,color:"#6b7a99",textTransform:"uppercase",letterSpacing:.8,marginBottom:10,paddingBottom:8,borderBottom:"1px solid #eef0f8"}}>{title}</div>}
    {children}
  </div>;
}
function Row({label,value,green,blue}){
  return <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:12}}>
    <span style={{color:"#6b7a99"}}>{label}</span>
    <span style={{fontWeight:600,color:green?"#16a34a":blue?"#2563eb":"#1e2840"}}>{value}</span>
  </div>;
}
function ColPicker({sel,onChange,sqf,baseR}){
  const col=COLORS.find(c=>c.id===sel)||COLORS[0];
  return <div>
    <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
      {COLORS.map((c,i)=><div key={i} onClick={()=>onChange(c.id)}
        style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,cursor:"pointer"}}>
        <div style={{width:26,height:26,borderRadius:"50%",background:c.hex,border:sel===c.id?"3px solid #2563eb":"3px solid #e4e8f0",boxShadow:sel===c.id?"0 0 0 2px #dbeafe":"none",transition:".15s"}} title={c.label}/>
        <span style={{fontSize:9,color:"#6b7a99"}}>{c.label}</span>
        <span style={{fontSize:8,color:"#d97706"}}>+₹{c.add}</span>
      </div>)}
    </div>
    {sqf>0&&<div style={{padding:"5px 8px",background:"#fffbeb",borderRadius:6,fontSize:11,display:"flex",justifyContent:"space-between",border:"1px solid #fde68a"}}>
      <span style={{color:"#92400e"}}>Powder Coating {fn(sqf)} sqft × ₹{(baseR||0)+col.add}</span>
      <span style={{color:"#d97706",fontWeight:700}}>{fm(sqf*((baseR||0)+col.add))}</span>
    </div>}
  </div>;
}

// ── LOGIN ────────────────────────────────────────────────────────────────────
function Login({onLogin}){
  const [ph,setPh]=useState("");
  const [otp,setOtp]=useState("");
  const [step,setStep]=useState("ph");
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState("");
  const [sent,setSent]=useState("");
  function send(){
    if(!/^\d{10}$/.test(ph)){setErr("Enter valid 10-digit number");return;}
    setErr("");setBusy(true);
    const code=Math.floor(100000+Math.random()*900000)+"";
    setSent(code);
    setTimeout(()=>{setBusy(false);setStep("otp");alert("Demo OTP: "+code);},1200);
  }
  function verify(){if(otp===sent)onLogin(ph);else setErr("Wrong OTP");}
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#eff6ff,#dbeafe)",padding:16}}>
      <div style={{width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:48,marginBottom:8}}>🪟</div>
          <div style={{fontSize:22,fontWeight:800,color:"#1d4ed8"}}>AlumCalc Pro</div>
          <div style={{fontSize:12,color:"#6b7a99",marginTop:4}}>Alufabb Fenestration • 5 Series</div>
        </div>
        <div style={{background:"#fff",borderRadius:14,padding:26,boxShadow:"0 4px 24px rgba(37,99,235,0.1)",border:"1px solid #dbeafe"}}>
          {step==="ph"?<>
            <div style={{fontSize:16,fontWeight:700,color:"#1e2840",marginBottom:4}}>Login with Mobile</div>
            <div style={{fontSize:12,color:"#6b7a99",marginBottom:16}}>Enter your 10-digit mobile number</div>
            <label style={S.lbl}>Mobile Number</label>
            <div style={{display:"flex",gap:8,marginBottom:4}}>
              <div style={{padding:"7px 10px",background:"#f0f4ff",border:"1px solid #dde2ee",borderRadius:6,fontSize:13,color:"#6b7a99",flexShrink:0}}>🇮🇳 +91</div>
              <input type="tel" maxLength={10} value={ph} onChange={e=>setPh(e.target.value.replace(/\D/g,""))} placeholder="9876543210" onKeyDown={e=>e.key==="Enter"&&send()} style={{fontSize:16,letterSpacing:2}}/>
            </div>
            {err&&<div style={{fontSize:11,color:"#dc2626",marginBottom:4}}>{err}</div>}
            <button onClick={send} disabled={busy} style={{width:"100%",marginTop:12,padding:"12px",background:busy?"#93c5fd":"#2563eb",color:"#fff",border:"none",borderRadius:8,fontWeight:700,fontSize:14,cursor:"pointer"}}>
              {busy?"Sending...":"Send OTP →"}
            </button>
          </>:<>
            <div style={{fontSize:16,fontWeight:700,color:"#1e2840",marginBottom:4}}>Enter OTP</div>
            <div style={{fontSize:12,color:"#6b7a99",marginBottom:16}}>Sent to +91 {ph} <span style={{color:"#2563eb",cursor:"pointer"}} onClick={()=>{setStep("ph");setOtp("");setErr("");}}>Change</span></div>
            <input type="tel" maxLength={6} value={otp} onChange={e=>setOtp(e.target.value.replace(/\D/g,""))} placeholder="● ● ● ● ● ●" onKeyDown={e=>e.key==="Enter"&&verify()} style={{fontSize:22,letterSpacing:10,textAlign:"center"}}/>
            {err&&<div style={{fontSize:11,color:"#dc2626",marginTop:5}}>{err}</div>}
            <button onClick={verify} style={{width:"100%",marginTop:12,padding:"12px",background:"#16a34a",color:"#fff",border:"none",borderRadius:8,fontWeight:700,fontSize:14,cursor:"pointer"}}>Verify & Login ✓</button>
            <div style={{textAlign:"center",marginTop:10,fontSize:12,color:"#6b7a99"}}>Didn't receive? <span style={{color:"#2563eb",cursor:"pointer"}} onClick={send}>Resend</span></div>
          </>}
        </div>
        <div style={{textAlign:"center",marginTop:14,fontSize:11,color:"#93c5fd"}}>For business use only</div>
      </div>
    </div>
  );
}

function newRow(){return{id:uid(),location:"",seriesId:"29slim",typeId:"2T2S",W:"",H:"",qty:1,lock:"concealed",cid:"white",calc:null};}

function QuoteTab({rates,co,rows,setRows}){
  const [cName,setCName]=useState("");
  const [pName,setPName]=useState("");
  const [pRef,setPRef]=useState("");
  const [detail,setDetail]=useState(null);
  const [hist,setHist]=useState(loadHist);

  const upd=(id,k,v)=>setRows(prev=>prev.map(r=>r.id===id?{...r,[k]:v,calc:null}:r));
  const calcRow=(id)=>setRows(prev=>prev.map(r=>{
    if(r.id!==id)return r;
    const s=SERIES[r.seriesId],at=TYPES.filter(t=>s.types.includes(t.id)),ty=at.find(t=>t.id===r.typeId)||at[0];
    return{...r,calc:doCalc(r.W,r.H,ty,s,rates,r.lock,r.cid)};
  }));
  const calcAll=()=>setRows(prev=>prev.map(r=>{
    const s=SERIES[r.seriesId],at=TYPES.filter(t=>s.types.includes(t.id)),ty=at.find(t=>t.id===r.typeId)||at[0];
    return{...r,calc:doCalc(r.W,r.H,ty,s,rates,r.lock,r.cid)};
  }));
  const dup=(id)=>{const i=rows.findIndex(r=>r.id===id),n={...rows[i],id:uid(),calc:null},a=[...rows];a.splice(i+1,0,n);setRows(a);};
  const del=(id)=>setRows(prev=>prev.filter(r=>r.id!==id));

  const totals=useMemo(()=>{
    const v=rows.filter(r=>r.calc);
    return{GT:v.reduce((s,r)=>s+r.calc.unitTotal*(r.qty||1),0),GS:v.reduce((s,r)=>s+r.calc.tSq*(r.qty||1),0),GQ:v.reduce((s,r)=>s+(r.qty||1),0),cnt:v.length};
  },[rows]);

  const dRow=detail?rows.find(r=>r.id===detail):null;

  function saveQuote(){
    const entry={id:uid(),savedAt:new Date().toLocaleString("en-IN"),cName,pName,pRef,rows:[...rows],total:totals.GT,cnt:totals.cnt};
    const updated=[entry,...hist].slice(0,50);
    setHist(updated);saveHist(updated);
    alert("✅ Quotation saved!\n"+new Date().toLocaleString("en-IN"));
  }
  function loadQuote(h){
    if(!confirm("Load this quotation? Current data will be replaced."))return;
    setCName(h.cName||"");setPName(h.pName||"");setPRef(h.pRef||"");
    setRows(h.rows&&h.rows.length?h.rows:[newRow()]);
  }
  function delQuote(id){
    if(!confirm("Delete this saved quotation?"))return;
    const u=hist.filter(x=>x.id!==id);setHist(u);saveHist(u);
  }

  const inp={background:"#fff",border:"1px solid #dde2ee",borderRadius:6,color:"#1e2840",padding:"5px 7px",fontSize:11,boxSizing:"border-box"};
  const sel={...inp};

  return <div>
    {/* History */}
    <Card>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,paddingBottom:8,borderBottom:"1px solid #eef0f8"}}>
        <div style={{fontSize:11,fontWeight:700,color:"#6b7a99",textTransform:"uppercase",letterSpacing:.8}}>🗂 Quotation History ({hist.length})</div>
        <button onClick={saveQuote} style={{padding:"6px 14px",background:"#16a34a",color:"#fff",border:"none",borderRadius:7,fontWeight:700,fontSize:11,cursor:"pointer"}}>💾 Save Current</button>
      </div>
      {hist.length===0&&<div style={{fontSize:12,color:"#c5cde0",textAlign:"center",padding:"10px 0"}}>No saved quotations yet</div>}
      <div style={{display:"flex",flexDirection:"column",gap:5,maxHeight:200,overflowY:"auto"}}>
        {hist.map((h,i)=><div key={h.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:i%2===0?"#f8f9fc":"#fff",borderRadius:7,border:"1px solid #eef0f8"}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,fontWeight:700,color:"#1e2840",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{h.cName||"Unnamed"}{h.pName?" – "+h.pName:""}</div>
            <div style={{fontSize:10,color:"#6b7a99",marginTop:1}}>{h.savedAt} • {h.cnt} window{h.cnt!==1?"s":""} • <span style={{color:"#16a34a",fontWeight:700}}>{fm(h.total)}</span></div>
          </div>
          <button onClick={()=>loadQuote(h)} style={{padding:"3px 9px",background:"#2563eb",color:"#fff",border:"none",borderRadius:5,cursor:"pointer",fontSize:11,fontWeight:700}}>📂</button>
          <button onClick={()=>delQuote(h.id)} style={{padding:"3px 8px",background:"#fef2f2",color:"#dc2626",border:"1px solid #fca5a5",borderRadius:5,cursor:"pointer",fontSize:11}}>🗑</button>
        </div>)}
      </div>
    </Card>

    {/* Customer */}
    <Card>
      <div className="g3">
        <div><label style={S.lbl}>Customer Name</label><input value={cName} onChange={e=>setCName(e.target.value)} placeholder="Mr. Ramesh Sharma"/></div>
        <div><label style={S.lbl}>Project / Site</label><input value={pName} onChange={e=>setPName(e.target.value)} placeholder="Sharma Residence"/></div>
        <div><label style={S.lbl}>Quote Ref No.</label><input value={pRef} onChange={e=>setPRef(e.target.value)} placeholder="AF-2026-001"/></div>
      </div>
    </Card>

    {/* Windows Table */}
    <Card>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,paddingBottom:8,borderBottom:"1px solid #eef0f8"}}>
        <div style={{fontSize:11,fontWeight:700,color:"#6b7a99",textTransform:"uppercase",letterSpacing:.8}}>🪟 Windows List</div>
        <div style={{display:"flex",gap:7}}>
          <button onClick={calcAll} style={{padding:"6px 13px",background:"#2563eb",color:"#fff",border:"none",borderRadius:7,fontWeight:700,fontSize:11,cursor:"pointer"}}>⚡ Calculate All</button>
          <button onClick={()=>setRows(p=>[...p,newRow()])} style={{padding:"6px 12px",background:"#fff",color:"#16a34a",border:"1px solid #16a34a",borderRadius:7,fontWeight:700,fontSize:11,cursor:"pointer"}}>+ Add Window</button>
        </div>
      </div>
      <div class="tbl-wrap">
        <table style={{minWidth:900}} className="qtbl">
          <thead><tr style={{background:"#eff6ff"}}>

      <Card title="📊 Summary">

    </>}

    {/* Detail Modal */}

      <div style={{background:"#fff",borderRadius:14,padding:20,maxWidth:500,width:"100%",maxHeight:"85vh",overflowY:"auto",border:"1px solid #e4e8f0",boxShadow:"0 8px 32px rgba(0,0,0,0.12)"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:"#1e2840"}}>{dRow.location||"Window "+(rows.findIndex(r=>r.id===detail)+1)} – Detail</div>
            <div style={{fontSize:11,color:"#6b7a99",marginTop:2}}>{dRow.calc.series.label} | {dRow.calc.type.full} | {dRow.calc.w}×{dRow.calc.h}mm</div>
          </div>
          <button onClick={()=>setDetail(null)} style={{background:"#f0f4ff",color:"#6b7a99",border:"1px solid #e4e8f0",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:13}}>✕</button>
        </div>
        {[["Aluminium",dRow.calc.alAmt],["Glass",dRow.calc.glAmt],["Hardware",dRow.calc.hwAmt],["EPDM Rubber",dRow.calc.epAmt],["Labour",dRow.calc.lbAmt],["Transport",dRow.calc.transport]].map((it,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"7px 10px",background:i%2===0?"#f8f9fc":"#fff",borderRadius:5,marginBottom:3}}>
            <span style={{fontSize:12,color:"#1e2840"}}>{it[0]}</span>
            <span style={{fontSize:13,fontWeight:600,color:"#1e2840"}}>{fm(it[1])}</span>
          </div>
        ))}
        {dRow.calc.pcAmt>0&&<div style={{display:"flex",justifyContent:"space-between",padding:"7px 10px",background:"#fffbeb",borderRadius:5,marginBottom:3}}>
          <span style={{fontSize:12}}>Powder Coating ({dRow.calc.color.label})</span><span style={{fontSize:13,fontWeight:600}}>{fm(dRow.calc.pcAmt)}</span>
        </div>}
        <div style={{display:"flex",justifyContent:"space-between",padding:"10px 14px",background:"#eff6ff",borderRadius:8,marginTop:8,border:"1px solid #bfdbfe"}}>
          <div><div style={{fontSize:13,fontWeight:700,color:"#1d4ed8"}}>UNIT TOTAL</div><div style={{fontSize:10,color:"#6b7a99",marginTop:2}}>{fn(dRow.calc.tSq)} sqft @ {fm(dRow.calc.sqR)}/sqft</div></div>
          <div style={{textAlign:"right"}}><div style={{fontSize:20,fontWeight:800,color:"#16a34a"}}>{fm(dRow.calc.unitTotal)}</div>

      </div>
    </div>}
  </div>;
}

// ── PDF FUNCTIONS (kept minimal) ─────────────────────────────────────────────
function makePDF(r,qty,cName,pName,co){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const PW=210,m=14;let y=m;
  doc.setFillColor(29,78,216);doc.rect(0,0,PW,42,"F");
  doc.setTextColor(255,255,255);doc.setFontSize(18);doc.setFont("helvetica","bold");
  doc.text((co&&co.name?co.name.toUpperCase():"YOUR COMPANY NAME"),m,15);
  doc.setFontSize(8);doc.setFont("helvetica","normal");doc.setTextColor(191,219,254);
  if(co&&co.tagline)doc.text(co.tagline,m,22);
  const cp=[co&&co.phone,co&&co.email,co&&co.website].filter(Boolean).join("  |  ");
  if(cp)doc.text(cp,m,28);
  if(co&&co.address)doc.text(co.address,m,34);
  if(co&&co.gst){doc.setTextColor(255,255,255);doc.text("GST: "+co.gst,PW-m,14,"right");}
  doc.setFillColor(37,99,235);doc.rect(0,42,PW,9,"F");
  doc.setTextColor(255,255,255);doc.setFontSize(10);doc.setFont("helvetica","bold");
  doc.text("WINDOW ESTIMATE",m,49);doc.text("Date: "+new Date().toLocaleDateString("en-IN"),PW-m,49,"right");
  y=57;
  if(cName||pName){doc.setFillColor(239,246,255);doc.roundedRect(m,y,PW-m*2,14,2,2,"F");doc.setTextColor(30,40,64);doc.setFontSize(9);if(cName)doc.text("Customer: "+cName,m+4,y+6);if(pName)doc.text("Project: "+pName,m+4,y+11);y+=18;}
  doc.setFillColor(239,246,255);doc.roundedRect(m,y,PW-m*2,24,2,2,"F");
  doc.setTextColor(29,78,216);doc.setFontSize(9);doc.setFont("helvetica","bold");doc.text("SPECIFICATIONS",m+4,y+7);
  doc.setTextColor(30,40,64);doc.setFont("helvetica","normal");
  doc.text("Series: "+r.series.label,m+4,y+13);doc.text("Width: "+r.w+" mm",m+95,y+13);
  doc.text("Type: "+r.type.full,m+4,y+19);doc.text("Height: "+r.h+" mm",m+95,y+19);
  doc.text("Color: "+r.color.label+" | Area: "+fn(r.tSq)+" sqft | Qty: "+qty,m+4,y+25);
  y+=30;
  doc.setFillColor(37,99,235);doc.rect(m,y,PW-m*2,7,"F");
  doc.setTextColor(255,255,255);doc.setFontSize(8);doc.setFont("helvetica","bold");
  doc.text("COST ITEM",m+3,y+5);doc.text("AMOUNT",PW-m-3,y+5,"right");y+=7;
  [["Aluminium (incl. wastage)",r.alAmt],["Glass",r.glAmt],["Hardware & Fittings",r.hwAmt],["EPDM Rubber",r.epAmt],["Labour",r.lbAmt],["Transport",r.transport],r.pcAmt>0&&["Powder Coating – "+r.color.label,r.pcAmt]].filter(Boolean).forEach((row,i)=>{
    doc.setFillColor(i%2===0?239:248,i%2===0?246:249,i%2===0?255:255);doc.rect(m,y,PW-m*2,6,"F");
    doc.setTextColor(30,40,64);doc.setFont("helvetica","normal");doc.text(row[0],m+3,y+4.5);doc.text(fm(row[1]),PW-m-3,y+4.5,"right");y+=6;
  });
  doc.setFillColor(29,78,216);doc.rect(m,y,PW-m*2,9,"F");
  doc.setTextColor(134,239,172);doc.setFontSize(10);doc.setFont("helvetica","bold");
  doc.text("TOTAL (per window)",m+3,y+6.5);doc.text(fm(r.unitTotal),PW-m-3,y+6.5,"right");y+=9;
  if(qty>1){doc.setFillColor(37,99,235);doc.rect(m,y,PW-m*2,9,"F");doc.setTextColor(255,255,255);doc.text("TOTAL FOR "+qty+" WINDOWS",m+3,y+6.5);doc.text(fm(r.unitTotal*qty),PW-m-3,y+6.5,"right");y+=9;}
  y+=6;doc.setTextColor(107,122,153);doc.setFontSize(8);doc.text("Rate/sqft: "+fm(r.sqR),m,y);y+=12;
  doc.setFillColor(239,246,255);doc.roundedRect(m,y,PW-m*2,22,2,2,"F");
  doc.setTextColor(29,78,216);doc.setFontSize(8.5);doc.setFont("helvetica","bold");doc.text("TERMS & CONDITIONS",m+4,y+7);
  doc.setTextColor(107,122,153);doc.setFont("helvetica","normal");doc.setFontSize(7.5);
  doc.text("• Valid 15 days  • 50% advance to confirm  • Prices subject to aluminium market rates",m+4,y+14);
  doc.setFillColor(29,78,216);doc.rect(0,285,PW,12,"F");
  doc.setTextColor(191,219,254);doc.setFontSize(7.5);doc.text((co&&co.name?co.name:"AlumCalc Pro")+" | Generated by AlumCalc Pro",PW/2,291,"center");
  doc.save("Estimate_"+new Date().toLocaleDateString("en-IN").replace(/\//g,"-")+".pdf");
}

function makeMultiPDF(rows,cName,pName,pRef,co){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const PW=210,m=12;let y=m;
  // Header
  doc.setFillColor(29,78,216);doc.rect(0,0,PW,44,"F");
  doc.setFillColor(212,175,55);doc.rect(0,0,5,44,"F");
  doc.setTextColor(255,255,255);doc.setFontSize(18);doc.setFont("helvetica","bold");
  doc.text((co&&co.name?co.name.toUpperCase():"YOUR COMPANY NAME"),14,16);
  doc.setFontSize(8);doc.setFont("helvetica","normal");doc.setTextColor(191,219,254);
  if(co&&co.tagline)doc.text(co.tagline,14,23);
  const cp=[co&&co.phone,co&&co.email].filter(Boolean).join("  |  ");
  if(cp)doc.text(cp,14,29);
  if(co&&co.address)doc.text(co.address,14,35);
  if(co&&co.gst){doc.setTextColor(255,255,255);doc.text("GST: "+co.gst,PW-m,14,"right");}
  doc.setFillColor(37,99,235);doc.rect(0,44,PW,9,"F");
  doc.setTextColor(255,255,255);doc.setFontSize(10);doc.setFont("helvetica","bold");
  doc.text("WINDOW QUOTATION",14,51);doc.text("Date: "+new Date().toLocaleDateString("en-IN"),PW-m,51,"right");
  y=59;
  // Customer
  doc.setFillColor(239,246,255);doc.roundedRect(m,y,PW-m*2,18,2,2,"F");
  doc.setTextColor(107,122,153);doc.setFontSize(8);doc.setFont("helvetica","bold");doc.text("CUSTOMER",m+4,y+6);
  doc.setTextColor(30,40,64);if(cName)doc.text(cName,m+4,y+12);
  doc.setTextColor(107,122,153);doc.text("PROJECT",m+95,y+6);
  doc.setTextColor(30,40,64);if(pName)doc.text(pName,m+95,y+12);
  if(pRef){doc.setTextColor(107,122,153);doc.text("REF: "+pRef,PW-m,y+12,"right");}
  y+=23;
  // Table header
  const TW=PW-m*2;
  doc.setFillColor(37,99,235);doc.rect(m,y,TW,7,"F");
  doc.setTextColor(255,255,255);doc.setFontSize(6.5);doc.setFont("helvetica","bold");
  const cx=[m+2,m+8,m+30,m+58,m+74,m+88,m+101,m+111,m+130,m+158,m+182];
  ["#","Location","Series/Type","W","H","Sqft","Qty","Colour","Unit ₹","Total ₹","Rate"].forEach((h,i)=>doc.text(h,cx[i],y+5));
  y+=7;
  let GT=0,GS=0,GQ=0;
  rows.filter(r=>r.calc).forEach((row,idx)=>{
    if(y>262){doc.addPage();y=20;}
    const r=row.calc,q=row.qty||1,rt=r.unitTotal*q;
    GT+=rt;GS+=r.tSq*q;GQ+=q;
    doc.setFillColor(idx%2===0?239:248,idx%2===0?246:249,255);doc.rect(m,y,TW,6.5,"F");
    doc.setFillColor(...hexRgb(r.series.color));doc.rect(m,y,2,6.5,"F");
    doc.setTextColor(30,40,64);doc.setFont("helvetica","normal");doc.setFontSize(7);
    doc.text(""+(idx+1),cx[0]+3,y+4.5,{align:"center"});
    doc.setFont("helvetica","bold");doc.text((row.location||"Win "+(idx+1)).substring(0,10),cx[1],y+4.5);
    doc.setFont("helvetica","normal");doc.setTextColor(107,122,153);
    doc.text((r.series.label+" "+r.type.label).substring(0,16),cx[2],y+4.5);
    doc.setTextColor(30,40,64);
    doc.text(""+r.w,cx[3]+13,y+4.5,{align:"right"});doc.text(""+r.h,cx[4]+13,y+4.5,{align:"right"});
    doc.text(""+fn(r.tSq),cx[5]+12,y+4.5,{align:"right"});doc.text(""+q,cx[6]+8,y+4.5,{align:"center"});
    doc.setFillColor(...hexRgb(r.color.hex));doc.setDrawColor(180,180,180);doc.setLineWidth(0.2);doc.circle(cx[7]+2.5,y+3.2,2,"FD");
    doc.setTextColor(107,122,153);doc.text(r.color.label.substring(0,6),cx[7]+6,y+4.5);
    doc.setTextColor(30,40,64);doc.text(fm(r.unitTotal),cx[8]+27,y+4.5,{align:"right"});
    doc.setTextColor(22,163,74);doc.setFont("helvetica","bold");doc.text(fm(rt),cx[9]+23,y+4.5,{align:"right"});
    doc.setTextColor(107,122,153);doc.setFont("helvetica","normal");doc.text(fm(r.sqR),cx[10]+22,y+4.5,{align:"right"});
    y+=6.5;
  });
  // Grand total
  y+=2;doc.setFillColor(29,78,216);doc.rect(m,y,TW,12,"F");
  doc.setFillColor(212,175,55);doc.rect(m,y,3,12,"F");
  doc.setTextColor(191,219,254);doc.setFontSize(8);doc.setFont("helvetica","bold");doc.text("GRAND TOTAL",m+6,y+5);
  doc.setTextColor(107,122,153);doc.setFontSize(7);doc.setFont("helvetica","normal");doc.text(GQ+" windows  •  "+fn(GS)+" sqft",m+6,y+10);
  doc.setTextColor(134,239,172);doc.setFontSize(13);doc.setFont("helvetica","bold");doc.text(fm(GT),m+TW,y+9,{align:"right"});
  y+=18;
  // Per-window detail
  if(y>240){doc.addPage();y=20;}
  doc.setFillColor(29,78,216);doc.roundedRect(m,y,TW,7,1,1,"F");
  doc.setFillColor(212,175,55);doc.rect(m,y,3,7,"F");
  doc.setTextColor(255,255,255);doc.setFontSize(8);doc.setFont("helvetica","bold");doc.text("DETAILED BREAKDOWN PER WINDOW",m+6,y+5);y+=10;
  rows.filter(r=>r.calc).forEach((row,idx)=>{
    const r=row.calc,q=row.qty||1;
    if(y>248){doc.addPage();y=20;}
    doc.setFillColor(29,78,216);doc.roundedRect(m,y,TW,7,1,1,"F");
    doc.setFillColor(...hexRgb(r.series.color));doc.circle(m+4,y+3.5,2,"F");
    doc.setTextColor(255,255,255);doc.setFontSize(7.5);doc.setFont("helvetica","bold");
    doc.text("Window "+(idx+1)+(row.location?" – "+row.location:"")+" | "+r.series.label+" | "+r.type.full+" | "+r.w+"×"+r.h+"mm | Qty: "+q,m+9,y+4.5);y+=7;
    const brs=[["Aluminium",r.alAmt],["Glass",r.glAmt],["Hardware",r.hwAmt],["EPDM Rubber",r.epAmt],["Labour",r.lbAmt],["Transport",r.transport]];
    if(r.pcAmt>0)brs.push(["Powder Coating – "+r.color.label,r.pcAmt]);
    brs.forEach((br,bi)=>{
      doc.setFillColor(bi%2===0?239:248,bi%2===0?246:249,255);doc.rect(m,y,TW,5,"F");
      doc.setTextColor(30,40,64);doc.setFont("helvetica","normal");doc.setFontSize(7.5);
      doc.text(br[0],m+4,y+3.8);doc.text(fm(br[1]),m+TW,y+3.8,{align:"right"});y+=5;
    });
    doc.setFillColor(29,78,216);doc.rect(m,y,TW,6,"F");
    doc.setTextColor(134,239,172);doc.setFont("helvetica","bold");doc.setFontSize(8);
    doc.text("Unit: "+fm(r.unitTotal)+"  ×"+q+"  =  "+fm(r.unitTotal*q),m+4,y+4.5);
    doc.setTextColor(191,219,254);doc.setFontSize(7);doc.text(fn(r.tSq)+" sqft @ "+fm(r.sqR)+"/sqft",m+TW,y+4.5,{align:"right"});
    y+=9;
  });
  // Terms
  if(y>245){doc.addPage();y=20;}
  doc.setFillColor(239,246,255);doc.roundedRect(m,y,TW,22,2,2,"F");
  doc.setTextColor(29,78,216);doc.setFontSize(8.5);doc.setFont("helvetica","bold");doc.text("TERMS & CONDITIONS",m+4,y+7);
  doc.setTextColor(107,122,153);doc.setFont("helvetica","normal");doc.setFontSize(7.5);
  ["Valid 15 days from date of issue.","50% advance required to confirm order.","Prices subject to aluminium market rates."].forEach((t,i)=>doc.text("• "+t,m+4,y+13+i*5));
  // Footer on all pages
  const pages=doc.internal.getNumberOfPages();
  for(let i=1;i<=pages;i++){
    doc.setPage(i);
    doc.setFillColor(29,78,216);doc.rect(0,287,PW,10,"F");
    doc.setFillColor(212,175,55);doc.rect(0,287,5,10,"F");
    doc.setTextColor(191,219,254);doc.setFontSize(7);
    doc.text((co&&co.name?co.name:"AlumCalc Pro")+" | Page "+i+" of "+pages,PW/2,293,"center");
  }
  doc.save("Quotation_"+(cName||"AlumCalc")+"_"+new Date().toLocaleDateString("en-IN").replace(/\//g,"-")+".pdf");
}

function hexRgb(hex){
  try{hex=(hex||"#888888").replace("#","");if(hex.length===3)hex=hex.split("").map(c=>c+c).join("");return[parseInt(hex.slice(0,2),16),parseInt(hex.slice(2,4),16),parseInt(hex.slice(4,6),16)];}catch{return[136,136,136];}
}

// ── APP ROOT ─────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useSaved("user",null);
  const [tab,setTab]=useState("calc");
  const [co,setCo]=useSaved("company",{name:"",tagline:"",phone:"",email:"",address:"",gst:"",website:""});
  const [rates,setRates]=useSaved("rates",{...DR});
  const [quoteRows,setQuoteRows]=useSaved("qrows",[newRow(),newRow()]);
  const [hist]=useState(loadHist);

  function addToQuote(sid,tid,loc){
    const nr={...newRow(),id:uid(),seriesId:sid,typeId:tid,location:loc||""};
    setQuoteRows(prev=>[...prev,nr]);
    setTab("quote");
  }

  if(!user)return <Login onLogin={n=>setUser(n)}/>;

  return <div style={{minHeight:"100vh"}}>
    {/* Header */}
    <div style={{background:"linear-gradient(135deg,#1d4ed8,#2563eb)",padding:"8px 14px",boxShadow:"0 2px 12px rgba(37,99,235,0.3)"}}>
      {/* Top row */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
        <div style={{width:32,height:32,background:"rgba(255,255,255,0.2)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>🪟</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:14,fontWeight:800,color:"#fff",lineHeight:1.2}}>AlumCalc Pro</div>
          <div style={{fontSize:9,color:"rgba(255,255,255,0.6)"}}>Alufabb Fenestration</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
          <span style={{fontSize:10,color:"rgba(255,255,255,0.8)"}}>📱{user}</span>
          <button onClick={()=>setUser(null)} style={{padding:"4px 8px",borderRadius:6,border:"1px solid rgba(255,255,255,0.3)",cursor:"pointer",fontSize:10,background:"transparent",color:"rgba(255,255,255,0.8)"}}>Out</button>
        </div>
      </div>
      {/* Nav tabs row — horizontal scroll on mobile */}
      <div style={{display:"flex",overflowX:"auto",gap:0,WebkitOverflowScrolling:"touch",scrollbarWidth:"none",marginBottom:2}}>
        {[["calc","📐 Calc"],["quote","📋 Quote"],["company","🏢 Company"],["rates","⚙️ Rates"]].map(([t,l])=>(
          <button key={t} className={"ntab"+(tab===t?" on":"")} onClick={()=>setTab(t)}>{l}</button>
        ))}
        <a href="/visualiser.html" style={{padding:"9px 12px",border:"none",cursor:"pointer",fontSize:11,fontWeight:600,color:"rgba(255,255,255,0.75)",background:"transparent",textDecoration:"none",whiteSpace:"nowrap",borderBottom:"3px solid transparent"}}>🪟 View</a>
      </div>
    </div>

    <div style={{maxWidth:1200,margin:"0 auto",padding:"10px 10px"}}>
      {tab==="calc"&&<CalcTab rates={rates} addToQuote={addToQuote}/>}
      {tab==="quote"&&<QuoteTab rates={rates} co={co} rows={quoteRows} setRows={setQuoteRows}/>}
      {tab==="company"&&<CompanyTab co={co} setCo={setCo}/>}
      {tab==="rates"&&<RatesTab rates={rates} setRates={setRates}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
