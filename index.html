    const TK=Math.max(3,FR*0.6);
    const IX=X+FR,IY=Y+FR+TK,IW=W-FR*2,IH=H-FR*2-TK*2;
    const shAW=nc>0?IW*0.68:IW,ntAW=nc>0?IW*0.32:0;
    const SPW=shAW/sh,NTPW=nc>0?ntAW/nc:0;
    let g;

    // Drop shadow
    if(DS>0){ctx.save();ctx.filter="blur("+DS*0.9+"px)";ctx.globalAlpha=0.5;ctx.fillStyle="#000";ctx.fillRect(X+DS*0.3,Y+DS*0.5,W,H);ctx.restore();ctx.filter="none";}
    // Wall reveal
    const REV=Math.max(2.5,FR*0.65);
    ctx.save();ctx.globalAlpha=0.5;ctx.fillStyle="#000";
    ctx.fillRect(X-REV,Y-REV,W+REV*2,REV);ctx.fillRect(X-REV,Y+H,W+REV*2,REV);
    ctx.fillRect(X-REV,Y-REV,REV,H+REV*2);ctx.fillRect(X+W,Y-REV,REV,H+REV*2);ctx.restore();
    // Outer frame
    ctx.fillStyle=f.frame;ctx.fillRect(X,Y,W,H);
    g=ctx.createLinearGradient(X,Y,X,Y+FR);g.addColorStop(0,f.hi);g.addColorStop(0.5,f.mid);g.addColorStop(1,f.frame);ctx.fillStyle=g;ctx.fillRect(X,Y,W,FR);
    g=ctx.createLinearGradient(X,Y,X+FR,Y);g.addColorStop(0,f.hi);g.addColorStop(0.6,f.mid);g.addColorStop(1,f.frame);ctx.fillStyle=g;ctx.fillRect(X,Y,FR,H);
    g=ctx.createLinearGradient(X,Y+H-FR,X,Y+H);g.addColorStop(0,f.frame);g.addColorStop(1,f.lo);ctx.fillStyle=g;ctx.fillRect(X,Y+H-FR,W,FR);
    g=ctx.createLinearGradient(X+W-FR,Y,X+W,Y);g.addColorStop(0,f.frame);g.addColorStop(1,f.lo);ctx.fillStyle=g;ctx.fillRect(X+W-FR,Y,FR,H);
    ctx.save();ctx.globalAlpha=0.055;ctx.strokeStyle="#fff";ctx.lineWidth=0.4;
    for(let i=0;i<H;i+=1.6){ctx.beginPath();ctx.moveTo(X,Y+i);ctx.lineTo(X+W,Y+i);ctx.stroke();}ctx.restore();
    ctx.fillStyle="rgba(255,255,255,0.75)";ctx.fillRect(X,Y,W,0.9);
    ctx.fillStyle="rgba(255,255,255,0.3)";ctx.fillRect(X,Y+0.9,W,0.8);
    ctx.fillStyle="rgba(0,0,0,0.65)";ctx.fillRect(X,Y+H-0.9,W,0.9);
    // Tracks
    ctx.fillStyle="rgba(0,0,0,0.55)";ctx.fillRect(IX,Y+FR,IW,TK);
    for(let t=0;t<tracks;t++){const ty=Y+FR+t*(TK/tracks);ctx.fillStyle="rgba(0,0,0,0.4)";ctx.fillRect(IX,ty,IW,TK/tracks);ctx.fillStyle="rgba(255,255,255,0.07)";ctx.fillRect(IX,ty,IW,0.7);}
    ctx.fillStyle="rgba(0,0,0,0.45)";ctx.fillRect(IX,IY+IH,IW,TK);
    for(let t=0;t<tracks;t++){const ty=IY+IH+t*(TK/tracks);ctx.fillStyle="rgba(0,0,0,0.35)";ctx.fillRect(IX,ty,IW,TK/tracks);ctx.fillStyle="rgba(255,255,255,0.06)";ctx.fillRect(IX,ty,IW,0.7);}

    // Shutter panels
    for(let si=0;si<sh;si++){
      const SX=IX+si*SPW;
      const GX=SX+FR-0.5,GY=IY,GW=SPW-FR*2+1,GH=IH;
      // Shutter profiles
      g=ctx.createLinearGradient(SX,IY,SX,IY+FR);g.addColorStop(0,f.hi);g.addColorStop(0.5,f.mid);g.addColorStop(1,f.frame);ctx.fillStyle=g;ctx.fillRect(SX,IY,SPW,FR);
      g=ctx.createLinearGradient(SX,IY+IH-FR,SX,IY+IH);g.addColorStop(0,f.frame);g.addColorStop(1,f.lo);ctx.fillStyle=g;ctx.fillRect(SX,IY+IH-FR,SPW,FR);
      g=ctx.createLinearGradient(SX,IY,SX+FR,IY);g.addColorStop(0,f.hi);g.addColorStop(0.6,f.mid);g.addColorStop(1,f.frame);ctx.fillStyle=g;ctx.fillRect(SX,IY,FR,IH);
      g=ctx.createLinearGradient(SX+SPW-FR,IY,SX+SPW,IY);g.addColorStop(0,f.frame);g.addColorStop(1,f.lo);ctx.fillStyle=g;ctx.fillRect(SX+SPW-FR,IY,FR,IH);
      ctx.save();ctx.globalAlpha=0.05;ctx.strokeStyle="#fff";ctx.lineWidth=0.4;
      for(let i=0;i<IH;i+=1.6){ctx.beginPath();ctx.moveTo(SX,IY+i);ctx.lineTo(SX+SPW,IY+i);ctx.stroke();}ctx.restore();

      // CLEAR GLASS — copy background pixels (truly transparent)
      ctx.save();ctx.beginPath();ctx.rect(GX,GY,GW,GH);ctx.clip();
      ctx.drawImage(bgCanvas,0,0,cv.width,cv.height);
      if(GT>0){ctx.globalAlpha=GT/100;ctx.fillStyle="rgba(180,215,235,0.5)";ctx.fillRect(GX,GY,GW,GH);}
      ctx.restore();
      // Reflection
      if(RE>0){
        ctx.save();ctx.beginPath();ctx.rect(GX,GY,GW,GH);ctx.clip();
        ctx.globalAlpha=RE/100*0.7;
        g=ctx.createLinearGradient(GX-GW*0.15,GY,GX+GW*0.72,GY+GH*0.85);
        g.addColorStop(0,"rgba(255,255,255,0)");g.addColorStop(0.25,"rgba(255,255,255,0)");
        g.addColorStop(0.40,"rgba(255,255,255,0.95)");g.addColorStop(0.50,"rgba(255,255,255,0.6)");
        g.addColorStop(0.62,"rgba(255,255,255,0.08)");g.addColorStop(1,"rgba(255,255,255,0)");
        ctx.fillStyle=g;ctx.fillRect(GX,GY,GW,GH);
        ctx.globalAlpha=RE/100*0.25;
        g=ctx.createLinearGradient(GX+GW*0.5,GY,GX+GW,GY+GH*0.5);
        g.addColorStop(0,"rgba(255,255,255,0)");g.addColorStop(0.3,"rgba(255,255,255,0.8)");
        g.addColorStop(0.6,"rgba(255,255,255,0.1)");g.addColorStop(1,"rgba(255,255,255,0)");
        ctx.fillStyle=g;ctx.fillRect(GX+GW*0.4,GY,GW*0.6,GH*0.55);ctx.restore();
      }
      // Glass edges
      ctx.save();
      ctx.globalAlpha=0.85;ctx.fillStyle="rgba(255,255,255,0.95)";ctx.fillRect(GX,GY,GW,0.9);
      ctx.globalAlpha=0.4;ctx.fillStyle="rgba(255,255,255,0.5)";ctx.fillRect(GX,GY+0.9,GW,0.9);
      ctx.globalAlpha=0.55;ctx.fillStyle="rgba(0,0,0,0.6)";ctx.fillRect(GX,GY+GH-0.9,GW,0.9);ctx.restore();
      ctx.fillStyle="rgba(10,10,10,0.8)";ctx.fillRect(GX,GY-1.2,GW,1.2);ctx.fillRect(GX,GY+GH,GW,1.2);
      // Rollers
      const wr=Math.max(2,FR*0.32);
      [SX+FR*0.8,SX+SPW-FR*0.8].forEach(bx=>{
        const by=IY+IH-wr*1.1;
        ctx.save();ctx.globalAlpha=0.35;ctx.fillStyle="#000";ctx.beginPath();ctx.ellipse(bx,by+wr*0.9,wr*0.9,wr*0.28,0,0,Math.PI*2);ctx.fill();ctx.restore();
        g=ctx.createRadialGradient(bx-wr*0.3,by-wr*0.3,0,bx,by,wr);
        g.addColorStop(0,"#bbb");g.addColorStop(0.45,"#666");g.addColorStop(1,"#1a1a1a");
        ctx.fillStyle=g;ctx.beginPath();ctx.arc(bx,by,wr,0,Math.PI*2);ctx.fill();
        ctx.fillStyle="rgba(255,255,255,0.5)";ctx.beginPath();ctx.arc(bx-wr*0.3,by-wr*0.3,wr*0.38,0,Math.PI*2);ctx.fill();
        ctx.fillStyle="#111";ctx.beginPath();ctx.arc(bx,by,wr*0.28,0,Math.PI*2);ctx.fill();
      });
      // Handle
      const isH=co?(si===Math.floor(sh/2)-1||si===Math.floor(sh/2)):si===sh-1;
      if(isH&&nc===0){
        const side=co&&si===Math.floor(sh/2)?1:-1;
        const HX=side===-1?SX+SPW-FR+1.5:SX+FR-4;
        const HY=IY+IH/2-FR*1.8,HW=FR*0.55,HH=FR*3.6;
        ctx.fillStyle="rgba(0,0,0,0.2)";ctx.beginPath();ctx.roundRect(HX-0.8,HY-0.5,HW+1.6,HH+1,2);ctx.fill();
        g=ctx.createLinearGradient(HX,HY,HX+HW,HY);
        g.addColorStop(0,f.hi);g.addColorStop(0.3,f.mid);g.addColorStop(0.7,f.frame);g.addColorStop(1,f.lo);
        ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(HX,HY,HW,HH,HW*0.45);ctx.fill();
        ctx.fillStyle="rgba(255,255,255,0.55)";ctx.fillRect(HX+1,HY+HH*0.15,1,HH*0.7);
        ctx.fillStyle=f.lo;
        [HY+HH*0.15,HY+HH*0.85].forEach(sy=>{
          ctx.beginPath();ctx.arc(HX+HW/2,sy,1,0,Math.PI*2);ctx.fill();
          ctx.fillStyle="rgba(255,255,255,0.3)";ctx.beginPath();ctx.arc(HX+HW/2-0.3,sy-0.4,0.45,0,Math.PI*2);ctx.fill();
          ctx.fillStyle=f.lo;
        });
      }
      // Interlock
      if(si<sh-1){
        const ILX=SX+SPW-2;
        g=ctx.createLinearGradient(ILX,IY,ILX+4,IY);
        g.addColorStop(0,f.lo);g.addColorStop(0.4,f.frame);g.addColorStop(0.7,f.mid);g.addColorStop(1,f.lo);
        ctx.fillStyle=g;ctx.fillRect(ILX,IY,4,IH);
        ctx.fillStyle="rgba(8,8,8,0.7)";ctx.fillRect(ILX+0.5,IY,0.8,IH);ctx.fillRect(ILX+2.7,IY,0.8,IH);
      }
    }
    // Centre divider
    if(co){
      const CX=IX+shAW-FR*0.55;
      g=ctx.createLinearGradient(CX,IY,CX+FR*1.1,IY);
      g.addColorStop(0,f.lo);g.addColorStop(0.25,f.hi);g.addColorStop(0.75,f.mid);g.addColorStop(1,f.lo);
      ctx.fillStyle=g;ctx.fillRect(CX,Y+FR,FR*1.1,H-FR*2);
      ctx.fillStyle="rgba(255,255,255,0.4)";ctx.fillRect(CX,Y+FR,0.8,H-FR*2);
      ctx.fillStyle="rgba(0,0,0,0.4)";ctx.fillRect(CX+FR*1.1-0.8,Y+FR,0.8,H-FR*2);
    }
    // Net panels
    if(nc>0){
      const NX=IX+shAW;
      g=ctx.createLinearGradient(NX-FR*0.5,IY,NX+FR*0.5,IY);
      g.addColorStop(0,f.lo);g.addColorStop(0.5,f.hi);g.addColorStop(1,f.lo);
      ctx.fillStyle=g;ctx.fillRect(NX-FR*0.5,Y+FR,FR,H-FR*2);
      ctx.fillStyle="rgba(255,255,255,0.28)";ctx.fillRect(NX-FR*0.5,Y+FR,0.8,H-FR*2);
      for(let ni=0;ni<nc;ni++){
        const NPX=NX+ni*NTPW,NGX=NPX+2,NGY=IY+2,NGW=NTPW-4,NGH=IH-4;
        g=ctx.createLinearGradient(NPX,IY,NPX+NTPW,IY);
        g.addColorStop(0,f.mid);g.addColorStop(0.5,f.frame);g.addColorStop(1,f.lo);
        ctx.fillStyle=g;ctx.fillRect(NPX,IY,NTPW,IH);
        ctx.fillStyle="rgba(5,22,12,0.92)";ctx.fillRect(NGX,NGY,NGW,NGH);
        const SP=Math.max(3,NGW/14);
        ctx.strokeStyle="rgba(155,200,165,0.5)";ctx.lineWidth=0.5;
        for(let my=NGY;my<=NGY+NGH;my+=SP){ctx.beginPath();ctx.moveTo(NGX,my);ctx.lineTo(NGX+NGW,my);ctx.stroke();}
        for(let mx=NGX;mx<=NGX+NGW;mx+=SP){ctx.beginPath();ctx.moveTo(mx,NGY);ctx.lineTo(mx,NGY+NGH);ctx.stroke();}
        ctx.strokeStyle="rgba(100,185,120,0.85)";ctx.lineWidth=0.8;ctx.strokeRect(NGX,NGY,NGW,NGH);
        ctx.fillStyle="rgba(255,255,255,0.2)";ctx.fillRect(NPX,IY,NTPW,0.7);
      }
    }
    if(AM<100){ctx.save();ctx.globalAlpha=(1-AM/100)*0.25;ctx.fillStyle="#000";ctx.fillRect(X,Y,W,H);ctx.restore();}
    ctx.strokeStyle=f.edge;ctx.lineWidth=1.2;ctx.strokeRect(X,Y,W,H);
    ctx.strokeStyle="rgba(255,255,255,0.1)";ctx.lineWidth=0.5;ctx.strokeRect(X+0.5,Y+0.5,W-1,H-1);
  }

  function redraw(img,x,y){
    const cv=cvRef.current;if(!cv||!img)return;
    const ctx=cv.getContext("2d");
    ctx.clearRect(0,0,cv.width,cv.height);
    ctx.drawImage(img,0,0,cv.width,cv.height);
    const f=FINISHES[fi];
    const T=VTYPES[typeId];
    drawWin(ctx,cv,x,y,ww,wh,fw,gt,re,ds,am,f,T);
  }

  React.useEffect(()=>{if(bgImg)redraw(bgImg,wx,wy);},[bgImg,wx,wy,ww,wh,fw,gt,re,ds,am,fi,typeId]);

  function loadImage(file){
    if(!file||!file.type.startsWith("image"))return;
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const cv=cvRef.current;if(!cv)return;
        const maxW=Math.min(860,window.innerWidth-50),maxH=520;
        const sc=Math.min(maxW/img.width,maxH/img.height,1);
        cv.width=Math.round(img.width*sc);cv.height=Math.round(img.height*sc);
        bgCanvas.width=cv.width;bgCanvas.height=cv.height;
        bgCanvas.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
        setBgImg(img);
        setWx(Math.round(cv.width*0.18));setWy(Math.round(cv.height*0.12));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function getPos(e,cv){
    const r=cv.getBoundingClientRect(),sc=cv.width/r.width;
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    return{x:(cx-r.left)*sc,y:(cy-r.top)*sc};
  }
  function onDown(e){
    const cv=cvRef.current;if(!cv)return;
    const p=getPos(e,cv);
    if(p.x>=wx&&p.x<=wx+ww&&p.y>=wy&&p.y<=wy+wh){drag.current=true;doff.current={x:p.x-wx,y:p.y-wy};cv.style.cursor="grabbing";}
  }
  function onMove(e){
    if(!drag.current)return;e.preventDefault();
    const cv=cvRef.current;if(!cv)return;
    const p=getPos(e,cv);
    const nx=Math.max(0,Math.min(cv.width-ww,p.x-doff.current.x));
    const ny=Math.max(0,Math.min(cv.height-wh,p.y-doff.current.y));
    setWx(nx);setWy(ny);
  }
  function onUp(){drag.current=false;if(cvRef.current)cvRef.current.style.cursor="crosshair";}

  function save(){
    const cv=cvRef.current;if(!cv){alert("Upload a photo first");return;}
    const a=document.createElement("a");a.download="window-preview.png";a.href=cv.toDataURL("image/png",1);a.click();
  }

  const inp={width:"100%",padding:"7px 9px",background:"#f8f9fb",border:"1px solid #dde1ea",borderRadius:6,color:"#1a2030",fontSize:12,boxSizing:"border-box"};
  const lbl={fontSize:11,color:"#6b7a99",fontWeight:600,display:"flex",justifyContent:"space-between",marginBottom:3,marginTop:8};
  const slStyle={width:"100%",accentColor:"#3b82f6"};

  return <div style={{display:"grid",gridTemplateColumns:"300px 1fr",gap:14,alignItems:"start"}} className="mg">
    {/* LEFT */}
    <div style={{display:"flex",flexDirection:"column",gap:11}}>
      <div style={{background:"#ffffff",border:"1px solid #e2e6ee",borderRadius:12,padding:14}}>
        <div style={{fontSize:12,fontWeight:700,color:"#6b7a99",textTransform:"uppercase",letterSpacing:1,marginBottom:10,borderBottom:"1px solid #e8eaf0",paddingBottom:7}}>📸 Room Photo</div>
        <label htmlFor="vis-upload"
          style={{display:"block",border:"2px dashed #374151",borderRadius:8,padding:20,textAlign:"center",cursor:"pointer",background:"#f8f9fb"}}
          onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor="#3b82f6";}}
          onDragLeave={e=>{e.currentTarget.style.borderColor="#374151";}}
          onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor="#374151";loadImage(e.dataTransfer.files[0]);}}>
          <div style={{fontSize:28,marginBottom:6}}>📷</div>
          <div style={{fontSize:12,color:"#5a6680"}}>Click or drag a room / wall photo</div>
        </label>
        <input id="vis-upload" type="file" accept="image/*" style={{display:"none"}} onChange={e=>loadImage(e.target.files[0])}/>
      </div>

      <div style={{background:"#ffffff",border:"1px solid #e2e6ee",borderRadius:12,padding:14}}>
        <div style={{fontSize:12,fontWeight:700,color:"#6b7a99",textTransform:"uppercase",letterSpacing:1,marginBottom:10,borderBottom:"1px solid #e8eaf0",paddingBottom:7}}>🪟 Configuration</div>
        <label style={{...lbl,marginTop:0}}>Window Type</label>
        <select value={typeId} onChange={e=>setTypeId(e.target.value)}
          style={{width:"100%",padding:"7px 9px",background:"#f8f9fb",border:"1px solid #dde1ea",borderRadius:6,color:"#1a2030",fontSize:12,marginBottom:8}}>
          <option value="2S">2 Track – 2 Shutter</option>
          <option value="3S">3 Track – 3 Shutter</option>
          <option value="4CO">4 Shutter – Centre Opening</option>
          <option value="6CO">6 Shutter – Centre Opening</option>
          <option value="2S1N">2 Shutter + 1 Mosquito Net</option>
          <option value="4S2N">4 Shutter + 2 Mosquito Net</option>
        </select>
        <label style={lbl}>Frame Finish</label>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:4}}>
          {FINISHES.map((f,i)=><div key={i} onClick={()=>setFi(i)}
            style={{width:28,height:28,borderRadius:"50%",background:f.frame,cursor:"pointer",
              border:fi===i?"3px solid #3b82f6":"3px solid transparent",
              boxShadow:fi===i?"0 0 0 1px #1e293b,0 0 0 3px #3b82f6":"none",
              transition:"all .2s",flexShrink:0}} title={f.name}/>)}
        </div>
      </div>

      <div style={{background:"#ffffff",border:"1px solid #e2e6ee",borderRadius:12,padding:14}}>
        <div style={{fontSize:12,fontWeight:700,color:"#6b7a99",textTransform:"uppercase",letterSpacing:1,marginBottom:10,borderBottom:"1px solid #e8eaf0",paddingBottom:7}}>⚙️ Adjust</div>
        <div style={{fontSize:11,color:"#16a34a",marginBottom:8,padding:"5px 8px",background:"#052e16",borderRadius:6}}>
          💡 Drag the window on the photo to reposition
        </div>
        {[
          {label:"Width",val:ww,set:setWw,min:90,max:560,unit:"px"},
          {label:"Height",val:wh,set:setWh,min:80,max:440,unit:"px"},
          {label:"Profile width",val:fw,set:setFw,min:4,max:22,unit:"px"},
          {label:"Glass tint",val:gt,set:setGt,min:0,max:40,unit:"%"},
          {label:"Reflection",val:re,set:setRe,min:0,max:80,unit:"%"},
          {label:"Drop shadow",val:ds,set:setDs,min:0,max:28,unit:"px"},
          {label:"Ambient light",val:am,set:setAm,min:20,max:100,unit:"%"},
        ].map(({label,val,set,min,max,unit})=><div key={label}>
          <div style={lbl}><span>{label}</span><span style={{color:"#2563eb",fontWeight:700}}>{val}{unit}</span></div>
          <input type="range" min={min} max={max} value={val} step={1} onChange={e=>set(+e.target.value)} style={slStyle}/>
        </div>)}

        <div style={{display:"flex",gap:8,marginTop:12}}>
          <button onClick={save}
            style={{flex:1,padding:"9px",background:"#111",color:"#fff",border:"1px solid #000",borderRadius:8,fontWeight:700,fontSize:12,cursor:"pointer"}}>
            💾 Save Image
          </button>
          <button onClick={()=>{if(bgImg){const cv=cvRef.current;setWx(Math.round(cv.width*0.18));setWy(Math.round(cv.height*0.12));}}}
            style={{flex:1,padding:"9px",background:"#ffffff",color:"#5a6680",border:"1px solid #dde1ea",borderRadius:8,fontWeight:600,fontSize:12,cursor:"pointer"}}>
            ↺ Reset
          </button>
        </div>

        {/* ADD TO QUOTATION SECTION */}
        <div style={{marginTop:14,padding:12,background:"#eef1f7",borderRadius:10,border:"1px solid #2d6a9f"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#2563eb",marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>
            📋 Add to Quotation
          </div>
          <div style={{fontSize:11,color:"#6b7a99",marginBottom:8}}>
            Select the series and type to match this window design, then send it directly to your quotation sheet.
          </div>
          <label style={{fontSize:10,color:"#6b7a99",fontWeight:600,display:"block",marginBottom:3}}>Series</label>
          <select value={seriesId} onChange={e=>setSeriesId(e.target.value)}
            style={{width:"100%",padding:"6px 8px",background:"#f8f9fb",border:"1px solid #dde1ea",borderRadius:6,color:"#1a2030",fontSize:12,marginBottom:7}}>
            {Object.values(SERIES).map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
          </select>
          <label style={{fontSize:10,color:"#6b7a99",fontWeight:600,display:"block",marginBottom:3}}>Window Type</label>
          <select value={typeId} onChange={e=>setTypeId(e.target.value)}
            style={{width:"100%",padding:"6px 8px",background:"#f8f9fb",border:"1px solid #dde1ea",borderRadius:6,color:"#1a2030",fontSize:12,marginBottom:7}}>
            <option value="2S">2 Track – 2 Shutter</option>
            <option value="3S">3 Track – 3 Shutter</option>
            <option value="4CO">4 Shutter – Centre Opening</option>
            <option value="6CO">6 Shutter – Centre Opening</option>
            <option value="2S1N">2 Shutter + 1 Mosquito Net</option>
            <option value="4S2N">4 Shutter + 2 Mosquito Net</option>
          </select>
          <label style={{fontSize:10,color:"#6b7a99",fontWeight:600,display:"block",marginBottom:3}}>Location / Name</label>
          <input value={location} onChange={e=>setLocation(e.target.value)}
            placeholder="e.g. Bedroom 1, Hall, Kitchen..."
            style={{width:"100%",padding:"6px 8px",background:"#f8f9fb",border:"1px solid #dde1ea",borderRadius:6,color:"#1a2030",fontSize:12,boxSizing:"border-box",marginBottom:8}}/>
          <button onClick={()=>{
              if(addToQuote){addToQuote(seriesId,VIS_TO_QUOTE[typeId]||"2T2S",location);setAdded(true);setTimeout(()=>setAdded(false),2500);}
            }}
            style={{width:"100%",padding:"10px",background:added?"#059669":"linear-gradient(135deg,#2563eb,#1d4ed8)",color:"#fff",border:"none",borderRadius:8,fontWeight:700,fontSize:13,cursor:"pointer",transition:"background .3s"}}>
            {added?"✅ Added! Opening Quotation tab...":"📋 Add to Quotation →"}
          </button>
        </div>
      </div>
    </div>

    {/* RIGHT — CANVAS */}
    <div style={{background:"#f0f2f8",borderRadius:12,overflow:"hidden",minHeight:400,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",border:"1px solid #e2e6ee"}}>
      {!bgImg&&<div style={{textAlign:"center",color:"#8090aa",padding:40}}>
        <div style={{fontSize:52,marginBottom:12}}>📷</div>
        <div style={{fontSize:15,fontWeight:600,color:"#6b7280"}}>Upload a room photo</div>
        <div style={{fontSize:12,marginTop:8,color:"#8090aa",maxWidth:260}}>
          Take a photo of your wall or window opening, then overlay a realistic aluminium window to show your customer
        </div>
      </div>}
      <canvas ref={cvRef} style={{display:bgImg?"block":"none",maxWidth:"100%",cursor:"crosshair",userSelect:"none"}}
        onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}
        onTouchStart={e=>{e.preventDefault();onDown(e);}}
        onTouchMove={e=>{e.preventDefault();onMove(e);}}
        onTouchEnd={onUp}/>
      {bgImg&&<div style={{padding:"6px 12px",fontSize:11,color:"#8090aa",textAlign:"center"}}>
        Drag the window to reposition • Use sliders to resize and adjust
      </div>}
    </div>
  </div>;
}

// PERSISTENT STORAGE — saves all data to localStorage automatically
// ══════════════════════════════════════════════════════════════════════════════
const STORE_KEY = "alumcalc_data_v1";

function loadStore(){
  try{
    const raw=localStorage.getItem(STORE_KEY);
    return raw?JSON.parse(raw):{};
  }catch(e){return {};}
}

function saveStore(data){
  try{localStorage.setItem(STORE_KEY,JSON.stringify(data));}
  catch(e){console.warn("Storage save failed",e);}
}

// usePersist — like useState but auto-saves to localStorage under a key
function usePersist(key, defaultVal){
  let init=defaultVal;
  try{
    const stored=loadStore();
    if(stored[key]!==undefined)init=stored[key];
  }catch(e){}
  const [val,setVal]=React.useState(init);
  function setAndSave(newVal){
    setVal(prev=>{
      const next=typeof newVal==="function"?newVal(prev):newVal;
      try{
        const store=loadStore();
        store[key]=next;
        saveStore(store);
      }catch(e){}
      return next;
    });
  }
  return [val,setAndSave];
}

}
function saveHistory(list){
  try{localStorage.setItem(HISTORY_KEY,JSON.stringify(list));}

}

// ROOT APP
// ══════════════════════════════════════════════════════════════════════════════
function App(){
  const [user,setUser]=usePersist("user",null);
  const [tab,setTab]=useState("calc");
  const [co,setCo]=usePersist("company",{name:"",tagline:"",phone:"",email:"",address:"",gst:"",website:""});
  const [rates,setRates]=usePersist("rates",{...DR});
  const [quoteRows,setQuoteRows]=usePersist("quoteRows",[newRow(),newRow()]);
  const [history,setHistory]=useState(loadHistory);

  function addToQuote(seriesId,typeId,location){
    const nr={...newRow(),id:uid(),seriesId,typeId,location:location||"",calc:null};
    setQuoteRows(prev=>[...prev,nr]);
    setTab("quote");
  }

  if(!user)return <LoginScreen onLogin={n=>setUser(n)}/>;

  return <div style={{minHeight:"100vh"}}>
    {/* HEADER */}
    <div style={{background:"linear-gradient(135deg,#2563eb,#1d4ed8)",borderBottom:"1px solid #2d6a9f"}}>
      <div style={{maxWidth:1300,margin:"0 auto",padding:"0 18px",display:"flex",alignItems:"center",gap:12}}>
        <div style={{width:34,height:34,background:"linear-gradient(135deg,#3b82f6,#1d4ed8)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0,margin:"8px 0"}}>🪟</div>
        <div style={{flex:1}}>
          <div style={{fontSize:15,fontWeight:700,color:"#2563eb"}}>AlumCalc Pro</div>
          <div style={{fontSize:9,color:"#6b7a99"}}>Alufabb Fenestration • 5 Series</div>
        </div>
        {/* NAV TABS */}
        <div style={{display:"flex"}}>
          {[["calc","📐 Calculator"],["quote","📋 Quotation"],["visual","🪟 Visualiser"],["company","🏢 My Company"],["rates","⚙️ Rates"]].map(([t,l])=>(
            <button key={t} className={"nav-tab"+(tab===t?" on":"")} onClick={()=>setTab(t)}>{l}</button>
          ))}
        </div>
        <div style={{fontSize:11,color:"#16a34a",marginLeft:8}}>📱 +91 {user}</div>
        <button onClick={()=>setUser(null)} style={{padding:"4px 9px",borderRadius:6,border:"1px solid #dde1ea",cursor:"pointer",fontSize:10,background:"transparent",color:"#7a8499",marginLeft:4}}>Logout</button>
      </div>
    </div>

    <div style={{maxWidth:1300,margin:"0 auto",padding:14}}>
      {tab==="calc"&&<CalcTab rates={rates} co={co}/>}
      {tab==="quote"&&<QuoteTab rates={rates} co={co} rows={quoteRows} setRows={setQuoteRows} history={history} setHistory={setHistory}/>}
      {tab==="rates"&&<RatesTab rates={rates} setRates={setRates}/>}
      {tab==="company"&&<CompanyTab co={co} setCo={setCo}/>}
      {tab==="visual"&&<VisualTab addToQuote={addToQuote}/>}
    </div>
  </div>;
}


class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={err:null};}
  static getDerivedStateFromError(err){return{err};}
  render(){
    if(this.state.err){
      return React.createElement("div",{style:{padding:32,fontFamily:"sans-serif",maxWidth:600,margin:"40px auto",background:"#fff",borderRadius:12,border:"1px solid #e2e6ee",boxShadow:"0 2px 16px rgba(0,0,0,0.08)"}},
        React.createElement("div",{style:{fontSize:32,marginBottom:12}},"⚠️"),
        React.createElement("h2",{style:{fontSize:18,marginBottom:8,color:"#1a2030"}},"Something went wrong"),
        React.createElement("p",{style:{fontSize:13,color:"#6b7a99",marginBottom:16}},"The app encountered an error. Please clear your browser cache and reload."),
        React.createElement("button",{
          onClick:()=>{try{localStorage.clear();}catch(e){}window.location.reload();},
          style:{padding:"10px 20px",background:"#2563eb",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:14}
        },"🔄 Clear Cache & Reload"),
        React.createElement("details",{style:{marginTop:16}},
          React.createElement("summary",{style:{fontSize:12,color:"#6b7a99",cursor:"pointer"}},"Error details"),
          React.createElement("pre",{style:{fontSize:11,color:"#dc2626",marginTop:8,whiteSpace:"pre-wrap"}},this.state.err.toString())
        )
      );
    }
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(ErrorBoundary,null,React.createElement(App,null))
);
</script>
