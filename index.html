<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useRef}=React;

// ─── SERIES DATA ─────────────────────────────────────────────────────────────
const SERIES={
  "29slim":{id:"29slim",label:"29mm Slim",color:"#3b82f6",
    wt:{t2:1.317,t3:1.943,sH:.942,sW:.942,cap:1.17,kpa:1.063,slim:.547,cc:.532,msH:.982,msW:.982,mi:.505,mc:.144},
    hasCap:true,hasKPA:true,types:["2T2S","3T3S","2T4SCO","3T6SCO","3T2S1N","3T4S2N"]},
  "25mm":{id:"25mm",label:"25mm Prestige",color:"#8b5cf6",
    wt:{t2:1.01,t3:1.238,sH:.741,sW:.741,cap:.18,kpa:.975,slim:.461,csW:.741},
    hasCap:true,hasKPA:true,types:["2T2S","3T3S"]},
  "27mm":{id:"27mm",label:"27mm",color:"#10b981",
    wt:{t2:.725,t3:1.172,sH:.716,sW:.716,interlock:.309},
    hasCap:false,hasKPA:false,types:["2T2S","3T3S","3T2S1N"]},
  "35mm":{id:"35mm",label:"35mm",color:"#f59e0b",
    wt:{t2:1.996,t3:2.809,sH:1.326,sW:1.326,kpa:1.063,slim:.481,csW:1.326},
    hasCap:false,hasKPA:true,types:["2T2S","3T3S"]},
  "37mm":{id:"37mm",label:"37mm",color:"#ef4444",
    wt:{t2:1.84,t3:2.678,sH:1.364,sW:1.364,kpa:1.063,slim:.689,csW:1.364},
    hasCap:false,hasKPA:true,types:["2T2S","3T3S"]},
};

const ALL_TYPES=[
  {id:"2T2S",  label:"2T-2S",       full:"2 Track 2 Shutter",          tracks:2,sh:2,hasNet:false,co:false},
  {id:"3T3S",  label:"3T-3S",       full:"3 Track 3 Shutter",          tracks:3,sh:3,hasNet:false,co:false},
  {id:"2T4SCO",label:"2T-4S (CO)",  full:"2 Track 4 Shutter Centre",   tracks:2,sh:4,hasNet:false,co:true},
  {id:"3T6SCO",label:"3T-6S (CO)",  full:"3 Track 6 Shutter Centre",   tracks:3,sh:6,hasNet:false,co:true},
  {id:"3T2S1N",label:"3T-2S+1Net",  full:"3 Track 2 Shutter + 1 Net",  tracks:3,sh:2,hasNet:true, co:false,nc:1},
  {id:"3T4S2N",label:"3T-4S+2Net",  full:"3 Track 4 Shutter + 2 Net",  tracks:3,sh:4,hasNet:true, co:false,nc:2},
];

const COLORS=[
  {id:"white",label:"White",      hex:"#F0F0EB",ral:"RAL 9016",add:0},
  {id:"black",label:"Black",      hex:"#2a2a2a",ral:"RAL 9005",add:15},
  {id:"grey", label:"Grey",       hex:"#8a8a8a",ral:"RAL 7040",add:12},
  {id:"custom",label:"Custom RAL",hex:"#c084fc",ral:"Custom",  add:25},
];

const DR={al:350,wst:.10,g5:55,net:35,ep:10,lb2:60,lb3:65,tr:100,pc:0,
  b2:80,b3:110,cl:90,cl3:210,mp:300,nh:45,tn:25,pr:23,crd:45,
  alp:5,wp:1,wd:7,fn:4,ws:3,bs:35,st:33,ad:45,si:185,kp:25,sl:3,ic:4.5};

const mf=m=>m/304.8;
const sf=(w,h)=>(w/304.8)*(h/304.8);
const fm=n=>"₹"+n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",");
const fn=(n,d=2)=>typeof n==="number"?n.toFixed(d):"-";
const uid=()=>Math.random().toString(36).slice(2,8);

// ─── CALC ENGINE ─────────────────────────────────────────────────────────────
function doCalc(W,H,type,series,rates,lock,cid){
  const w=+W,h=+H;
  if(!w||!h||w<200||h<200)return null;
  const wt=series.wt;
  const isKPA=series.hasKPA&&h>1800;
  const tr=type.tracks,SH=type.sh,co=type.co,hn=type.hasNet,nc=type.nc||0;
  const secs=[];
  const add=(n,sz,q,weight)=>{const mtr=(sz/1000)*q,kg=mtr*weight,amt=kg*rates.al;secs.push({n,sz,q,mtr,wt:weight,kg,amt});};
  const tw=tr===2?wt.t2:wt.t3;
  add(tr+" Track W",w,2,tw); add(tr+" Track H",h,2,tw);
  let sw;
  if(!co){
    if(tr===2){sw=(w-107)/2;add("Shutter Bottom",sw,4,wt.sW);add("Shutter H",h-85,SH,wt.sH);}
    else{sw=(w-106)/3;add("Shutter Bottom 45+90",sw,4,wt.sW);add("Shutter H",h-85,2,wt.sH);add("Centre Shutter 90+90",sw-23,2,wt.csW||wt.sW);}
  } else {
    sw=(w-136)/4;add("Shutter Bottom",sw,8,wt.sW);
    if(tr===3)add("Centre Shutter",sw-22,4,wt.csW||wt.sW);
    add("Shutter H",h-85,4,wt.sH);
  }
  if(series.hasCap)add("Track Cap",w-101,tr,wt.cap);
  let ikpa=co?(tr===2?2:4):(tr===2?1:2),islim=ikpa;
  if(!isKPA||!series.hasKPA)ikpa=0;
  if(series.id==="27mm"){add("Interlock",h-85,islim,wt.interlock);}
  else{if(ikpa>0)add("Interlock KPA",h-85,ikpa,wt.kpa);add("Interlock Slim",h-85,islim,wt.slim);if(co)add("Centre Clip",h-85,1,.532);}
  if(hn){add("Mesh Shutter H",h-85,nc,.982);add("Mesh Top/Bottom",sw||(w-107)/2,nc*2,.982);add("Mesh Interlock",h-85,nc,.505);add("Mesh Clip H",h-103,nc*2,.144);add("Mesh Clip W",(w/(SH/nc))-35,nc*2,.144);}
  const twt=secs.reduce((s,x)=>s+x.kg,0),wst=twt*rates.wst,alAmt=(twt+wst)*rates.al;
  const glass=[];
  const gsw=co?sw-37:(tr===2?(w-107)/2:(w-106)/3)-37,gsh=h-85-103;
  glass.push({n:"5mm Clear Glass",sw:gsw,sh:gsh,q:co?4:2});
  if(tr===3&&!co)glass.push({n:"5mm Clear (Centre)",sw:(w-106)/3-23+27,sh:gsh,q:1});
  if(co&&tr===3)glass.push({n:"5mm Clear (Centre)",sw:sw-22+27,sh:gsh,q:2});
  if(hn)glass.push({n:"Mosquito Net SS304",sw:(w/SH)*nc,sh:h,q:nc,isNet:true});
  glass.forEach(g=>{g.sqe=sf(g.sw,g.sh);g.tsq=g.sqe*g.q;g.amt=g.tsq*(g.isNet?rates.net:rates.g5);});
  const glAmt=glass.reduce((s,g)=>s+g.amt,0);
  const hw=[];const tSq=sf(w,h);const is3=tr===3;
  hw.push({n:"Bearing",q:SH*2,r:is3?rates.b3:rates.b2});
  hw.push({n:"Concealed Lock",q:Math.ceil(SH/2),r:is3?rates.cl3:rates.cl});
  hw.push({n:"Wool Pile W",q:+(mf(w)*(tr===2?3:SH)).toFixed(2),r:rates.wp,u:"rft"});
  hw.push({n:"Wool Pile H",q:+(mf(h)*(tr===2?3:SH)).toFixed(2),r:rates.wp,u:"rft"});
  hw.push({n:"Water Drain Cap",q:tr===2?3:4,r:rates.wd});
  hw.push({n:"Fastener",q:SH*3,r:rates.fn});hw.push({n:"Wall Screw",q:SH*3,r:rates.ws});
  hw.push({n:"Bump Stopper",q:Math.ceil(SH/2),r:rates.bs});
  hw.push({n:"Sticker",q:SH*2,r:rates.st});hw.push({n:"Anti Dust",q:Math.ceil(SH/2),r:rates.ad});
  hw.push({n:"Silicon",q:1,r:rates.si});
  if(isKPA&&series.hasKPA)hw.push({n:"KPA Cover",q:ikpa*2,r:rates.kp});
  hw.push({n:"Silicon Labour",q:+tSq.toFixed(2),r:rates.sl,u:"sqft"});
  hw.push({n:"Interlock Cap",q:(ikpa+islim)*2,r:rates.ic});
  if(hn)hw.push({n:"Anti Lift Patti",q:4,r:rates.alp});
  const lockAmt=lock==="mp"?rates.mp*Math.ceil(SH/2)+(SH<=2?3:SH*1.5)*(rates.nh+rates.tn)+Math.ceil(h/1000)*rates.pr+Math.ceil(SH/2)*rates.crd:0;
  const hwAmt=hw.reduce((s,x)=>s+(+x.q)*x.r,0)+lockAmt;
  const epW=mf(w)*SH,epH=mf(h)*SH,epT=(mf(w)+mf(h))*tr;
  let totEp=epW+epH+epT;if(hn)totEp+=mf(w/SH*nc+h)*nc;
  const epAmt=totEp*rates.ep;
  const lbR=tr===2?rates.lb2:rates.lb3,lbAmt=tSq*lbR;
  const color=COLORS.find(c=>c.id===cid)||COLORS[0];
  const pcR=(rates.pc||0)+color.add,pcAmt=pcR>0?tSq*pcR:0;
  const unitTotal=alAmt+glAmt+hwAmt+epAmt+lbAmt+rates.tr+pcAmt;
  return{w,h,type,series,tSq,alAmt,glAmt,hwAmt,epAmt,lbAmt,pcAmt,transport:rates.tr,unitTotal,sqR:unitTotal/tSq,isKPA,color,secs,glass,hw,lockAmt,lock,twt,wst,epW,epH,epT,totEp,lbR};
}

// ─── PDF GENERATOR ───────────────────────────────────────────────────────────
function makePDF(rows,cName,pName,projectRef){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const PW=210,m=14;let y=m;
  // Header
  doc.setFillColor(13,33,55);doc.rect(0,0,PW,42,"F");
  doc.setTextColor(147,197,253);doc.setFontSize(20);doc.setFont("helvetica","bold");
  doc.text("ALUFABB FENESTRATION",m,17);
  doc.setFontSize(8.5);doc.setFont("helvetica","normal");doc.setTextColor(100,116,139);
  doc.text("Aluminium Window Specialists | Multi-Series Calculator",m,24);
  doc.text("📞 Contact us for installation & warranty",m,30);
  doc.setFillColor(37,99,235);doc.rect(0,42,PW,9,"F");
  doc.setTextColor(255,255,255);doc.setFontSize(10);doc.setFont("helvetica","bold");
  doc.text("WINDOW QUOTATION",m,48);
  doc.text("Date: "+new Date().toLocaleDateString("en-IN"),PW-m-38,48);
  y=56;
  // Customer info
  doc.setFillColor(22,33,52);doc.roundedRect(m,y,PW-m*2,22,2,2,"F");
  doc.setTextColor(147,197,253);doc.setFontSize(9);doc.setFont("helvetica","bold");
  doc.text("CUSTOMER DETAILS",m+4,y+6);
  doc.setTextColor(226,232,240);doc.setFont("helvetica","normal");doc.setFontSize(8.5);
  if(cName)doc.text("Customer: "+cName,m+4,y+13);
  if(pName)doc.text("Project / Site: "+pName,m+95,y+13);
  if(projectRef)doc.text("Ref No: "+projectRef,m+4,y+19);
  y+=26;
  // Window table header
  doc.setFillColor(37,99,235);doc.rect(m,y,PW-m*2,8,"F");
  doc.setTextColor(255,255,255);doc.setFontSize(8);doc.setFont("helvetica","bold");
  const cols=[m+2,m+6,m+26,m+52,m+72,m+92,m+108,m+122,m+138,m+158,m+178];
  ["#","Location","Series / Type","W(mm)","H(mm)","Sqft","Qty","Unit Price","Total Price","Sqft Rate"].forEach((h,i)=>doc.text(h,cols[i],y+5.5));
  y+=8;
  let grandTotal=0,grandSqft=0,grandQty=0;
  rows.forEach((row,idx)=>{
    if(!row.calc)return;
    const r=row.calc,q=row.qty||1;
    const rowTotal=r.unitTotal*q;
    grandTotal+=rowTotal;grandSqft+=r.tSq*q;grandQty+=q;
    doc.setFillColor(idx%2===0?25:20,idx%2===0?35:28,idx%2===0?55:46);
    doc.rect(m,y,PW-m*2,7,"F");
    doc.setTextColor(226,232,240);doc.setFont("helvetica","normal");doc.setFontSize(7.5);
    doc.text(""+(idx+1),cols[0],y+5);
    doc.text(row.location||"-",cols[1],y+5);
    doc.text(r.series.label+" / "+r.type.label,cols[2],y+5);
    doc.text(""+r.w,cols[3],y+5);
    doc.text(""+r.h,cols[4],y+5);
    doc.text(fn(r.tSq),cols[5],y+5);
    doc.text(""+q,cols[6],y+5);
    doc.text(fm(r.unitTotal),cols[7],y+5);
    doc.text(fm(rowTotal),cols[8],y+5);
    doc.text(fm(r.sqR),cols[9],y+5);
    y+=7;
    if(y>260){doc.addPage();y=20;}
  });
  // Grand total
  y+=2;
  doc.setFillColor(13,33,55);doc.rect(m,y,PW-m*2,10,"F");
  doc.setTextColor(147,197,253);doc.setFont("helvetica","bold");doc.setFontSize(9);
  doc.text("GRAND TOTAL ("+grandQty+" windows, "+fn(grandSqft)+" sqft)",m+3,y+7);
  doc.setTextColor(74,222,128);doc.setFontSize(11);
  doc.text(fm(grandTotal),PW-m-3,y+7,"right");
  y+=14;
  // Per-window breakdown
  doc.setTextColor(147,197,253);doc.setFontSize(9);doc.setFont("helvetica","bold");
  doc.text("DETAILED BREAKDOWN PER WINDOW",m,y);y+=7;
  rows.forEach((row,idx)=>{
    if(!row.calc)return;
    const r=row.calc,q=row.qty||1;
    if(y>240){doc.addPage();y=20;}
    doc.setFillColor(22,33,52);doc.roundedRect(m,y,PW-m*2,8,1,1,"F");
    doc.setTextColor(147,197,253);doc.setFontSize(8.5);doc.setFont("helvetica","bold");
    const loc=row.location?" – "+row.location:"";
    doc.text("Window "+(idx+1)+loc+" | "+r.series.label+" | "+r.type.full+" | "+r.w+"×"+r.h+"mm | Qty: "+q,m+3,y+5.5);
    y+=8;
    const bRows=[["Aluminium",r.alAmt],["Glass",r.glAmt],["Hardware",r.hwAmt],["EPDM Rubber",r.epAmt],["Labour",r.lbAmt],["Transport",r.transport]];
    if(r.pcAmt>0)bRows.push(["Powder Coating ("+r.color.label+")",r.pcAmt]);
    bRows.forEach((br,bi)=>{
      doc.setFillColor(bi%2===0?28:22,bi%2===0?40:33,bi%2===0?62:50);
      doc.rect(m,y,PW-m*2,5.5,"F");
      doc.setTextColor(200,210,226);doc.setFont("helvetica","normal");doc.setFontSize(7.5);
      doc.text(br[0],m+4,y+4);doc.text(fm(br[1]),PW-m-3,y+4,"right");
      y+=5.5;
    });
    doc.setFillColor(13,25,45);doc.rect(m,y,PW-m*2,6,"F");
    doc.setTextColor(74,222,128);doc.setFont("helvetica","bold");doc.setFontSize(8);
    doc.text("Unit Total",m+4,y+4.5);doc.text(fm(r.unitTotal),PW-m-60,y+4.5);
    doc.text("× "+q+" = "+fm(r.unitTotal*q),PW-m-3,y+4.5,"right");
    y+=9;
  });
  // Terms
  if(y>240){doc.addPage();y=20;}
  doc.setFillColor(22,33,52);doc.roundedRect(m,y,PW-m*2,24,2,2,"F");
  doc.setTextColor(147,197,253);doc.setFontSize(8.5);doc.setFont("helvetica","bold");doc.text("TERMS & CONDITIONS",m+4,y+7);
  doc.setTextColor(148,163,184);doc.setFont("helvetica","normal");doc.setFontSize(7.5);
  doc.text("• This estimate is valid for 15 days from the date of issue.",m+4,y+13);
  doc.text("• 50% advance payment required to confirm order.",m+4,y+18);
  doc.text("• Prices subject to change based on market rates of aluminium.",m+4,y+23);
  // Footer
  const pages=doc.internal.getNumberOfPages();
  for(let i=1;i<=pages;i++){
    doc.setPage(i);
    doc.setFillColor(13,33,55);doc.rect(0,287,PW,10,"F");
    doc.setTextColor(100,116,139);doc.setFontSize(7);
    doc.text("AlumCalc Pro | ALUFABB FENESTRATION | Page "+i+" of "+pages,PW/2,293,"center");
  }
  doc.save("Quotation_"+(cName||"AlumCalc")+"_"+new Date().toLocaleDateString("en-IN").replace(/\//g,"-")+".pdf");
}

// ─── STYLES ──────────────────────────────────────────────────────────────────
const S={
  card:{background:"#1e293b",border:"1px solid #2d3748",borderRadius:12,padding:14},
  inp:{width:"100%",padding:"7px 9px",background:"#0f1117",border:"1px solid #374151",borderRadius:6,color:"#e2e8f0",fontSize:12,boxSizing:"border-box"},
  sel:{width:"100%",padding:"7px 9px",background:"#0f1117",border:"1px solid #374151",borderRadius:6,color:"#e2e8f0",fontSize:12},
  lbl:{fontSize:10,color:"#64748b",fontWeight:600,display:"block",marginBottom:3,marginTop:6},
  th:{padding:"7px 8px",color:"#64748b",fontWeight:600,fontSize:11,borderBottom:"1px solid #1e3a5f",whiteSpace:"nowrap"},
  td:{padding:"6px 8px",fontSize:11,borderBottom:"1px solid #1e293b",verticalAlign:"middle"},
};

function newRow(){
  return{id:uid(),location:"",seriesId:"29slim",typeId:"2T2S",W:"",H:"",qty:1,lock:"concealed",cid:"white",calc:null,expanded:false};
}

// ─── MAIN APP ────────────────────────────────────────────────────────────────
function App(){
  const [cName,setCName]=useState("");
  const [pName,setPName]=useState("");
  const [pRef,setPRef]=useState("");
  const [rows,setRows]=useState([newRow()]);
  const [rates]=useState({...DR});
  const [showDetail,setShowDetail]=useState(null); // row id for detail modal

  const updateRow=(id,key,val)=>setRows(prev=>prev.map(r=>r.id===id?{...r,[key]:val,calc:null}:r));

  const calcRow=(id)=>{
    setRows(prev=>prev.map(r=>{
      if(r.id!==id)return r;
      const series=SERIES[r.seriesId];
      const availTypes=ALL_TYPES.filter(t=>series.types.includes(t.id));
      const type=availTypes.find(t=>t.id===r.typeId)||availTypes[0];
      const c=doCalc(r.W,r.H,type,series,rates,r.lock,r.cid);
      return{...r,calc:c};
    }));
  };

  const calcAll=()=>{
    setRows(prev=>prev.map(r=>{
      const series=SERIES[r.seriesId];
      const availTypes=ALL_TYPES.filter(t=>series.types.includes(t.id));
      const type=availTypes.find(t=>t.id===r.typeId)||availTypes[0];
      const c=doCalc(r.W,r.H,type,series,rates,r.lock,r.cid);
      return{...r,calc:c};
    }));
  };

  const duplicateRow=(id)=>{
    const idx=rows.findIndex(r=>r.id===id);
    const src=rows[idx];
    const nr={...src,id:uid(),calc:null};
    const next=[...rows];next.splice(idx+1,0,nr);
    setRows(next);
  };

  const deleteRow=(id)=>setRows(prev=>prev.filter(r=>r.id!==id));
  const addRow=()=>setRows(prev=>[...prev,newRow()]);

  const totals=useMemo(()=>{
    const valid=rows.filter(r=>r.calc);
    const grandTotal=valid.reduce((s,r)=>s+r.calc.unitTotal*(r.qty||1),0);
    const grandSqft=valid.reduce((s,r)=>s+r.calc.tSq*(r.qty||1),0);
    const grandQty=valid.reduce((s,r)=>s+(r.qty||1),0);
    return{grandTotal,grandSqft,grandQty,count:valid.length};
  },[rows]);

  const detailRow=showDetail?rows.find(r=>r.id===showDetail):null;

  return<div style={{minHeight:"100vh"}}>
    {/* HEADER */}
    <div style={{background:"linear-gradient(135deg,#1e3a5f,#0d2137)",borderBottom:"2px solid #2d6a9f",padding:"12px 18px",display:"flex",alignItems:"center",gap:12}}>
      <div style={{width:36,height:36,background:"linear-gradient(135deg,#3b82f6,#1d4ed8)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>🪟</div>
      <div style={{flex:1}}>
        <div style={{fontSize:16,fontWeight:700,color:"#93c5fd"}}>AlumCalc Pro – Quotation Builder</div>
        <div style={{fontSize:10,color:"#64748b"}}>Alufabb Fenestration • Multiple Window Sizes</div>
      </div>
    </div>

    <div style={{maxWidth:1300,margin:"0 auto",padding:16}}>

      {/* CUSTOMER DETAILS */}
      <div style={{...S.card,marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:1,marginBottom:12,borderBottom:"1px solid #2d3748",paddingBottom:7}}>👤 Customer & Project Details</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}} className="full-mob">
          <div>
            <label style={S.lbl}>Customer Name</label>
            <input value={cName} onChange={e=>setCName(e.target.value)} placeholder="e.g. Mr. Ramesh Sharma" style={S.inp}/>
          </div>
          <div>
            <label style={S.lbl}>Project / Site Name</label>
            <input value={pName} onChange={e=>setPName(e.target.value)} placeholder="e.g. Sharma Residence, Surat" style={S.inp}/>
          </div>
          <div>
            <label style={S.lbl}>Quote Reference No.</label>
            <input value={pRef} onChange={e=>setPRef(e.target.value)} placeholder="e.g. AF-2026-001" style={S.inp}/>
          </div>
        </div>
      </div>

      {/* WINDOW ROWS TABLE */}
      <div style={{...S.card,marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,borderBottom:"1px solid #2d3748",paddingBottom:8}}>
          <div style={{fontSize:13,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:1}}>🪟 Windows List</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={calcAll}
              style={{padding:"7px 14px",background:"linear-gradient(135deg,#2563eb,#1d4ed8)",color:"#fff",border:"none",borderRadius:7,fontWeight:700,fontSize:12,cursor:"pointer"}}>
              ⚡ Calculate All
            </button>
            <button onClick={addRow}
              style={{padding:"7px 14px",background:"#1e293b",color:"#4ade80",border:"1px solid #4ade80",borderRadius:7,fontWeight:700,fontSize:12,cursor:"pointer"}}>
              + Add Window
            </button>
          </div>
        </div>

        {/* TABLE HEADER */}
        <div style={{overflowX:"auto"}}>
          <table style={{minWidth:900}}>
            <thead>
              <tr style={{background:"#0d2137"}}>
                <th style={{...S.th,width:30}}>#</th>
                <th style={{...S.th,width:110}}>Location / Name</th>
                <th style={{...S.th,width:130}}>Series</th>
                <th style={{...S.th,width:130}}>Window Type</th>
                <th style={{...S.th,width:80}}>Width mm</th>
                <th style={{...S.th,width:80}}>Height mm</th>
                <th style={{...S.th,width:55}}>Qty</th>
                <th style={{...S.th,width:80}}>Colour</th>
                <th style={{...S.th,width:70}}>Lock</th>
                <th style={{...S.th,width:90}}>Sqft</th>
                <th style={{...S.th,width:110}}>Unit Price</th>
                <th style={{...S.th,width:110}}>Total</th>
                <th style={{...S.th,width:100}}>Actions</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((row,idx)=>{
                const series=SERIES[row.seriesId];
                const availTypes=ALL_TYPES.filter(t=>series.types.includes(t.id));
                const isCalc=!!row.calc;
                const rowTotal=isCalc?row.calc.unitTotal*(row.qty||1):null;
                return(
                  <tr key={row.id} style={{background:idx%2===0?"#1a2540":"#162036"}} className="fi">
                    <td style={{...S.td,color:"#64748b",fontWeight:700,textAlign:"center"}}>{idx+1}</td>
                    <td style={S.td}>
                      <input value={row.location} onChange={e=>updateRow(row.id,"location",e.target.value)}
                        placeholder="e.g. Bedroom 1" style={{...S.inp,fontSize:11}}/>
                    </td>
                    <td style={S.td}>
                      <select value={row.seriesId} onChange={e=>{
                        const sid=e.target.value;
                        const s=SERIES[sid];
                        updateRow(row.id,"seriesId",sid);
                        if(!s.types.includes(row.typeId))updateRow(row.id,"typeId",s.types[0]);
                      }} style={{...S.sel,fontSize:11,borderColor:series.color+"66"}}>
                        {Object.values(SERIES).map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
                      </select>
                    </td>
                    <td style={S.td}>
                      <select value={row.typeId} onChange={e=>updateRow(row.id,"typeId",e.target.value)} style={{...S.sel,fontSize:11}}>
                        {availTypes.map(t=><option key={t.id} value={t.id}>{t.label}</option>)}
                      </select>
                    </td>
                    <td style={S.td}>
                      <input type="number" value={row.W} onChange={e=>updateRow(row.id,"W",e.target.value)}
                        placeholder="e.g. 1800" style={{...S.inp,textAlign:"right"}}/>
                    </td>
                    <td style={S.td}>
                      <input type="number" value={row.H} onChange={e=>updateRow(row.id,"H",e.target.value)}
                        placeholder="e.g. 1500" style={{...S.inp,textAlign:"right"}}/>
                    </td>
                    <td style={S.td}>
                      <input type="number" value={row.qty} min={1} onChange={e=>updateRow(row.id,"qty",+e.target.value)}
                        style={{...S.inp,textAlign:"center",width:50}}/>
                    </td>
                    <td style={S.td}>
                      <select value={row.cid} onChange={e=>updateRow(row.id,"cid",e.target.value)} style={{...S.sel,fontSize:11}}>
                        {COLORS.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
                      </select>
                    </td>
                    <td style={S.td}>
                      <select value={row.lock} onChange={e=>updateRow(row.id,"lock",e.target.value)} style={{...S.sel,fontSize:11}}>
                        <option value="concealed">Concealed</option>
                        <option value="mp">Multi-Pt</option>
                      </select>
                    </td>
                    <td style={{...S.td,textAlign:"right",color:isCalc?"#93c5fd":"#4b5563",fontWeight:600}}>
                      {isCalc?fn(row.calc.tSq):"—"}
                    </td>
                    <td style={{...S.td,textAlign:"right",color:isCalc?"#e2e8f0":"#4b5563",fontWeight:600}}>
                      {isCalc?fm(row.calc.unitTotal):"—"}
                    </td>
                    <td style={{...S.td,textAlign:"right",color:isCalc?"#4ade80":"#4b5563",fontWeight:700,fontSize:12}}>
                      {isCalc?fm(rowTotal):"—"}
                    </td>
                    <td style={{...S.td}}>
                      <div style={{display:"flex",gap:5,justifyContent:"center"}}>
                        <button onClick={()=>calcRow(row.id)} title="Calculate"
                          style={{padding:"4px 8px",background:"#2563eb",color:"#fff",border:"none",borderRadius:5,cursor:"pointer",fontSize:11,fontWeight:600}}>
                          ⚡
                        </button>
                        {isCalc&&<button onClick={()=>setShowDetail(row.id)} title="View Details"
                          style={{padding:"4px 8px",background:"#1e3a5f",color:"#93c5fd",border:"1px solid #2d6a9f",borderRadius:5,cursor:"pointer",fontSize:11}}>
                          📋
                        </button>}
                        <button onClick={()=>duplicateRow(row.id)} title="Duplicate"
                          style={{padding:"4px 8px",background:"#1e293b",color:"#94a3b8",border:"1px solid #374151",borderRadius:5,cursor:"pointer",fontSize:11}}>
                          ⧉
                        </button>
                        {rows.length>1&&<button onClick={()=>deleteRow(row.id)} title="Delete"
                          style={{padding:"4px 8px",background:"#450a0a",color:"#f87171",border:"1px solid #7f1d1d",borderRadius:5,cursor:"pointer",fontSize:11}}>
                          🗑
                        </button>}
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        {/* ADD ROW BUTTON */}
        <button onClick={addRow} style={{width:"100%",marginTop:10,padding:"9px",background:"transparent",color:"#4ade80",border:"1px dashed #4ade8066",borderRadius:8,fontWeight:600,fontSize:13,cursor:"pointer"}}>
          + Add Another Window
        </button>
      </div>

      {/* GRAND TOTAL BAR */}
      {totals.count>0&&<div style={{...S.card,marginBottom:14,background:"linear-gradient(135deg,#1e3a5f,#0d2137)",border:"1px solid #2d6a9f"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr auto",gap:12,alignItems:"center"}} className="full-mob">
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:11,color:"#64748b",marginBottom:2}}>Windows Calculated</div>
            <div style={{fontSize:22,fontWeight:800,color:"#93c5fd"}}>{totals.count}</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:11,color:"#64748b",marginBottom:2}}>Total Quantity</div>
            <div style={{fontSize:22,fontWeight:800,color:"#93c5fd"}}>{totals.grandQty}</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:11,color:"#64748b",marginBottom:2}}>Total Area</div>
            <div style={{fontSize:22,fontWeight:800,color:"#93c5fd"}}>{fn(totals.grandSqft)} sqft</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:11,color:"#64748b",marginBottom:2}}>GRAND TOTAL</div>
            <div style={{fontSize:26,fontWeight:800,color:"#4ade80"}}>{fm(totals.grandTotal)}</div>
          </div>
          <button onClick={()=>makePDF(rows,cName,pName,pRef)}
            style={{padding:"12px 20px",background:"linear-gradient(135deg,#059669,#047857)",color:"#fff",border:"none",borderRadius:10,fontWeight:700,fontSize:14,cursor:"pointer",whiteSpace:"nowrap"}}>
            📄 Download PDF Quote
          </button>
        </div>
      </div>}

      {/* SUMMARY TABLE */}
      {totals.count>0&&<div style={{...S.card,marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:1,marginBottom:12,borderBottom:"1px solid #2d3748",paddingBottom:7}}>📊 Quotation Summary</div>
        <div style={{overflowX:"auto"}}>
          <table style={{minWidth:700}}>
            <thead>
              <tr style={{background:"#0d2137"}}>
                {["#","Location","Series","Type","Size","Qty","Sqft","Unit Price","Total","Sqft Rate"].map(h=>(
                  <th key={h} style={{...S.th,textAlign:h==="Location"||h==="Series"||h==="Type"?"left":"right"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {rows.map((row,idx)=>{
                if(!row.calc)return null;
                const r=row.calc,q=row.qty||1;
                return(
                  <tr key={row.id} style={{borderBottom:"1px solid #1e3a5f"}}>
                    <td style={{...S.td,textAlign:"right",color:"#64748b",fontWeight:700}}>{idx+1}</td>
                    <td style={{...S.td,color:"#93c5fd",fontWeight:600}}>{row.location||"Window "+(idx+1)}</td>
                    <td style={{...S.td}}>
                      <span style={{padding:"2px 7px",background:r.series.color+"22",border:"1px solid "+r.series.color+"55",borderRadius:10,fontSize:10,color:r.series.color,fontWeight:700}}>
                        {r.series.label}
                      </span>
                    </td>
                    <td style={{...S.td,fontSize:10,color:"#94a3b8"}}>{r.type.full}</td>
                    <td style={{...S.td,textAlign:"right",fontWeight:600}}>{r.w}×{r.h}</td>
                    <td style={{...S.td,textAlign:"right"}}>{q}</td>
                    <td style={{...S.td,textAlign:"right"}}>{fn(r.tSq*q)}</td>
                    <td style={{...S.td,textAlign:"right"}}>{fm(r.unitTotal)}</td>
                    <td style={{...S.td,textAlign:"right",color:"#4ade80",fontWeight:700}}>{fm(r.unitTotal*q)}</td>
                    <td style={{...S.td,textAlign:"right",color:"#64748b"}}>{fm(r.sqR)}</td>
                  </tr>
                );
              })}
              {/* Grand total row */}
              <tr style={{background:"#0d2137",borderTop:"2px solid #2d6a9f"}}>
                <td colSpan={6} style={{...S.td,fontWeight:700,color:"#93c5fd",fontSize:13}}>GRAND TOTAL</td>
                <td style={{...S.td,textAlign:"right",fontWeight:700,color:"#93c5fd"}}>{fn(totals.grandSqft)}</td>
                <td style={S.td}></td>
                <td style={{...S.td,textAlign:"right",fontWeight:800,color:"#4ade80",fontSize:15}}>{fm(totals.grandTotal)}</td>
                <td style={{...S.td,textAlign:"right",color:"#64748b"}}>{fn(totals.grandTotal/totals.grandSqft)}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>}
    </div>

    {/* DETAIL MODAL */}
    {showDetail&&detailRow&&detailRow.calc&&(
      <div style={{position:"fixed",inset:0,background:"#000a",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}
        onClick={()=>setShowDetail(null)}>
        <div style={{background:"#1e293b",borderRadius:16,padding:20,maxWidth:620,width:"100%",maxHeight:"85vh",overflowY:"auto",border:"1px solid #2d6a9f"}}
          onClick={e=>e.stopPropagation()}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div>
              <div style={{fontSize:14,fontWeight:700,color:"#93c5fd"}}>
                {detailRow.location||"Window "+(rows.findIndex(r=>r.id===showDetail)+1)} – Detailed Breakdown
              </div>
              <div style={{fontSize:11,color:"#64748b",marginTop:2}}>
                {detailRow.calc.series.label} | {detailRow.calc.type.full} | {detailRow.calc.w}×{detailRow.calc.h}mm
              </div>
            </div>
            <button onClick={()=>setShowDetail(null)}
              style={{background:"#374151",color:"#9ca3af",border:"none",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:13}}>✕</button>
          </div>
          {[
            {label:"Aluminium",val:detailRow.calc.alAmt,sub:"Net: "+fn(detailRow.calc.twt)+"kg + Wastage: "+fn(detailRow.calc.wst)+"kg"},
            {label:"Glass",val:detailRow.calc.glAmt},
            {label:"Hardware",val:detailRow.calc.hwAmt},
            {label:"EPDM Rubber",val:detailRow.calc.epAmt,sub:fn(detailRow.calc.totEp)+" rft"},
            {label:"Labour ("+detailRow.calc.type.tracks+"T @ ₹"+detailRow.calc.lbR+"/sqft)",val:detailRow.calc.lbAmt},
            {label:"Transport",val:detailRow.calc.transport},
          ].map((item,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:i%2===0?"#0f1117":"#162032",borderRadius:6,marginBottom:4}}>
              <div>
                <div style={{fontSize:12,color:"#e2e8f0"}}>{item.label}</div>
                {item.sub&&<div style={{fontSize:10,color:"#64748b",marginTop:1}}>{item.sub}</div>}
              </div>
              <div style={{fontSize:13,fontWeight:600,color:"#e2e8f0"}}>{fm(item.val)}</div>
            </div>
          ))}
          {detailRow.calc.pcAmt>0&&(
            <div style={{display:"flex",justifyContent:"space-between",padding:"8px 12px",background:"#0f1117",borderRadius:6,marginBottom:4}}>
              <div style={{fontSize:12,color:"#e2e8f0"}}>Powder Coating ({detailRow.calc.color.label})</div>
              <div style={{fontSize:13,fontWeight:600,color:"#e2e8f0"}}>{fm(detailRow.calc.pcAmt)}</div>
            </div>
          )}
          <div style={{display:"flex",justifyContent:"space-between",padding:"10px 14px",background:"#0d2137",borderRadius:8,marginTop:8,border:"1px solid #2d6a9f"}}>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:"#93c5fd"}}>UNIT TOTAL</div>
              <div style={{fontSize:10,color:"#64748b",marginTop:2}}>{fn(detailRow.calc.tSq)} sqft @ {fm(detailRow.calc.sqR)}/sqft</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:20,fontWeight:800,color:"#4ade80"}}>{fm(detailRow.calc.unitTotal)}</div>
              {(detailRow.qty||1)>1&&<div style={{fontSize:12,color:"#93c5fd",marginTop:2}}>
                × {detailRow.qty} = {fm(detailRow.calc.unitTotal*(detailRow.qty||1))}
              </div>}
            </div>
          </div>
        </div>
      </div>
    )}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
