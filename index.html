<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AlumCalc Pro – Aluminium Window Estimator</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-JPJ6GD2X9J"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-JPJ6GD2X9J');</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0f1117;color:#e2e8f0;font-family:'Segoe UI',sans-serif;min-height:100vh}
    select,input{outline:none}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-track{background:#1e293b}
    ::-webkit-scrollbar-thumb{background:#374151;border-radius:3px}
    table{border-collapse:collapse;width:100%}
    .sw{width:34px;height:34px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s;flex-shrink:0}
    .sw:hover{transform:scale(1.1)}
    .sw.on{border-color:#3b82f6;transform:scale(1.15);box-shadow:0 0 0 2px #1e293b,0 0 0 4px #3b82f6}
    @media(max-width:720px){.mg{grid-template-columns:1fr!important}}
    @keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .fi{animation:fi .3s ease}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo}=React;

const COLORS=[
  {id:"white", label:"White",      hex:"#F0F0EB",ral:"RAL 9016",add:0},
  {id:"black", label:"Black",      hex:"#2a2a2a",ral:"RAL 9005",add:15},
  {id:"grey",  label:"Grey",       hex:"#8a8a8a",ral:"RAL 7040",add:12},
  {id:"custom",label:"Custom RAL", hex:"#c084fc",ral:"Custom",   add:25},
];

const TYPES=[
  {id:"2T2S",   label:"2 Track – 2 Shutter",                  tracks:2,sh:2,hasNet:false,co:false},
  {id:"3T3S",   label:"3 Track – 3 Shutter",                  tracks:3,sh:3,hasNet:false,co:false},
  {id:"2T4SCO", label:"2 Track – 4 Shutter (Centre Opening)", tracks:2,sh:4,hasNet:false,co:true},
  {id:"3T6SCO", label:"3 Track – 6 Shutter (Centre Opening)", tracks:3,sh:6,hasNet:false,co:true},
  {id:"3T2S1N", label:"3 Track – 2 Shutter + 1 Net",         tracks:3,sh:2,hasNet:true, co:false,nc:1},
  {id:"3T4S2N", label:"3 Track – 4 Shutter + 2 Net",         tracks:3,sh:4,hasNet:true, co:false,nc:2},
];

const WT={t2:1.317,t3:1.943,sH:.942,sW:.942,cap:1.17,kpa:1.063,slim:.547,cc:.532,msH:.982,msW:.982,mi:.505,mc:.144};
const DR={al:350,wst:.10,g5:55,net:35,ep:10,lb2:60,lb3:65,tr:100,pc:0,b2:80,b3:110,cl:90,cl3:210,mp:300,nh:45,tn:25,pr:23,crd:45,alp:5,wp:1,wd:7,fn:4,ws:3,bs:35,st:33,ad:45,si:185,kp:25,sl:3,ic:4.5};

const mf=m=>m/304.8;
const sf=(w,h)=>(w/304.8)*(h/304.8);
const fm=n=>"₹"+n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",");
const fn=(n,d=2)=>n.toFixed(d);

function doCalc(W,H,type,rates,lock,cid){
  const w=+W,h=+H;
  if(!w||!h||w<200||h<200)return null;
  const isKPA=h>1800,tr=type.tracks,SH=type.sh,co=type.co,hn=type.hasNet,nc=type.nc||0;
  const secs=[];
  const add=(n,sz,q,wt)=>secs.push({n,sz,q,mtr:(sz/1000)*q,wt,kg:(sz/1000)*q*wt,amt:(sz/1000)*q*wt*rates.al});
  const tw=tr===2?WT.t2:WT.t3;
  add(tr+" Track W",w,2,tw); add(tr+" Track H",h,2,tw);
  let sw;
  if(!co){
    sw=tr===2?(w-107)/2:(w-106)/3;
    add("Shutter Bottom",sw,4,WT.sW);
    add("Shutter H",h-85,tr===2?SH:2,WT.sH);
    if(tr===3&&SH===3)add("Centre Shutter",(w-106)/3-23,2,WT.sW);
  } else {
    sw=(w-136)/4;
    add("Shutter Bottom",sw,8,WT.sW);
    if(tr===3)add("Centre Shutter",sw-22,4,WT.sW);
    add("Shutter H",h-85,4,WT.sH);
  }
  add("Track Cap",w-101,tr,WT.cap);
  let ik=co?(tr===2?2:4):(tr===2?1:2),is2=ik;
  if(!isKPA)ik=0;
  if(ik>0)add("Interlock KPA",h-85,ik,WT.kpa);
  add("Interlock Slim",h-85,is2,WT.slim);
  if(co)add("Centre Clip",h-85,1,WT.cc);
  if(hn){add("Mesh Shutter H",h-85,nc,WT.msH);add("Mesh Top/Bottom",sw||(w-107)/2,nc*2,WT.msW);add("Mesh Interlock",h-85,nc,WT.mi);add("Mesh Clip H",h-103,nc*2,WT.mc);add("Mesh Clip W",(w/(SH/nc))-35,nc*2,WT.mc);}
  const twt=secs.reduce((s,x)=>s+x.kg,0),wst=twt*rates.wst,alAmt=(twt+wst)*rates.al;

  const glass=[];
  const gsw=(co?sw-37:(tr===2?(w-107)/2:(w-106)/3)-37),gsh=h-85-103;
  glass.push({n:"5mm Clear Glass",sw:gsw,sh:gsh,q:co?4:2});
  if(!co&&tr===3&&SH===3)glass.push({n:"5mm Clear (Centre)",sw:(w-106)/3-23+27,sh:gsh,q:1});
  if(co&&tr===3)glass.push({n:"5mm Clear (Centre)",sw:sw-22+27,sh:gsh,q:2});
  if(hn)glass.push({n:"Mosquito Net SS304",sw:(w/SH)*nc,sh:h,q:nc,isNet:true});
  glass.forEach(g=>{g.sqe=sf(g.sw,g.sh);g.tsq=g.sqe*g.q;g.amt=g.tsq*(g.isNet?rates.net:rates.g5);});
  const glAmt=glass.reduce((s,g)=>s+g.amt,0);

  const hw=[];
  const tSq=sf(w,h);
  hw.push({n:"Bearing",q:SH*2,r:tr===2?rates.b2:rates.b3});
  hw.push({n:"Concealed Lock",q:Math.ceil(SH/2),r:tr===2?rates.cl:rates.cl3,note:"OPT."});
  hw.push({n:"Wool Pile W",q:+(mf(w)*(tr===2?3:SH)).toFixed(2),r:rates.wp,u:"rft"});
  hw.push({n:"Wool Pile H",q:+(mf(h)*(tr===2?3:SH)).toFixed(2),r:rates.wp,u:"rft"});
  hw.push({n:"Water Drain Cap",q:tr===2?3:4,r:rates.wd});
  hw.push({n:"Fastener",q:SH*3,r:rates.fn});
  hw.push({n:"Wall Screw",q:SH*3,r:rates.ws});
  hw.push({n:"Bump Stopper",q:Math.ceil(SH/2),r:rates.bs});
  hw.push({n:"Sticker",q:SH*2,r:rates.st});
  hw.push({n:"Anti Dust",q:Math.ceil(SH/2),r:rates.ad});
  hw.push({n:"Silicon",q:1,r:rates.si});
  if(isKPA)hw.push({n:"KPA Cover",q:ik*2,r:rates.kp});
  hw.push({n:"Silicon Labour",q:+tSq.toFixed(2),r:rates.sl,u:"sqft"});
  hw.push({n:"Interlock Cap",q:(ik+is2)*2,r:rates.ic});
  if(hn)hw.push({n:"Anti Lift Patti",q:4,r:rates.alp});
  const lockAmt=lock==="mp"?rates.mp*Math.ceil(SH/2)+(SH<=2?3:SH*1.5)*(rates.nh+rates.tn)+Math.ceil(h/1000)*rates.pr+Math.ceil(SH/2)*rates.crd:0;
  const hwAmt=hw.reduce((s,x)=>s+(+x.q)*x.r,0)+lockAmt;

  const epW=mf(w)*SH,epH=mf(h)*SH,epT=(mf(w)+mf(h))*tr;
  let totEp=epW+epH+epT;
  if(hn)totEp+=mf(w/SH*nc+h)*nc;
  const epAmt=totEp*rates.ep;

  const lbR=tr===2?rates.lb2:rates.lb3,lbAmt=tSq*lbR;
  const color=COLORS.find(c=>c.id===cid)||COLORS[0];
  const pcR=(rates.pc||0)+color.add,pcAmt=pcR>0?tSq*pcR:0;
  const total=alAmt+glAmt+hwAmt+epAmt+lbAmt+rates.tr+pcAmt;
  return{w,h,type,tSq,secs,twt,wst,alAmt,glass,glAmt,hw,hwAmt,lockAmt,lock,epW,epH,epT,totEp,epAmt,lbR,lbAmt,pcAmt,pcR,color,transport:rates.tr,total,sqR:total/tSq,isKPA,ik,is2,sw};
}

// WINDOW DIAGRAM
function WinDiag({type,colorHex,W,H}){
  const PW=300,PH=200,fr=12,pd=10;
  const iW=PW-pd*2,iH=PH-pd*2;
  const {tracks:tr,sh,co,hasNet:hn,nc=0}=type;
  const fc=colorHex||"#cccccc";
  const gc="#a8d8f0",nc2="#86efac";
  const dim=W&&H?W+" x "+H+" mm":"";
  const shAW=hn?iW*0.67:iW;
  const ntAW=hn?iW*0.33:0;
  const shPW=shAW/sh;
  const ntPW=nc>0?ntAW/nc:0;
  const gy=pd+fr,gh=iH-fr*2;
  const arrow=i=>co?i<Math.floor(sh/2)?"←":"→":i%2===0?"←":"→";
  return(
    <svg viewBox={"0 0 "+PW+" "+(PH+26)} style={{width:"100%",maxWidth:340,display:"block",margin:"0 auto"}}>
      <rect x={0} y={0} width={PW} height={PH+26} fill="#0f1117" rx={8}/>
      <rect x={pd} y={pd} width={iW} height={iH} fill="none" stroke={fc} strokeWidth={fr} rx={2}/>
      {Array.from({length:sh},(_,i)=>{
        const px=pd+fr/2+i*shPW,pw=shPW,gx=px+4,gw=pw-8;
        return <g key={"s"+i}>
          <rect x={px} y={gy} width={pw} height={gh} fill="none" stroke={fc} strokeWidth={4} rx={1} opacity={.8}/>
          <rect x={gx+3} y={gy+3} width={gw-6} height={gh-6} fill={gc} opacity={.2} rx={1}/>
          <text x={gx+gw/2} y={gy+gh/2+5} textAnchor="middle" fill="#93c5fd" fontSize={15} opacity={.75}>{arrow(i)}</text>
          <text x={gx+gw/2} y={gy+gh-8} textAnchor="middle" fill="#475569" fontSize={7}>{"S"+(i+1)}</text>
        </g>;
      })}
      {hn&&Array.from({length:nc},(_,i)=>{
        const px=pd+fr/2+shAW+i*ntPW,pw=ntPW,gx=px+3,gw=pw-6;
        return <g key={"n"+i}>
          <rect x={px} y={gy} width={pw} height={gh} fill="#052e16" stroke={nc2} strokeWidth={3} rx={1}/>
          {Array.from({length:9},(_,j)=><line key={"h"+j} x1={gx+2} y1={gy+5+j*(gh-10)/8} x2={gx+gw-2} y2={gy+5+j*(gh-10)/8} stroke={nc2} strokeWidth={.8} opacity={.55}/>)}
          {Array.from({length:4},(_,j)=><line key={"v"+j} x1={gx+3+j*(gw-6)/3} y1={gy+3} x2={gx+3+j*(gw-6)/3} y2={gy+gh-3} stroke={nc2} strokeWidth={.8} opacity={.35}/>)}
          <text x={gx+gw/2} y={gy+gh/2-3} textAnchor="middle" fill={nc2} fontSize={10} fontWeight="bold">NET</text>
          <text x={gx+gw/2} y={gy+gh/2+10} textAnchor="middle" fill={nc2} fontSize={7} opacity={.8}>SS304</text>
        </g>;
      })}
      {hn&&<rect x={pd+fr/2+shAW-fr/2} y={gy-2} width={fr} height={gh+4} fill={fc} opacity={.9}/>}
      {Array.from({length:tr},(_,i)=><line key={i} x1={pd+fr} y1={pd+iH-fr/2-i*3} x2={PW-pd-fr} y2={pd+iH-fr/2-i*3} stroke={fc} strokeWidth={1.2} opacity={.3}/>)}
      {hn&&<>
        <rect x={pd} y={PH+4} width={10} height={7} fill={gc} opacity={.5} rx={1}/>
        <text x={pd+13} y={PH+10} fill="#94a3b8" fontSize={7.5}>Glass Shutter</text>
        <rect x={pd+80} y={PH+4} width={10} height={7} fill={nc2} opacity={.5} rx={1}/>
        <text x={pd+93} y={PH+10} fill="#94a3b8" fontSize={7.5}>Mosquito Net</text>
      </>}
      <text x={PW/2} y={PH+22} textAnchor="middle" fill="#64748b" fontSize={9}>{dim||type.label}</text>
    </svg>
  );
}

// COLOR PICKER
function ColPicker({sel,onChange,sqf,baseR}){
  const [ral,setRal]=useState("");
  const col=COLORS.find(c=>c.id===sel)||COLORS[0];
  return <div>
    <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:10}}>
      {COLORS.map(c=><div key={c.id} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
        <div className={"sw"+(sel===c.id?" on":"")} style={{background:c.hex,boxShadow:c.id==="white"?"inset 0 0 0 1px #777":""}} onClick={()=>onChange(c.id)} title={c.label}/>
        <span style={{fontSize:9,color:"#94a3b8"}}>{c.label}</span>
        {c.add>0&&<span style={{fontSize:8,color:"#fbbf24"}}>{"+₹"+c.add+"/sqft"}</span>}
      </div>)}
    </div>
    {sel==="custom"&&<div style={{marginBottom:8}}>
      <input value={ral} onChange={e=>setRal(e.target.value)} placeholder="Enter RAL code e.g. RAL 3020"
        style={{width:"100%",padding:"6px 10px",background:"#0f1117",border:"1px solid #374151",borderRadius:6,color:"#e2e8f0",fontSize:12}}/>
      <div style={{fontSize:10,color:"#64748b",marginTop:3}}>Custom RAL +₹25/sqft. We'll confirm availability.</div>
    </div>}
    {sqf>0&&<div style={{padding:"6px 10px",background:"#0d2137",borderRadius:6,fontSize:11,display:"flex",justifyContent:"space-between"}}>
      <span style={{color:"#94a3b8"}}>{"Powder Coating ("+fn(sqf)+" sqft x ₹"+((baseR||0)+col.add).toFixed(0)+")"}</span>
      <span style={{color:"#fbbf24",fontWeight:700}}>{fm(sqf*((baseR||0)+col.add))}</span>
    </div>}
  </div>;
}

// LOGIN SCREEN
function LoginScreen({onLogin}){
  const [phone,setPhone]=useState("");
  const [otp,setOtp]=useState("");
  const [step,setStep]=useState("phone");
  const [sending,setSending]=useState(false);
  const [err,setErr]=useState("");
  const [sentOtp,setSentOtp]=useState("");

  const send=()=>{
    if(phone.length!==10||!/^\d+$/.test(phone)){setErr("Please enter a valid 10-digit mobile number");return;}
    setErr(""); setSending(true);
    const code=Math.floor(100000+Math.random()*900000).toString();
    setSentOtp(code);
    setTimeout(()=>{
      setSending(false); setStep("otp");
      alert("Demo OTP: "+code+"\n(In production this will be sent via SMS to +91 "+phone+")");
    },1500);
  };

  const verify=()=>{
    if(otp===sentOtp){onLogin(phone);}
    else{setErr("Incorrect OTP. Please try again.");}
  };

  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#0f1117,#0d2137)",padding:20}}>
      <div style={{width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{width:64,height:64,background:"linear-gradient(135deg,#3b82f6,#1d4ed8)",borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,margin:"0 auto 12px"}}>🪟</div>
          <div style={{fontSize:24,fontWeight:800,color:"#93c5fd"}}>AlumCalc Pro</div>
          <div style={{fontSize:12,color:"#64748b",marginTop:4}}>Alufabb Fenestration</div>
        </div>
        <div style={{background:"#1e293b",borderRadius:16,padding:28,border:"1px solid #2d3748"}}>
          {step==="phone"?<>
            <div style={{fontSize:18,fontWeight:700,color:"#e2e8f0",marginBottom:4}}>Login with Mobile</div>
            <div style={{fontSize:12,color:"#64748b",marginBottom:20}}>Enter your 10-digit mobile number</div>
            <div style={{fontSize:11,color:"#64748b",fontWeight:600,marginBottom:6}}>Mobile Number</div>
            <div style={{display:"flex",gap:8,marginBottom:4}}>
              <div style={{padding:"10px 12px",background:"#0f1117",border:"1px solid #374151",borderRadius:8,color:"#94a3b8",fontSize:13,flexShrink:0}}>🇮🇳 +91</div>
              <input type="tel" maxLength={10} value={phone} onChange={e=>setPhone(e.target.value.replace(/\D/g,""))}
                placeholder="9876543210" onKeyDown={e=>e.key==="Enter"&&send()}
                style={{flex:1,padding:"10px 12px",background:"#0f1117",border:"1px solid #374151",borderRadius:8,color:"#e2e8f0",fontSize:16,letterSpacing:2}}/>
            </div>
            {err&&<div style={{fontSize:11,color:"#f87171",marginBottom:4}}>{err}</div>}
            <button onClick={send} disabled={sending}
              style={{width:"100%",marginTop:14,padding:"13px",background:sending?"#374151":"linear-gradient(135deg,#2563eb,#1d4ed8)",color:"#fff",border:"none",borderRadius:10,fontWeight:700,fontSize:14,cursor:sending?"not-allowed":"pointer"}}>
              {sending?"Sending OTP...":"Send OTP  →"}
            </button>
          </>:<>
            <div style={{fontSize:18,fontWeight:700,color:"#e2e8f0",marginBottom:4}}>Enter OTP</div>
            <div style={{fontSize:12,color:"#64748b",marginBottom:20}}>
              Sent to +91 {phone} &nbsp;
              <span style={{color:"#3b82f6",cursor:"pointer"}} onClick={()=>{setStep("phone");setOtp("");setErr("");}}>Change</span>
            </div>
            <div style={{fontSize:11,color:"#64748b",fontWeight:600,marginBottom:6}}>6-Digit OTP</div>
            <input type="tel" maxLength={6} value={otp} onChange={e=>setOtp(e.target.value.replace(/\D/g,""))}
              placeholder="● ● ● ● ● ●" onKeyDown={e=>e.key==="Enter"&&verify()}
              style={{width:"100%",padding:"12px",background:"#0f1117",border:"1px solid #374151",borderRadius:8,color:"#e2e8f0",fontSize:24,letterSpacing:12,textAlign:"center"}}/>
            {err&&<div style={{fontSize:11,color:"#f87171",marginTop:6}}>{err}</div>}
            <button onClick={verify}
              style={{width:"100%",marginTop:14,padding:"13px",background:"linear-gradient(135deg,#059669,#047857)",color:"#fff",border:"none",borderRadius:10,fontWeight:700,fontSize:14,cursor:"pointer"}}>
              Verify and Login ✓
            </button>
            <div style={{textAlign:"center",marginTop:12,fontSize:12,color:"#64748b"}}>
              Didn't receive? <span style={{color:"#3b82f6",cursor:"pointer"}} onClick={send}>Resend OTP</span>
            </div>
          </>}
        </div>
        <div style={{textAlign:"center",marginTop:16,fontSize:11,color:"#374151"}}>For business use only • Alufabb Fenestration</div>
      </div>
    </div>
  );
}

// PDF GENERATOR
function makePDF(r,qty,cName,pName){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const PW=210,m=15; let y=m;
  doc.setFillColor(13,33,55);doc.rect(0,0,PW,40,"F");
  doc.setTextColor(147,197,253);doc.setFontSize(20);doc.setFont("helvetica","bold");doc.text("ALUFABB FENESTRATION",m,18);
  doc.setFontSize(9);doc.setFont("helvetica","normal");doc.setTextColor(100,116,139);
  doc.text("Aluminium Window Specialists | 29mm Slim Series",m,26);
  doc.setFillColor(37,99,235);doc.rect(0,40,PW,10,"F");
  doc.setTextColor(255,255,255);doc.setFontSize(11);doc.setFont("helvetica","bold");
  doc.text("WINDOW ESTIMATE / QUOTATION",m,47);doc.text("Date: "+new Date().toLocaleDateString("en-IN"),PW-m-40,47);
  y=58;
  if(cName||pName){
    doc.setFillColor(30,41,59);doc.roundedRect(m,y,PW-m*2,18,2,2,"F");
    doc.setTextColor(147,197,253);doc.setFontSize(9);doc.setFont("helvetica","bold");
    if(cName)doc.text("Customer: "+cName,m+4,y+7);
    if(pName)doc.text("Project: "+pName,m+4,y+13);
    y+=22;
  }
  doc.setFillColor(30,41,59);doc.roundedRect(m,y,PW-m*2,28,2,2,"F");
  doc.setTextColor(147,197,253);doc.setFontSize(10);doc.setFont("helvetica","bold");doc.text("WINDOW SPECIFICATIONS",m+4,y+7);
  doc.setTextColor(226,232,240);doc.setFontSize(9);doc.setFont("helvetica","normal");
  doc.text("Type: "+r.type.label,m+4,y+14);doc.text("Width: "+r.w+" mm",m+95,y+14);
  doc.text("Area: "+fn(r.tSq)+" sq.ft per window",m+4,y+20);doc.text("Height: "+r.h+" mm",m+95,y+20);
  doc.text("Color: "+r.color.label+" ("+r.color.ral+")",m+4,y+26);doc.text("Quantity: "+qty,m+95,y+26);
  y+=32;
  doc.setTextColor(147,197,253);doc.setFontSize(10);doc.setFont("helvetica","bold");doc.text("COST BREAKDOWN",m,y+6);y+=10;
  doc.setFillColor(37,99,235);doc.rect(m,y,PW-m*2,7,"F");
  doc.setTextColor(255,255,255);doc.setFontSize(8);doc.setFont("helvetica","bold");
  doc.text("ITEM",m+3,y+5);doc.text("AMOUNT",PW-m-3,y+5,"right");y+=7;
  const rows=[["Aluminium (incl. wastage)",r.alAmt],["Glass",r.glAmt],["Hardware & Fittings",r.hwAmt],["EPDM Rubber",r.epAmt],["Labour",r.lbAmt],["Transport",r.transport]];
  if(r.pcAmt>0)rows.push(["Powder Coating – "+r.color.label,r.pcAmt]);
  rows.forEach((row,i)=>{
    doc.setFillColor(i%2===0?30:22,i%2===0?41:33,i%2===0?59:48);doc.rect(m,y,PW-m*2,6,"F");
    doc.setTextColor(226,232,240);doc.setFont("helvetica","normal");
    doc.text(row[0],m+3,y+4.5);doc.text(fm(row[1]),PW-m-3,y+4.5,"right");y+=6;
  });
  doc.setFillColor(13,33,55);doc.rect(m,y,PW-m*2,9,"F");
  doc.setTextColor(74,222,128);doc.setFontSize(10);doc.setFont("helvetica","bold");
  doc.text("TOTAL (per window)",m+3,y+6.5);doc.text(fm(r.total),PW-m-3,y+6.5,"right");y+=9;
  if(qty>1){
    doc.setFillColor(37,99,235);doc.rect(m,y,PW-m*2,9,"F");
    doc.setTextColor(255,255,255);doc.text("TOTAL FOR "+qty+" WINDOWS",m+3,y+6.5);doc.text(fm(r.total*qty),PW-m-3,y+6.5,"right");y+=9;
  }
  y+=4;doc.setTextColor(100,116,139);doc.setFontSize(8);doc.setFont("helvetica","normal");doc.text("Rate per sq.ft: "+fm(r.sqR),m,y);y+=12;
  doc.setFillColor(30,41,59);doc.roundedRect(m,y,PW-m*2,28,2,2,"F");
  doc.setTextColor(147,197,253);doc.setFontSize(9);doc.setFont("helvetica","bold");doc.text("TERMS & CONDITIONS",m+4,y+7);
  doc.setTextColor(148,163,184);doc.setFont("helvetica","normal");doc.setFontSize(8);
  doc.text("• This estimate is valid for 15 days from the date of issue.",m+4,y+13);
  doc.text("• 50% advance payment required to confirm order.",m+4,y+18);
  doc.text("• Prices subject to change based on market rates of aluminium.",m+4,y+23);
  doc.setFillColor(13,33,55);doc.rect(0,282,PW,15,"F");
  doc.setTextColor(100,116,139);doc.setFontSize(8);doc.text("Generated by AlumCalc Pro | ALUFABB FENESTRATION",PW/2,290,"center");
  doc.save("AlumCalc_Quote_"+new Date().toLocaleDateString("en-IN").replace(/\//g,"-")+".pdf");
}

const S={
  card:{background:"#1e293b",border:"1px solid #2d3748",borderRadius:12,padding:16},
  inp:{width:"100%",padding:"8px 10px",background:"#0f1117",border:"1px solid #374151",borderRadius:6,color:"#e2e8f0",fontSize:13,boxSizing:"border-box"},
  sel:{width:"100%",padding:"8px 10px",background:"#0f1117",border:"1px solid #374151",borderRadius:6,color:"#e2e8f0",fontSize:13},
  lbl:{fontSize:11,color:"#64748b",fontWeight:600,display:"block",marginBottom:4,marginTop:8},
  th:{padding:"6px 8px",color:"#64748b",fontWeight:600,fontSize:12,borderBottom:"1px solid #1e3a5f"},
  td:{padding:"6px 8px",fontSize:12,borderBottom:"1px solid #1e293b"},
};
function Card({title,children,style={}}){return<div style={{...S.card,...style}}>{title&&<div style={{fontSize:13,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:1,marginBottom:12,borderBottom:"1px solid #2d3748",paddingBottom:8}}>{title}</div>}{children}</div>;}
function SR({label,value,hi}){return<div style={{display:"flex",justifyContent:"space-between",fontSize:hi?13:12,fontWeight:hi?700:400,marginBottom:5}}><span style={{color:hi?"#93c5fd":"#94a3b8"}}>{label}</span><span style={{color:hi?"#4ade80":"#e2e8f0"}}>{value}</span></div>;}

function App(){

  const [tid,setTid]=useState("2T2S");
  const [W,setW]=useState("");

      <div style={{width:36,height:36,background:"linear-gradient(135deg,#3b82f6,#1d4ed8)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>🪟</div>

      </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>

              <div><label style={S.lbl}>Height (mm)</label><input type="number" value={H} onChange={e=>{setH(e.target.value);setRes(null);}} placeholder="e.g. 1500" style={S.inp}/></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div><label style={S.lbl}>Quantity</label><input type="number" value={qty} min={1} onChange={e=>setQty(+e.target.value)} style={S.inp}/></div>

          <button onClick={()=>setRes(preview)} disabled={!preview}

        </div>

        <div>
          {!res&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:380,textAlign:"center"}}>
            <div style={{fontSize:56,marginBottom:12}}>🪟</div>
            <div style={{fontSize:17,fontWeight:600,color:"#6b7280"}}>Configure and Calculate</div>

          {res&&<div className="fi">

              <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:16,alignItems:"start"}}>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:1,marginBottom:10,borderBottom:"1px solid #2d3748",paddingBottom:6}}>Cost Summary</div>
                  <SR label="Aluminium" value={fm(res.alAmt)}/>
                  <SR label="Glass" value={fm(res.glAmt)}/>
                  <SR label="Hardware" value={fm(res.hwAmt)}/>
                  <SR label="EPDM Rubber" value={fm(res.epAmt)}/>
                  <SR label="Labour" value={fm(res.lbAmt)}/>
                  <SR label="Transport" value={fm(res.transport)}/>
                  {res.pcAmt>0&&<SR label={"Powder Coating ("+res.color.label+")"} value={fm(res.pcAmt)}/>}
                </div>
                <div style={{background:"#0d2137",borderRadius:10,padding:14,textAlign:"center",minWidth:145}}>

                  <div style={{fontSize:10,color:"#64748b"}}>{fm(res.sqR)}/sqft</div>
                  {qty>1&&<>
                    <div style={{borderTop:"1px solid #1e3a5f",margin:"8px 0"}}/>

                  <div style={{marginTop:8,padding:"3px 8px",background:res.color.hex==="#F0F0EB"?"#374151":(res.color.hex+"33"),border:"1px solid "+res.color.hex,borderRadius:20,fontSize:9,color:res.color.hex==="#2a2a2a"?"#e2e8f0":res.color.hex}}>
                    {"● "+res.color.label}

                </div>
              </div>
              <button onClick={()=>makePDF(res,qty,cName,pName)}

                📄 Download PDF Quote
              </button>
            </Card>

            <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
              {["alum","glass","hardware","rubber","labour"].map(t=><button key={t} onClick={()=>setDt(t)}
                style={{padding:"6px 12px",borderRadius:6,border:"1px solid",cursor:"pointer",fontSize:12,fontWeight:600,background:dt===t?"#1d4ed8":"#1e293b",borderColor:dt===t?"#3b82f6":"#374151",color:dt===t?"#fff":"#9ca3af"}}>
                {t==="alum"?"Aluminium":t==="rubber"?"EPDM":t.charAt(0).toUpperCase()+t.slice(1)}

            {dt==="alum"&&<Card title="Aluminium Sections"><div style={{overflowX:"auto"}}>

                <td style={{...S.td,textAlign:"right"}}>{s.q}</td><td style={{...S.td,textAlign:"right"}}>{fn(s.mtr)}</td>
                <td style={{...S.td,textAlign:"right"}}>{s.wt}</td><td style={{...S.td,textAlign:"right"}}>{fn(s.kg)}</td>

            </Card>}

            {dt==="glass"&&<Card title="Glass Calculation"><div style={{overflowX:"auto"}}>
              <table><thead><tr>{["Type","W mm","H mm","Sqft","Qty","Total","Rate","Amount"].map(h=><th key={h} style={{...S.th,textAlign:h==="Type"?"left":"right"}}>{h}</th>)}</tr></thead>
              <tbody>{res.glass.map((g,i)=><tr key={i}>
                <td style={{...S.td,color:"#93c5fd"}}>{g.n}</td><td style={{...S.td,textAlign:"right"}}>{fn(g.sw,0)}</td>
                <td style={{...S.td,textAlign:"right"}}>{fn(g.sh,0)}</td><td style={{...S.td,textAlign:"right"}}>{fn(g.sqe)}</td>
                <td style={{...S.td,textAlign:"right"}}>{g.q}</td><td style={{...S.td,textAlign:"right"}}>{fn(g.tsq)}</td>

              </tr>)}</tbody></table>
              <div style={{marginTop:8,padding:"8px 12px",background:"#0d2137",borderRadius:6}}>
                <SR label="Total" value={fn(res.totEp)+" rft"}/>
                <div style={{display:"flex",justifyContent:"space-between",fontWeight:700,color:"#4ade80",fontSize:13}}><span>EPDM Total</span><span>{fm(res.epAmt)}</span></div>
              </div>
            </Card>}

            {dt==="labour"&&<Card title="Labour and Transport">
              <table><tbody>
                <tr style={{borderBottom:"1px solid #1e293b"}}>
                  <td style={{...S.td,color:"#93c5fd"}}>{"Labour ("+res.type.tracks+" Track)"}</td>
                  <td style={{...S.td,textAlign:"right"}}>{fn(res.tSq)+" sqft x ₹"+res.lbR}</td>
                  <td style={{...S.td,textAlign:"right",color:"#4ade80"}}>{fm(res.lbAmt)}</td>
                </tr>
                <tr>
                  <td style={{...S.td,color:"#93c5fd"}}>Transport</td>
                  <td style={{...S.td,textAlign:"right"}}>Fixed</td>
                  <td style={{...S.td,textAlign:"right",color:"#4ade80"}}>{fm(res.transport)}</td>
                </tr>
              </tbody></table>
            </Card>}
          </div>}
        </div>
      </div>}
    </div>
  </div>;
}

function RatesPanel({rates,setRates}){
  const [loc,setLoc]=useState({...rates});
  const grps=[
    {t:"Material Rates",f:[{k:"al",l:"Aluminium (₹/kg)"},{k:"g5",l:"5mm Glass (₹/sqft)"},{k:"net",l:"Mosquito Net (₹/sqft)"},{k:"ep",l:"EPDM Rubber (₹/rft)"},{k:"wst",l:"Wastage (%)",pct:true}]},
    {t:"Labour & Others",f:[{k:"lb2",l:"Labour 2 Track"},{k:"lb3",l:"Labour 3 Track"},{k:"tr",l:"Transport (fixed)"},{k:"pc",l:"Base Powder Coating"}]},
    {t:"Hardware",f:[{k:"b2",l:"Bearing 2T"},{k:"b3",l:"Bearing 3T"},{k:"cl",l:"Concealed Lock 2T"},{k:"cl3",l:"Concealed Lock 3T"},{k:"si",l:"Silicon"},{k:"ad",l:"Anti Dust"},{k:"bs",l:"Bump Stopper"},{k:"st",l:"Sticker"},{k:"kp",l:"KPA Cover"},{k:"ic",l:"Interlock Cap"},{k:"sl",l:"Silicon Labour"}]},
  ];
  const S2={...S.card};
  return<div>
    <div style={{fontSize:18,fontWeight:700,color:"#93c5fd",marginBottom:16}}>⚙️ Rate Configuration</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:14}}>
      {grps.map(g=><div key={g.t} style={S2}>
        <div style={{fontSize:12,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:1,marginBottom:10,borderBottom:"1px solid #2d3748",paddingBottom:6}}>{g.t}</div>
        {g.f.map(f=><div key={f.k} style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <label style={{fontSize:12,color:"#94a3b8",flex:1}}>{f.l}</label>
          <input type="number" value={f.pct?loc[f.k]*100:loc[f.k]} onChange={e=>setLoc(p=>({...p,[f.k]:f.pct?+e.target.value/100:+e.target.value}))}
            style={{...S.inp,width:80,textAlign:"right",padding:"4px 8px"}}/>
        </div>)}
      </div>)}
    </div>
    <div style={{marginTop:14,display:"flex",gap:10}}>
      <button onClick={()=>setRates({...loc})} style={{padding:"10px 24px",background:"#2563eb",color:"#fff",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer"}}>✓ Save Rates</button>
      <button onClick={()=>{setLoc({...DR});setRates({...DR});}} style={{padding:"10px 24px",background:"#374151",color:"#9ca3af",border:"1px solid #4b5563",borderRadius:8,fontWeight:600,cursor:"pointer"}}>Reset</button>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
