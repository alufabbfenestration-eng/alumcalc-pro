<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f4f6fb;color:#1e2840;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
input,select,textarea{font-family:inherit;outline:none;background:#fff;border:1px solid #dde2ee;border-radius:6px;color:#1e2840;padding:7px 10px;font-size:12px;width:100%}
input:focus,select:focus{border-color:#2563eb;box-shadow:0 0 0 3px #dbeafe}
table{border-collapse:collapse;width:100%}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#c8d0e0;border-radius:4px}
/* NAV TABS */
.ntab{padding:9px 12px;border:none;cursor:pointer;font-size:11px;font-weight:600;background:transparent;border-bottom:3px solid transparent;color:rgba(255,255,255,0.7);transition:.15s;white-space:nowrap}
.ntab.on{color:#fff;border-bottom-color:#fff}
.ntab:hover{color:#fff}
.pill{padding:5px 10px;border-radius:6px;border:1px solid;cursor:pointer;font-size:11px;font-weight:700;white-space:nowrap;transition:.15s}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
button:active{opacity:.8;transform:scale(.98)}
.pill:active{opacity:.8}
.fi{animation:fi .2s ease}
input[type=number]::-webkit-inner-spin-button{opacity:.5}
input[type=range]{background:transparent;cursor:pointer;padding:0;touch-action:pan-x}
/* MOBILE BASE */
@media(max-width:720px){
  .mg{grid-template-columns:1fr!important}
  .hide-mob{display:none!important}
  body{font-size:14px}
}
/* MOBILE HEADER */
.hdr{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.hdr-nav{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex:1}
.hdr-nav::-webkit-scrollbar{display:none}
.hdr-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
/* MOBILE TABLES — horizontal scroll */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:6px}
.tbl-wrap table{min-width:700px}
/* CARD STACK */
.card-stack{display:grid;gap:10px}
/* MOBILE GRID */
.g2{display:grid;grid-template-columns:340px 1fr;gap:14px}
@media(max-width:720px){.g2{grid-template-columns:1fr}}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:500px){.g3{grid-template-columns:1fr}}
.g2sm{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:400px){.g2sm{grid-template-columns:1fr}}
/* QUOTE TABLE MOBILE */
.qtbl{display:block}
@media(max-width:720px){
  .qtbl thead{display:none}
  .qtbl tr{display:block;border:1px solid #e4e8f0;border-radius:8px;margin-bottom:10px;padding:10px;background:#fff}
  .qtbl td{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border:none;font-size:12px}
  .qtbl td::before{content:attr(data-label);font-size:11px;color:#6b7a99;font-weight:600;flex-shrink:0;margin-right:8px}
  .qtbl td input,.qtbl td select{width:auto;max-width:130px}
}
/* TOUCH FRIENDLY BUTTONS */
@media(max-width:720px){
  button{min-height:38px}
  .btn-sm{min-height:30px!important;padding:4px 8px!important}
  input,select{padding:9px 10px;font-size:14px}
}
/* SUMMARY CARDS MOBILE */
.tot-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:12px;align-items:center}
@media(max-width:720px){.tot-grid{grid-template-columns:1fr 1fr;gap:8px}}
@media(max-width:400px){.tot-grid{grid-template-columns:1fr}}
/* DETAIL GRID */
.det-grid{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start}
@media(max-width:500px){.det-grid{grid-template-columns:1fr}}

<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#666;flex-direction:column;gap:12px"><div style="font-size:32px">🪟</div><div>Loading AlumCalc Pro...</div></div></div>
<script type="text/babel">
const {useState,useMemo,useRef,useEffect}=React;

// ── STORAGE ──────────────────────────────────────────────────────────────────
const SK="acp_v2";
function load(key,def){try{const d=JSON.parse(localStorage.getItem(SK)||"{}");return d[key]??def;}catch{return def;}}
function save(key,val){try{const d=JSON.parse(localStorage.getItem(SK)||"{}");d[key]=val;localStorage.setItem(SK,JSON.stringify(d));}catch{}}
function useSaved(key,def){
  const [v,sv]=useState(()=>load(key,def));
  function set(x){const n=typeof x==="function"?x(v):x;sv(n);save(key,n);}
  return[v,set];
}
const HK="acp_hist_v2";
function loadHist(){try{return JSON.parse(localStorage.getItem(HK)||"[]");}catch{return[];}}
function saveHist(h){try{localStorage.setItem(HK,JSON.stringify(h));}catch{}}
const uid=()=>Math.random().toString(36).slice(2,9);

// ── DATA ─────────────────────────────────────────────────────────────────────
const SERIES={
  "29slim":{id:"29slim",label:"29mm Slim",color:"#2563eb",wt:{t2:1.317,t3:1.943,sH:.942,sW:.942,cap:1.17,kpa:1.063,slim:.547,cc:.532,msH:.982,msW:.982,mi:.505,mc:.144},hasCap:true,hasKPA:true,types:["2T2S","3T3S","2T4SCO","3T6SCO","3T2S1N","3T4S2N"]},
  "25mm":{id:"25mm",label:"25mm Prestige",color:"#7c3aed",wt:{t2:1.01,t3:1.238,sH:.741,sW:.741,cap:.18,kpa:.975,slim:.461,csW:.741},hasCap:true,hasKPA:true,types:["2T2S","3T3S"]},
  "27mm":{id:"27mm",label:"27mm",color:"#059669",wt:{t2:.725,t3:1.172,sH:.716,sW:.716,interlock:.309},hasCap:false,hasKPA:false,types:["2T2S","3T3S","3T2S1N"]},
  "35mm":{id:"35mm",label:"35mm",color:"#d97706",wt:{t2:1.996,t3:2.809,sH:1.326,sW:1.326,kpa:1.063,slim:.481,csW:1.326},hasCap:false,hasKPA:true,types:["2T2S","3T3S"]},
  "37mm":{id:"37mm",label:"37mm",color:"#dc2626",wt:{t2:1.84,t3:2.678,sH:1.364,sW:1.364,kpa:1.063,slim:.689,csW:1.364},hasCap:false,hasKPA:true,types:["2T2S","3T3S"]},
};
const TYPES=[
  {id:"2T2S",  label:"2T-2S",full:"2 Track 2 Shutter",        tr:2,sh:2,net:false,co:false},
  {id:"3T3S",  label:"3T-3S",full:"3 Track 3 Shutter",        tr:3,sh:3,net:false,co:false},
  {id:"2T4SCO",label:"2T-4S(CO)",full:"2 Track 4 Shutter Centre",tr:2,sh:4,net:false,co:true},
  {id:"3T6SCO",label:"3T-6S(CO)",full:"3 Track 6 Shutter Centre",tr:3,sh:6,net:false,co:true},
  {id:"3T2S1N",label:"3T-2S+Net",full:"3 Track 2 Shutter + 1 Net",tr:3,sh:2,net:true,co:false,nc:1},
  {id:"3T4S2N",label:"3T-4S+2Net",full:"3 Track 4 Shutter + 2 Net",tr:3,sh:4,net:true,co:false,nc:2},
];
const COLORS=[
  {id:"white",label:"White",hex:"#F0F0EB",ral:"RAL 9016",add:12},
  {id:"black",label:"Black",hex:"#2a2a2a",ral:"RAL 9005",add:15},
  {id:"grey", label:"Grey", hex:"#8a8a8a",ral:"RAL 7040",add:12},
  {id:"custom",label:"Custom RAL",hex:"#c084fc",ral:"Custom",add:25},
];
const DR={al:350,wst:.10,g5:55,net:35,ep:10,lb2:60,lb3:65,tr:100,pc:0,b2:80,b3:110,cl:90,cl3:210,mp:300,nh:45,tn:25,pr:23,crd:45,alp:5,wp:1,wd:7,fn:4,ws:3,bs:35,st:33,ad:45,si:185,kp:25,sl:3,ic:4.5};

const mf=m=>m/304.8;
const sf=(w,h)=>(w/304.8)*(h/304.8);
const fm=n=>"₹"+Math.round(n).toLocaleString("en-IN");
const fn=(n,d=0)=>typeof n==="number"?n.toFixed(d):"-";

// ── CALC ENGINE ──────────────────────────────────────────────────────────────
function doCalc(W,H,type,series,rates,lock,cid){
  const w=+W,h=+H;
  if(!w||!h||w<200||h<200)return null;
  const wt=series.wt,isKPA=series.hasKPA&&h>1800;
  const {tr,sh:SH,co,net:hn,nc=0}=type;
  const secs=[];
  const add=(n,sz,q,wg)=>{const kg=(sz/1000)*q*wg;secs.push({n,sz,q,mtr:(sz/1000)*q,wt:wg,kg,amt:kg*rates.al});};
  const tw=tr===2?wt.t2:wt.t3;
  add(tr+" Track W",w,2,tw);add(tr+" Track H",h,2,tw);
  let sw;
  if(!co){
    if(tr===2){sw=(w-107)/2;add("Shutter Bottom",sw,4,wt.sW);add("Shutter H",h-85,SH,wt.sH);}
    else{sw=(w-106)/3;add("Shutter Bottom",sw,4,wt.sW);add("Shutter H",h-85,2,wt.sH);add("Centre Shutter",sw-23,2,wt.csW||wt.sW);}
  }else{sw=(w-136)/4;add("Shutter Bottom",sw,8,wt.sW);if(tr===3)add("Centre Shutter",sw-22,4,wt.csW||wt.sW);add("Shutter H",h-85,4,wt.sH);}
  if(series.hasCap)add("Track Cap",w-101,tr,wt.cap);
  let ik=co?(tr===2?2:4):(tr===2?1:2),is=ik;
  if(!isKPA||!series.hasKPA)ik=0;
  if(series.id==="27mm"){add("Interlock",h-85,is,wt.interlock);}
  else{if(ik>0)add("Interlock KPA",h-85,ik,wt.kpa);add("Interlock Slim",h-85,is,wt.slim);if(co)add("Centre Clip",h-85,1,.532);}
  if(hn){add("Mesh H",h-85,nc,.982);add("Mesh W",sw||(w-107)/2,nc*2,.982);add("Mesh Interlock",h-85,nc,.505);add("Mesh Clip H",h-103,nc*2,.144);add("Mesh Clip W",(w/(SH/nc))-35,nc*2,.144);}
  const twt=secs.reduce((s,x)=>s+x.kg,0),wst=twt*rates.wst,alAmt=(twt+wst)*rates.al;
  const glass=[];
  const gsw=co?sw-37:(tr===2?(w-107)/2:(w-106)/3)-37,gsh=h-85-103;
  glass.push({n:"5mm Clear Glass",sw:gsw,sh:gsh,q:co?4:2});
  if(tr===3&&!co)glass.push({n:"5mm Clear (Centre)",sw:(w-106)/3-23+27,sh:gsh,q:1});
  if(co&&tr===3)glass.push({n:"5mm Clear (Centre)",sw:sw-22+27,sh:gsh,q:2});
  if(hn)glass.push({n:"Mosquito Net SS304",sw:(w/SH)*nc,sh:h,q:nc,isNet:true});
  glass.forEach(g=>{g.sqe=sf(g.sw,g.sh);g.tsq=g.sqe*g.q;g.amt=g.tsq*(g.isNet?rates.net:rates.g5);});
  const glAmt=glass.reduce((s,g)=>s+g.amt,0);
  const hw=[];const tSq=sf(w,h);
  hw.push({n:"Bearing",q:SH*2,r:tr===3?rates.b3:rates.b2});
  hw.push({n:"Concealed Lock",q:Math.ceil(SH/2),r:tr===3?rates.cl3:rates.cl,note:"OPT"});
  hw.push({n:"Wool Pile W",q:+(mf(w)*(tr===2?3:SH)).toFixed(2),r:rates.wp,u:"rft"});
  hw.push({n:"Wool Pile H",q:+(mf(h)*(tr===2?3:SH)).toFixed(2),r:rates.wp,u:"rft"});
  hw.push({n:"Water Drain Cap",q:tr===2?3:4,r:rates.wd});
  hw.push({n:"Fastener",q:SH*3,r:rates.fn});hw.push({n:"Wall Screw",q:SH*3,r:rates.ws});
  hw.push({n:"Bump Stopper",q:Math.ceil(SH/2),r:rates.bs});hw.push({n:"Sticker",q:SH*2,r:rates.st});
  hw.push({n:"Anti Dust",q:Math.ceil(SH/2),r:rates.ad});hw.push({n:"Silicon",q:1,r:rates.si});
  if(isKPA&&series.hasKPA)hw.push({n:"KPA Cover",q:ik*2,r:rates.kp});
  hw.push({n:"Silicon Labour",q:+tSq.toFixed(2),r:rates.sl,u:"sqft"});
  hw.push({n:"Interlock Cap",q:(ik+is)*2,r:rates.ic});
  if(hn)hw.push({n:"Anti Lift Patti",q:4,r:rates.alp});
  const lockAmt=lock==="mp"?rates.mp*Math.ceil(SH/2)+(SH<=2?3:SH*1.5)*(rates.nh+rates.tn)+Math.ceil(h/1000)*rates.pr+Math.ceil(SH/2)*rates.crd:0;
  const hwAmt=hw.reduce((s,x)=>s+(+x.q)*x.r,0)+lockAmt;
  const epW=mf(w)*SH,epH=mf(h)*SH,epT=(mf(w)+mf(h))*tr;
  let totEp=epW+epH+epT;if(hn)totEp+=mf(w/SH*nc+h)*nc;
  const epAmt=totEp*rates.ep;
  const lbR=tr===2?rates.lb2:rates.lb3,lbAmt=tSq*lbR;
  const color=COLORS.find(c=>c.id===cid)||COLORS[0];
  const pcAmt=((rates.pc||0)+color.add)*tSq;
  const unitTotal=alAmt+glAmt+hwAmt+epAmt+lbAmt+rates.tr+pcAmt;
  return{w,h,type,series,tSq,secs,twt,wst,alAmt,glass,glAmt,hw,hwAmt,lockAmt,lock,epW,epH,epT,totEp,epAmt,lbR,lbAmt,pcAmt,color,transport:rates.tr,unitTotal,sqR:unitTotal/tSq,isKPA,ik,is,sw};
}

// ── WINDOW DIAGRAM ───────────────────────────────────────────────────────────
function WinDiag({type,colorHex,W,H,seriesColor,sm}){
  const PW=sm?180:300,PH=sm?130:200;
  const FR=sm?9:12, pd=7;
  const iW=PW-pd*2, iH=PH-pd*2;
  const {tr,sh,co,net:hn,nc=0}=type;
  const fc=colorHex||"#ccc";
  const gc="#b8d8f4";           // glass tint
  const nc2="#5aba8a";          // net wire colour
  const dim=W&&H?W+"×"+H+" mm":"";
  const fs=sm?7:10;

  // Track housing
  const TK=FR*0.5;
  const IX=pd+FR, IY=pd+FR+TK;
  const IW2=iW-FR*2, IH2=iH-FR*2-TK*2;

  // ── PANEL WIDTHS ────────────────────────────────────────────────────────
  // Every shutter spans the FULL inner width.
  // In parked/closed view: each shutter shows as half-width strip.
  // Net (when present) parks on the RIGHT side overlapping last glass shutter
  // (this is mechanically correct — they are on different tracks in depth).

  const FULL=IW2;                             // full inner width
  const half=FULL/2;                          // each shutter shown as half
  // For CO types: 4 shutters → show as 4 quarter-width strips
  const strip = co ? FULL/sh : half;

  // Arrow per shutter
  const arrow=i=>co?i<sh/2?"←":"→":i%2===0?"←":"→";

  // Colour helper
  const shColor=(i)=>i%2===0?fc:fc+"ee";

  return(
    <svg viewBox={"0 0 "+PW+" "+(PH+20)} style={{width:"100%",display:"block",margin:"0 auto"}}>
      {/* Background */}
      <rect x={0} y={0} width={PW} height={PH+20} fill="#eef2f8" rx={5}/>

      {/* Outer frame */}
      <rect x={pd} y={pd} width={iW} height={iH} fill={fc} stroke="#888" strokeWidth={2} rx={2}/>

      {/* Top track channel — shows tr grooves */}
      <rect x={IX} y={pd+FR} width={IW2} height={TK} fill="rgba(0,0,0,0.3)" rx={1}/>
      {Array.from({length:tr},(_,t)=><line key={"tt"+t}
        x1={IX} y1={pd+FR+1+t*(TK/tr)} x2={IX+IW2} y2={pd+FR+1+t*(TK/tr)}
        stroke="rgba(255,255,255,0.18)" strokeWidth={0.5}/>)}

      {/* Bottom track channel */}
      <rect x={IX} y={IY+IH2} width={IW2} height={TK} fill="rgba(0,0,0,0.25)" rx={1}/>
      {Array.from({length:tr},(_,t)=><line key={"bt"+t}
        x1={IX} y1={IY+IH2+1+t*(TK/tr)} x2={IX+IW2} y2={IY+IH2+1+t*(TK/tr)}
        stroke="rgba(255,255,255,0.14)" strokeWidth={0.5}/>)}

      {/* ── GLASS SHUTTERS ───────────────────────────────────────────────────
          Each shutter spans full width but is shown as a strip (parked position).
          S1 parks left, S2 parks right, S3 parks left, etc.
      */}
      {Array.from({length:sh},(_,i)=>{
        // Parked position: even shutters park left, odd park right
        const parkX = co
          ? IX + i*strip                       // CO: spread across evenly
          : i%2===0 ? IX : IX+half;            // standard: alternate left/right
        const SW=strip;
        const GX=parkX+2, GY=IY+2, GW=SW-4, GH=IH2-4;
        const isHandle=co?(i===Math.floor(sh/2)-1):(i===sh-1);
        return <g key={"s"+i}>
          <rect x={parkX} y={IY} width={SW} height={IH2}
            fill={shColor(i)} stroke="#999" strokeWidth={0.8} rx={0.5}/>
          <rect x={GX} y={GY} width={GW} height={GH}
            fill={gc} fillOpacity={0.5} stroke="#80b0d0" strokeWidth={0.5} rx={0.5}/>
          {/* glass shine */}
          <rect x={GX+1} y={GY+1} width={GW*0.4} height={GH*0.3}
            fill="white" fillOpacity={0.22} rx={0.5}/>
          <line x1={GX+2} y1={GY+2} x2={GX+2} y2={GY+GH*0.5}
            stroke="white" strokeWidth={0.7} opacity={0.2}/>
          {/* slide arrow */}
          <text x={GX+GW/2} y={GY+GH/2+4} textAnchor="middle"
            fill="#2060a0" fontSize={fs} opacity={0.65}>{arrow(i)}</text>
          {/* roller wheels */}
          <circle cx={parkX+4}    cy={IY+IH2-2} r={sm?1.5:2.2} fill="#555"/>
          <circle cx={parkX+SW-4} cy={IY+IH2-2} r={sm?1.5:2.2} fill="#555"/>
          {/* interlock between adjacent shutters */}
          {!co&&i<sh-1&&<rect x={parkX+SW-2} y={IY} width={4} height={IH2}
            fill="#aaa" stroke="#888" strokeWidth={0.3} rx={0.5}/>}
          {/* handle */}
          {isHandle&&<>
            <rect x={parkX+SW-FR*0.4} y={GY+GH*0.37}
              width={FR*0.38} height={GH*0.26}
              rx={FR*0.18} fill="#888" stroke="#666" strokeWidth={0.4}/>
            <line x1={parkX+SW-FR*0.25} y1={GY+GH*0.41}
              x2={parkX+SW-FR*0.25} y2={GY+GH*0.60}
              stroke="rgba(255,255,255,0.5)" strokeWidth={0.8}/>
          </>}
        </g>;
      })}

      {/* Centre divider for CO types */}
      {co&&<rect x={IX+FULL/2-FR*0.55} y={pd+FR} width={FR*1.1} height={iH-FR*2}
        fill={fc} stroke="#888" strokeWidth={0.4} rx={0.5}/>}

      {/* ── NET PANELS ───────────────────────────────────────────────────────
          Net is on Track 3 (front/outermost). It spans full width.
          In closed/parked view: net parks on the RIGHT side.
          It visually overlaps the last glass shutter because they are on
          DIFFERENT tracks (depth) — this is correct and intentional.
          Net panel width = half of inner width (same as one glass shutter strip).
      */}
      {hn&&Array.from({length:nc},(_,ni)=>{
        // Each net panel parks at the right, stacked if 2 nets
        const netW = nc===1 ? half : half/2;
        const NPX = IX + FULL - netW*(nc-ni);   // right-align
        const NGX=NPX+2, NGY=IY+2, NGW=netW-4, NGH=IH2-4;
        const rows=Math.max(5,Math.floor(NGH/6));
        const cols=Math.max(3,Math.floor(NGW/6));
        return <g key={"n"+ni}>
          {/* Net shutter frame */}
          <rect x={NPX} y={IY} width={netW} height={IH2}
            fill="#0a2016" stroke="#3a8050" strokeWidth={1.2} rx={0.5}/>
          {/* Mesh wires */}
          {Array.from({length:rows+1},(_,r)=><line key={"r"+r}
            x1={NGX} y1={NGY+r*(NGH/rows)} x2={NGX+NGW} y2={NGY+r*(NGH/rows)}
            stroke={nc2} strokeWidth={0.55} opacity={0.6}/>)}
          {Array.from({length:cols+1},(_,c)=><line key={"c"+c}
            x1={NGX+c*(NGW/cols)} y1={NGY} x2={NGX+c*(NGW/cols)} y2={NGY+NGH}
            stroke={nc2} strokeWidth={0.55} opacity={0.45}/>)}
          {/* mesh border */}
          <rect x={NGX} y={NGY} width={NGW} height={NGH}
            fill="none" stroke={nc2} strokeWidth={0.9} rx={0.5}/>
          {/* labels */}
          <text x={NGX+NGW/2} y={NGY+NGH/2-2} textAnchor="middle"
            fill={nc2} fontSize={sm?6:9} fontWeight="500">NET</text>
          {!sm&&<text x={NGX+NGW/2} y={NGY+NGH/2+9} textAnchor="middle"
            fill={nc2} fontSize={6} opacity={0.8}>SS304</text>}
          {/* net roller wheels */}
          <circle cx={NPX+4}      cy={IY+IH2-2} r={sm?1.5:2} fill="#2a6a3a"/>
          <circle cx={NPX+netW-4} cy={IY+IH2-2} r={sm?1.5:2} fill="#2a6a3a"/>
        </g>;
      })}

      {/* Track count dots on left side */}
      {Array.from({length:tr},(_,t)=><circle key={"td"+t}
        cx={pd+3} cy={IY+IH2/2+(t-tr/2+0.5)*8}
        r={sm?1.5:2} fill={seriesColor||fc} opacity={0.5}/>)}

      {/* Dimension label */}
      <text x={PW/2} y={PH+14} textAnchor="middle" fill="#6b7a99" fontSize={sm?7:9}>
        {dim||type.label}
      </text>
    </svg>
  );
}


// ── COST BREAKDOWN CHART ──────────────────────────────────────────────────────
function CostChart({res}){
  const items=[
    {label:"Aluminium",  amt:res.alAmt,  color:"#2563eb", icon:"🔩"},
    {label:"Glass",      amt:res.glAmt,  color:"#0ea5e9", icon:"🪟"},
    {label:"Hardware",   amt:res.hwAmt,  color:"#7c3aed", icon:"🔧"},
    {label:"EPDM",       amt:res.epAmt,  color:"#d97706", icon:"⭕"},
    {label:"Labour",     amt:res.lbAmt,  color:"#16a34a", icon:"👷"},
    {label:"Transport",  amt:res.transport,color:"#6b7280",icon:"🚛"},
  ];
  if(res.pcAmt>0)items.push({label:"Powder Coat",amt:res.pcAmt,color:"#ec4899",icon:"🎨"});
  const total=res.unitTotal;
  const [hovered,setHovered]=useState(null);
  // Animated bar widths
  const [ready,setReady]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setReady(true),80);return()=>clearTimeout(t);},[res]);

  return <div style={{padding:"4px 0"}}>
    {/* Donut-style summary row */}
    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
      {items.map((it,i)=>{
        const pct=Math.round(it.amt/total*100);
        return <div key={i} style={{display:"flex",alignItems:"center",gap:4,padding:"3px 8px",background:it.color+"12",borderRadius:20,border:"1px solid "+it.color+"33",cursor:"default"}}
          onMouseEnter={()=>setHovered(i)} onMouseLeave={()=>setHovered(null)}>
          <div style={{width:8,height:8,borderRadius:"50%",background:it.color,flexShrink:0}}/>
          <span style={{fontSize:10,color:it.color,fontWeight:700}}>{it.label}</span>
          <span style={{fontSize:10,color:"#6b7a99"}}>{pct}%</span>
        </div>;
      })}
    </div>
    {/* Horizontal stacked bar */}
    <div style={{height:12,borderRadius:6,overflow:"hidden",display:"flex",marginBottom:14,gap:1}}>
      {items.map((it,i)=>{
        const pct=it.amt/total*100;
        return <div key={i} style={{height:"100%",width:ready?pct+"%":"0%",background:it.color,transition:"width 0.6s ease "+(i*0.06)+"s",borderRadius:i===0?"6px 0 0 6px":i===items.length-1?"0 6px 6px 0":"0",flexShrink:0,opacity:hovered===null||hovered===i?1:0.4,cursor:"default"}}
          title={it.label+": "+fm(it.amt)+" ("+Math.round(pct)+"%)"}
          onMouseEnter={()=>setHovered(i)} onMouseLeave={()=>setHovered(null)}/>;
      })}
    </div>
    {/* Bar rows */}
    <div style={{display:"flex",flexDirection:"column",gap:7}}>
      {items.map((it,i)=>{
        const pct=it.amt/total*100;
        const isHov=hovered===i;
        return <div key={i}
          style={{padding:"6px 8px",borderRadius:7,background:isHov?it.color+"10":"transparent",transition:"background .15s",cursor:"default"}}
          onMouseEnter={()=>setHovered(i)} onMouseLeave={()=>setHovered(null)}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:13}}>{it.icon}</span>
              <span style={{fontSize:12,fontWeight:600,color:"#1e2840"}}>{it.label}</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:11,color:"#6b7a99"}}>{Math.round(pct)}%</span>
              <span style={{fontSize:12,fontWeight:700,color:it.color}}>{fm(it.amt)}</span>
            </div>
          </div>
          <div style={{height:6,background:"#f0f2f8",borderRadius:3,overflow:"hidden"}}>
            <div style={{height:"100%",width:ready?pct+"%":"0%",background:it.color,borderRadius:3,transition:"width 0.5s ease "+(i*0.07)+"s"}}/>
          </div>
        </div>;
      })}
    </div>
    {/* Total */}
    <div style={{marginTop:12,padding:"10px 12px",background:"linear-gradient(135deg,#eff6ff,#f0fdf4)",borderRadius:8,border:"1px solid #bfdbfe",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div>
        <div style={{fontSize:10,color:"#6b7a99"}}>TOTAL COST</div>
        <div style={{fontSize:20,fontWeight:800,color:"#16a34a"}}>{fm(total)}</div>
      </div>
      <div style={{textAlign:"right"}}>
        <div style={{fontSize:10,color:"#6b7a99"}}>RATE PER SQFT</div>
        <div style={{fontSize:16,fontWeight:700,color:"#2563eb"}}>{fm(res.sqR)}</div>
      </div>
    </div>
  </div>;
}

// ── SERIES COMPARISON ─────────────────────────────────────────────────────────
function SeriesCompare({currentSid,W,H,typeId,rates,lock,cid,onSelect}){
  const compareSeries=Object.values(SERIES).filter(s=>s.types.includes(typeId));
  if(compareSeries.length<2||!W||!H)return null;
  const type=TYPES.find(t=>t.id===typeId);
  if(!type)return null;
  const results=compareSeries.map(s=>{
    const r=doCalc(W,H,type,s,rates,lock,cid);
    return{series:s,calc:r};
  }).filter(x=>x.calc);
  if(results.length<2)return null;
  const base=results.find(x=>x.series.id===currentSid);
  if(!base)return null;
  const baseAmt=base.calc.unitTotal;

  return <div style={{marginTop:12,background:"#fff",border:"1px solid #e4e8f0",borderRadius:10,padding:14,boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
    <div style={{fontSize:11,fontWeight:700,color:"#6b7a99",textTransform:"uppercase",letterSpacing:.8,marginBottom:10,paddingBottom:8,borderBottom:"1px solid #eef0f8"}}>
      📊 Series Comparison — Same Window, Different Profiles
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {results.map(({series:s,calc:r})=>{
        const isCurrent=s.id===currentSid;
        const diff=r.unitTotal-baseAmt;
        const diffPct=Math.abs(Math.round(diff/baseAmt*100));
        const isCheaper=diff<0,isMore=diff>0;
        return <div key={s.id}
          onClick={()=>!isCurrent&&onSelect(s.id)}
          style={{
            padding:"10px 12px",borderRadius:8,border:"2px solid",cursor:isCurrent?"default":"pointer",
            borderColor:isCurrent?s.color:"#e4e8f0",
            background:isCurrent?s.color+"08":"#fafbfd",
            transition:"all .15s",
          }}
          onMouseEnter={e=>{if(!isCurrent)e.currentTarget.style.borderColor=s.color;}}
          onMouseLeave={e=>{if(!isCurrent)e.currentTarget.style.borderColor="#e4e8f0";}}>
          <div style={{display:"flex",alignItems:"center",gap:8,justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:10,height:10,borderRadius:"50%",background:s.color,flexShrink:0}}/>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:13,fontWeight:700,color:s.color}}>{s.label}</span>
                  {isCurrent&&<span style={{fontSize:9,padding:"1px 6px",background:s.color,color:"#fff",borderRadius:10,fontWeight:700}}>SELECTED</span>}
                </div>
                <div style={{fontSize:10,color:"#6b7a99",marginTop:1}}>
                  {s.id==="29slim"&&"Slim profile • Best for small spaces"}
                  {s.id==="25mm"&&"Prestige series • Economy option"}
                  {s.id==="27mm"&&"Standard profile • Lightweight"}
                  {s.id==="35mm"&&"Heavy duty • Better sound insulation"}
                  {s.id==="37mm"&&"Premium heavy • Maximum durability"}
                </div>
              </div>
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              <div style={{fontSize:14,fontWeight:800,color:isCurrent?s.color:"#1e2840"}}>{fm(r.unitTotal)}</div>
              {!isCurrent&&diff!==0&&<div style={{fontSize:10,fontWeight:700,color:isCheaper?"#16a34a":isMore?"#dc2626":"#6b7a99",marginTop:1}}>
                {isCheaper?"▼ Save ₹"+Math.abs(Math.round(diff)):isMore?"▲ ₹"+Math.round(diff)+" more":"Same price"}
                {diffPct>0&&<span style={{color:"#6b7a99",fontWeight:400}}> ({diffPct}%)</span>}
              </div>}
              <div style={{fontSize:9,color:"#6b7a99"}}>{fm(r.sqR)}/sqft</div>
            </div>
          </div>
          {/* Mini cost bar */}
          <div style={{marginTop:8,height:4,background:"#f0f2f8",borderRadius:2,overflow:"hidden"}}>
            <div style={{height:"100%",width:Math.min(100,r.unitTotal/Math.max(...results.map(x=>x.calc.unitTotal))*100)+"%",background:s.color,borderRadius:2}}/>
          </div>
          {!isCurrent&&<div style={{marginTop:6,fontSize:10,color:s.color,fontWeight:600}}>Click to switch to {s.label} →</div>}
        </div>;
      })}
    </div>
    <div style={{marginTop:8,fontSize:10,color:"#9ba5bf",textAlign:"center"}}>Click any series to recalculate instantly</div>
  </div>;
}

          <tbody>{res.hw.map((h,i)=><tr key={i}><td style={S.td}>{h.n}{h.note&&<span style={{fontSize:9,color:"#d97706",marginLeft:4}}>{h.note}</span>}</td><td style={S.tdr}>{fn(+h.q,2)} {h.u||""}</td><td style={S.tdr}>₹{h.r}</td><td style={{...S.tdr,color:"#16a34a",fontWeight:600}}>{fm((+h.q)*h.r)}</td></tr>)}</tbody>
          </table></div>
          <div style={{marginTop:8,padding:"7px 10px",background:"#f0f9f4",borderRadius:6}}><Row label="Hardware Total" value={fm(res.hwAmt)} green/></div>
        </Card>}
        {dt==="rubber"&&<Card title="EPDM Rubber">
          <table><thead><tr><th style={S.th}>Item</th><th style={S.thr}>Rft</th><th style={S.thr}>Rate</th><th style={S.thr}>Amount</th></tr></thead>
          <tbody>{[{n:"Shutter W",ft:res.epW},{n:"Track H+W",ft:res.epT},{n:"Shutter H",ft:res.epH}].map((r,i)=><tr key={i}><td style={S.td}>{r.n}</td><td style={S.tdr}>{fn(r.ft)}</td><td style={S.tdr}>₹10</td><td style={{...S.tdr,color:"#16a34a",fontWeight:600}}>{fm(r.ft*10)}</td></tr>)}</tbody>
          </table>
          <div style={{marginTop:8,padding:"7px 10px",background:"#f0f9f4",borderRadius:6}}><Row label="EPDM Total" value={fm(res.epAmt)} green/></div>
        </Card>}
        {dt==="labour"&&<Card title="Labour & Transport">
          <Row label={"Labour ("+res.type.tr+" Track)"} value={fn(res.tSq)+" sqft × ₹"+res.lbR}/>
          <Row label="Labour Amount" value={fm(res.lbAmt)} green/>
          <Row label="Transport" value={fm(res.transport)}/>
        </Card>}
      </div>}
    </div>
  </div>;
}

// ── QUOTE TAB ────────────────────────────────────────────────────────────────
function newRow(){return{id:uid(),location:"",seriesId:"29slim",typeId:"2T2S",W:"",H:"",qty:1,lock:"concealed",cid:"white",calc:null};}

function QuoteTab({rates,co,rows,setRows}){
  const [cName,setCName]=useState("");
  const [pName,setPName]=useState("");
  const [pRef,setPRef]=useState("");
  const [detail,setDetail]=useState(null);
  const [hist,setHist]=useState(loadHist);

  const upd=(id,k,v)=>setRows(prev=>prev.map(r=>r.id===id?{...r,[k]:v,calc:null}:r));
  const calcRow=(id)=>setRows(prev=>prev.map(r=>{
    if(r.id!==id)return r;
    const s=SERIES[r.seriesId],at=TYPES.filter(t=>s.types.includes(t.id)),ty=at.find(t=>t.id===r.typeId)||at[0];
    return{...r,calc:doCalc(r.W,r.H,ty,s,rates,r.lock,r.cid)};
  }));
  const calcAll=()=>setRows(prev=>prev.map(r=>{
    const s=SERIES[r.seriesId],at=TYPES.filter(t=>s.types.includes(t.id)),ty=at.find(t=>t.id===r.typeId)||at[0];
    return{...r,calc:doCalc(r.W,r.H,ty,s,rates,r.lock,r.cid)};
  }));
  const dup=(id)=>{const i=rows.findIndex(r=>r.id===id),n={...rows[i],id:uid(),calc:null},a=[...rows];a.splice(i+1,0,n);setRows(a);};
  const del=(id)=>setRows(prev=>prev.filter(r=>r.id!==id));

  const totals=useMemo(()=>{
    const v=rows.filter(r=>r.calc);
    return{GT:v.reduce((s,r)=>s+r.calc.unitTotal*(r.qty||1),0),GS:v.reduce((s,r)=>s+r.calc.tSq*(r.qty||1),0),GQ:v.reduce((s,r)=>s+(r.qty||1),0),cnt:v.length};
  },[rows]);

  const dRow=detail?rows.find(r=>r.id===detail):null;

  function saveQuote(){
    const entry={id:uid(),savedAt:new Date().toLocaleString("en-IN"),cName,pName,pRef,rows:[...rows],total:totals.GT,cnt:totals.cnt};
    const updated=[entry,...hist].slice(0,50);
    setHist(updated);saveHist(updated);
    alert("✅ Quotation saved!\n"+new Date().toLocaleString("en-IN"));
  }
  function loadQuote(h){
    if(!confirm("Load this quotation? Current data will be replaced."))return;
    setCName(h.cName||"");setPName(h.pName||"");setPRef(h.pRef||"");
    setRows(h.rows&&h.rows.length?h.rows:[newRow()]);
  }
  function delQuote(id){
    if(!confirm("Delete this saved quotation?"))return;
    const u=hist.filter(x=>x.id!==id);setHist(u);saveHist(u);
  }

  const inp={background:"#fff",border:"1px solid #dde2ee",borderRadius:6,color:"#1e2840",padding:"5px 7px",fontSize:11,boxSizing:"border-box"};
  const sel={...inp};

  return <div>
    {/* History */}
    <Card>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,paddingBottom:8,borderBottom:"1px solid #eef0f8"}}>
        <div style={{fontSize:11,fontWeight:700,color:"#6b7a99",textTransform:"uppercase",letterSpacing:.8}}>🗂 Quotation History ({hist.length})</div>
        <button onClick={saveQuote} style={{padding:"6px 14px",background:"#16a34a",color:"#fff",border:"none",borderRadius:7,fontWeight:700,fontSize:11,cursor:"pointer"}}>💾 Save Current</button>
      </div>
      {hist.length===0&&<div style={{fontSize:12,color:"#c5cde0",textAlign:"center",padding:"10px 0"}}>No saved quotations yet</div>}
      <div style={{display:"flex",flexDirection:"column",gap:5,maxHeight:200,overflowY:"auto"}}>
        {hist.map((h,i)=><div key={h.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:i%2===0?"#f8f9fc":"#fff",borderRadius:7,border:"1px solid #eef0f8"}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,fontWeight:700,color:"#1e2840",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{h.cName||"Unnamed"}{h.pName?" – "+h.pName:""}</div>
            <div style={{fontSize:10,color:"#6b7a99",marginTop:1}}>{h.savedAt} • {h.cnt} window{h.cnt!==1?"s":""} • <span style={{color:"#16a34a",fontWeight:700}}>{fm(h.total)}</span></div>
          </div>
          <button onClick={()=>loadQuote(h)} style={{padding:"3px 9px",background:"#2563eb",color:"#fff",border:"none",borderRadius:5,cursor:"pointer",fontSize:11,fontWeight:700}}>📂</button>
          <button onClick={()=>delQuote(h.id)} style={{padding:"3px 8px",background:"#fef2f2",color:"#dc2626",border:"1px solid #fca5a5",borderRadius:5,cursor:"pointer",fontSize:11}}>🗑</button>
        </div>)}
      </div>
    </Card>

    {/* Customer */}
    <Card>
      <div className="g3">
        <div><label style={S.lbl}>Customer Name</label><input value={cName} onChange={e=>setCName(e.target.value)} placeholder="Mr. Ramesh Sharma"/></div>
        <div><label style={S.lbl}>Project / Site</label><input value={pName} onChange={e=>setPName(e.target.value)} placeholder="Sharma Residence"/></div>
        <div><label style={S.lbl}>Quote Ref No.</label><input value={pRef} onChange={e=>setPRef(e.target.value)} placeholder="AF-2026-001"/></div>
      </div>
    </Card>

    {/* Windows Table */}
    <Card>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,paddingBottom:8,borderBottom:"1px solid #eef0f8"}}>
        <div style={{fontSize:11,fontWeight:700,color:"#6b7a99",textTransform:"uppercase",letterSpacing:.8}}>🪟 Windows List</div>
        <div style={{display:"flex",gap:7}}>
          <button onClick={calcAll} style={{padding:"6px 13px",background:"#2563eb",color:"#fff",border:"none",borderRadius:7,fontWeight:700,fontSize:11,cursor:"pointer"}}>⚡ Calculate All</button>
          <button onClick={()=>setRows(p=>[...p,newRow()])} style={{padding:"6px 12px",background:"#fff",color:"#16a34a",border:"1px solid #16a34a",borderRadius:7,fontWeight:700,fontSize:11,cursor:"pointer"}}>+ Add Window</button>
        </div>
      </div>
      <div class="tbl-wrap">
        <table style={{minWidth:900}} className="qtbl">
          <thead><tr style={{background:"#eff6ff"}}>
            {["#","Location","Series","Type","W mm","H mm","Qty","Colour","Lock","Sqft","Unit ₹","Total ₹",""].map((h,i)=><th key={i} style={{...S.th,textAlign:["W mm","H mm","Qty","Sqft","Unit ₹","Total ₹"].includes(h)?"right":"left",whiteSpace:"nowrap"}}>{h}</th>)}
          </tr></thead>
          <tbody>
            {rows.map((row,idx)=>{
              const s=SERIES[row.seriesId];
              const at=TYPES.filter(t=>s.types.includes(t.id));
              const ty=at.find(t=>t.id===row.typeId)||at[0];
              const col=COLORS.find(c=>c.id===row.cid)||COLORS[0];
              const isC=!!row.calc;
              const rt=isC?row.calc.unitTotal*(row.qty||1):null;
              return <tr key={row.id} style={{background:idx%2===0?"#f8f9fc":"#fff"}}>
                <td style={{...S.td,color:"#6b7a99",fontWeight:700,width:28,textAlign:"center"}} data-label="#">{idx+1}</td>
                <td style={S.td} data-label="Location"><input value={row.location} onChange={e=>upd(row.id,"location",e.target.value)} placeholder="Hall..." style={{...inp,width:80}}/></td>
                <td style={S.td} data-label="Series">
                  <select value={row.seriesId} onChange={e=>{upd(row.id,"seriesId",e.target.value);if(!SERIES[e.target.value].types.includes(row.typeId))upd(row.id,"typeId",SERIES[e.target.value].types[0]);}} style={{...sel,width:90,borderColor:s.color+"88",color:s.color,fontWeight:700}}>
                    {Object.values(SERIES).map(sv=><option key={sv.id} value={sv.id}>{sv.label}</option>)}
                  </select>
                </td>
                <td style={S.td} data-label="Type"><select value={row.typeId} onChange={e=>upd(row.id,"typeId",e.target.value)} style={{...sel,width:90}}>{at.map(t=><option key={t.id} value={t.id}>{t.label}</option>)}</select></td>
                <td style={S.td} data-label="W mm"><input type="number" value={row.W} onChange={e=>upd(row.id,"W",e.target.value)} placeholder="2000" style={{...inp,width:60,textAlign:"right"}}/></td>
                <td style={S.td} data-label="H mm"><input type="number" value={row.H} onChange={e=>upd(row.id,"H",e.target.value)} placeholder="1500" style={{...inp,width:60,textAlign:"right"}}/></td>
                <td style={S.td} data-label="Qty"><input type="number" value={row.qty} min={1} onChange={e=>upd(row.id,"qty",+e.target.value)} style={{...inp,width:45,textAlign:"center"}}/></td>
                <td style={S.td} data-label="Colour">
                  <div style={{display:"flex",alignItems:"center",gap:5}}>
                    <div style={{width:14,height:14,borderRadius:"50%",background:col.hex,border:"1px solid #dde2ee",flexShrink:0}}/>
                    <select value={row.cid} onChange={e=>upd(row.id,"cid",e.target.value)} style={{...sel,width:70,fontSize:10}}>{COLORS.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}</select>
                  </div>
                </td>
                <td style={S.td} data-label="Lock"><select value={row.lock} onChange={e=>upd(row.id,"lock",e.target.value)} style={{...sel,width:80,fontSize:10}}><option value="concealed">Concealed</option><option value="mp">Multi-Pt</option></select></td>
                <td style={{...S.tdr,color:isC?"#2563eb":"#c5cde0",fontWeight:600}} data-label="Sqft">{isC?fn(row.calc.tSq):"—"}</td>
                <td style={{...S.tdr,fontWeight:600}} data-label="Unit ₹">{isC?fm(row.calc.unitTotal):"—"}</td>
                <td style={{...S.tdr,color:isC?"#16a34a":"#c5cde0",fontWeight:700}} data-label="Total ₹">{isC?fm(rt):"—"}</td>
                <td style={S.td} data-label="Actions">
                  <div style={{display:"flex",gap:4}}>
                    <button onClick={()=>calcRow(row.id)} style={{padding:"3px 7px",background:"#2563eb",color:"#fff",border:"none",borderRadius:4,cursor:"pointer",fontSize:11,fontWeight:700}}>⚡</button>
                    {isC&&<button onClick={()=>setDetail(row.id)} style={{padding:"3px 7px",background:"#eff6ff",color:"#2563eb",border:"1px solid #bfdbfe",borderRadius:4,cursor:"pointer",fontSize:11}}>📋</button>}
                    <button onClick={()=>dup(row.id)} style={{padding:"3px 7px",background:"#f8f9fc",color:"#6b7a99",border:"1px solid #e4e8f0",borderRadius:4,cursor:"pointer",fontSize:11}}>⧉</button>
                    {rows.length>1&&<button onClick={()=>del(row.id)} style={{padding:"3px 7px",background:"#fef2f2",color:"#dc2626",border:"1px solid #fca5a5",borderRadius:4,cursor:"pointer",fontSize:11}}>🗑</button>}
                  </div>
                </td>
              </tr>;
            })}
          </tbody>
        </table>
      </div>
      <button onClick={()=>setRows(p=>[...p,newRow()])} style={{width:"100%",marginTop:8,padding:"8px",background:"transparent",color:"#16a34a",border:"1px dashed #86efac",borderRadius:7,fontWeight:600,fontSize:12,cursor:"pointer"}}>+ Add Another Window</button>
    </Card>

    {/* Totals */}
    {totals.cnt>0&&<>
      <div className="tot-grid" style={{background:"linear-gradient(135deg,#1d4ed8,#2563eb)",borderRadius:10,padding:14,marginBottom:12}}>
        {[["Windows",totals.cnt],["Quantity",totals.GQ],["Total Area",fn(totals.GS)+" sqft"]].map(([l,v])=><div key={l} style={{textAlign:"center"}}>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.7)",marginBottom:2}}>{l}</div>
          <div style={{fontSize:20,fontWeight:800,color:"#fff"}}>{v}</div>
        </div>)}
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.7)",marginBottom:2}}>GRAND TOTAL</div>
          <div style={{fontSize:24,fontWeight:800,color:"#86efac"}}>{fm(totals.GT)}</div>
        </div>
        <div style={{display:"flex",gap:8,flexDirection:"column",flexShrink:0}}>
          <button onClick={()=>makeMultiPDF(rows,cName,pName,pRef,co)}
            style={{padding:"9px 14px",background:"#fff",color:"#1d4ed8",border:"none",borderRadius:8,fontWeight:700,fontSize:12,cursor:"pointer",whiteSpace:"nowrap"}}>
            📄 Download PDF
          </button>
          <button onClick={()=>shareWhatsApp(buildMultiMsg(rows,cName,pName,pRef,totals.GT,totals.GQ,totals.GS))}
            style={{padding:"9px 14px",background:"#25D366",color:"#fff",border:"none",borderRadius:8,fontWeight:700,fontSize:12,cursor:"pointer",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:5}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.374 0 0 5.373 0 12c0 2.117.549 4.107 1.504 5.838L.058 23.902l6.232-1.635C7.968 23.217 9.958 24 12 24c6.626 0 12-5.373 12-12S18.626 0 12 0zm0 22c-1.848 0-3.624-.498-5.148-1.367l-.368-.219-3.809 1 1.02-3.727-.239-.384A9.946 9.946 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
            WhatsApp
          </button>
        </div>
      </div>
      <Card title="📊 Summary">
        <div style={{overflowX:"auto"}}>
          <table><thead><tr style={{background:"#eff6ff"}}>
            {["#","Location","Series","Type","Size","Qty","Sqft","Unit ₹","Total ₹","Rate/sqft"].map((h,i)=><th key={i} style={{...S.th,textAlign:["Sqft","Unit ₹","Total ₹","Rate/sqft","#","Qty"].includes(h)?"right":"left"}}>{h}</th>)}
          </tr></thead>
          <tbody>
            {rows.map((row,idx)=>{if(!row.calc)return null;const r=row.calc,q=row.qty||1;return(
              <tr key={row.id} style={{background:idx%2===0?"#f8f9fc":"#fff"}}>
                <td style={{...S.tdr,color:"#6b7a99",fontWeight:700}}>{idx+1}</td>
                <td style={{...S.td,fontWeight:700,color:"#1e2840"}}>{row.location||"Window "+(idx+1)}</td>
                <td style={S.td}><span style={{padding:"2px 7px",background:r.series.color+"18",border:"1px solid "+r.series.color+"44",borderRadius:8,fontSize:10,color:r.series.color,fontWeight:700}}>{r.series.label}</span></td>
                <td style={{...S.td,fontSize:10,color:"#6b7a99"}}>{r.type.full}</td>
                <td style={{...S.tdr,fontWeight:600}}>{r.w}×{r.h}</td>
                <td style={S.tdr}>{q}</td>
                <td style={S.tdr}>{fn(r.tSq*q)}</td>
                <td style={S.tdr}>{fm(r.unitTotal)}</td>
                <td style={{...S.tdr,color:"#16a34a",fontWeight:700}}>{fm(r.unitTotal*q)}</td>
                <td style={{...S.tdr,color:"#6b7a99"}}>{fm(r.sqR)}</td>
              </tr>);
            })}
            <tr style={{background:"#eff6ff",fontWeight:700}}>
              <td colSpan={6} style={{...S.td,color:"#1d4ed8",fontSize:13}}>GRAND TOTAL</td>
              <td style={{...S.tdr,color:"#1d4ed8"}}>{fn(totals.GS)}</td>
              <td style={S.tdr}></td>
              <td style={{...S.tdr,color:"#16a34a",fontSize:15}}>{fm(totals.GT)}</td>
              <td style={{...S.tdr,color:"#6b7a99"}}>{fm(totals.GT/Math.max(totals.GS,1))}</td>
            </tr>
          </tbody></table>
        </div>
      </Card>
    </>}

    {/* Detail Modal */}
    {detail&&dRow&&dRow.calc&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setDetail(null)}>
      <div style={{background:"#fff",borderRadius:14,padding:20,maxWidth:500,width:"100%",maxHeight:"85vh",overflowY:"auto",border:"1px solid #e4e8f0",boxShadow:"0 8px 32px rgba(0,0,0,0.12)"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:"#1e2840"}}>{dRow.location||"Window "+(rows.findIndex(r=>r.id===detail)+1)} – Detail</div>
            <div style={{fontSize:11,color:"#6b7a99",marginTop:2}}>{dRow.calc.series.label} | {dRow.calc.type.full} | {dRow.calc.w}×{dRow.calc.h}mm</div>
          </div>
          <button onClick={()=>setDetail(null)} style={{background:"#f0f4ff",color:"#6b7a99",border:"1px solid #e4e8f0",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:13}}>✕</button>
        </div>
        {[["Aluminium",dRow.calc.alAmt],["Glass",dRow.calc.glAmt],["Hardware",dRow.calc.hwAmt],["EPDM Rubber",dRow.calc.epAmt],["Labour",dRow.calc.lbAmt],["Transport",dRow.calc.transport]].map((it,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"7px 10px",background:i%2===0?"#f8f9fc":"#fff",borderRadius:5,marginBottom:3}}>
            <span style={{fontSize:12,color:"#1e2840"}}>{it[0]}</span>
            <span style={{fontSize:13,fontWeight:600,color:"#1e2840"}}>{fm(it[1])}</span>
          </div>
        ))}
        {dRow.calc.pcAmt>0&&<div style={{display:"flex",justifyContent:"space-between",padding:"7px 10px",background:"#fffbeb",borderRadius:5,marginBottom:3}}>
          <span style={{fontSize:12}}>Powder Coating ({dRow.calc.color.label})</span><span style={{fontSize:13,fontWeight:600}}>{fm(dRow.calc.pcAmt)}</span>
        </div>}
        <div style={{display:"flex",justifyContent:"space-between",padding:"10px 14px",background:"#eff6ff",borderRadius:8,marginTop:8,border:"1px solid #bfdbfe"}}>
          <div><div style={{fontSize:13,fontWeight:700,color:"#1d4ed8"}}>UNIT TOTAL</div><div style={{fontSize:10,color:"#6b7a99",marginTop:2}}>{fn(dRow.calc.tSq)} sqft @ {fm(dRow.calc.sqR)}/sqft</div></div>
          <div style={{textAlign:"right"}}><div style={{fontSize:20,fontWeight:800,color:"#16a34a"}}>{fm(dRow.calc.unitTotal)}</div>
            {(dRow.qty||1)>1&&<div style={{fontSize:12,color:"#1d4ed8",marginTop:2}}>× {dRow.qty} = {fm(dRow.calc.unitTotal*(dRow.qty||1))}</div>}
          </div>
        </div>
      </div>
    </div>}
  </div>;
}

// ── COMPANY TAB ──────────────────────────────────────────────────────────────
function CompanyTab({co,setCo}){
  const [loc,setLoc]=useState({...co});
  const upd=(k,v)=>setLoc(p=>({...p,[k]:v}));
  const saved=JSON.stringify(loc)===JSON.stringify(co);
  return <div style={{maxWidth:800}}>
    <Card title="🏢 Company Profile">
      <div style={{fontSize:12,color:"#6b7a99",marginBottom:14}}>These details appear on every PDF estimate and quotation.</div>
      <label style={S.lbl}>Company / Business Name *</label>
      <input value={loc.name} onChange={e=>upd("name",e.target.value)} placeholder="e.g. Sharma Aluminium & Glass Works" style={{fontSize:14,fontWeight:600}}/>

function hexRgb(hex){
  try{hex=(hex||"#888888").replace("#","");if(hex.length===3)hex=hex.split("").map(c=>c+c).join("");return[parseInt(hex.slice(0,2),16),parseInt(hex.slice(2,4),16),parseInt(hex.slice(4,6),16)];}catch{return[136,136,136];}
}

  });
  lines.push("─────────────────────────");
  lines.push("📐 Total Area: "+fn(GS,1)+" sq.ft");
  lines.push("🏠 Total Windows: "+GQ);
  lines.push("✅ *GRAND TOTAL: "+fm(GT)+"*");
  lines.push("");
  lines.push("⏰ Valid for 15 days | 💳 50% advance to confirm");
  lines.push("📞 Contact us to place your order!");
  return lines.join("\n");
}

// ── APP ROOT ─────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useSaved("user",null);
  const [tab,setTab]=useState("calc");
  const [co,setCo]=useSaved("company",{name:"",tagline:"",phone:"",email:"",address:"",gst:"",website:""});
  const [rates,setRates]=useSaved("rates",{...DR});
  const [quoteRows,setQuoteRows]=useSaved("qrows",[newRow(),newRow()]);
  const [hist]=useState(loadHist);

  function addToQuote(sid,tid,loc){
    const nr={...newRow(),id:uid(),seriesId:sid,typeId:tid,location:loc||""};
    setQuoteRows(prev=>[...prev,nr]);
    setTab("quote");
  }

  if(!user)return <Login onLogin={n=>setUser(n)}/>;

  return <div style={{minHeight:"100vh"}}>
    {/* Header */}
    <div style={{background:"linear-gradient(135deg,#1d4ed8,#2563eb)",padding:"8px 14px",boxShadow:"0 2px 12px rgba(37,99,235,0.3)"}}>
      {/* Top row */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
        <div style={{width:32,height:32,background:"rgba(255,255,255,0.2)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>🪟</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:14,fontWeight:800,color:"#fff",lineHeight:1.2}}>AlumCalc Pro</div>
          <div style={{fontSize:9,color:"rgba(255,255,255,0.6)"}}>Alufabb Fenestration</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
          <span style={{fontSize:10,color:"rgba(255,255,255,0.8)"}}>📱{user}</span>
          <button onClick={()=>setUser(null)} style={{padding:"4px 8px",borderRadius:6,border:"1px solid rgba(255,255,255,0.3)",cursor:"pointer",fontSize:10,background:"transparent",color:"rgba(255,255,255,0.8)"}}>Out</button>
        </div>
      </div>
      {/* Nav tabs row — horizontal scroll on mobile */}
      <div style={{display:"flex",overflowX:"auto",gap:0,WebkitOverflowScrolling:"touch",scrollbarWidth:"none",marginBottom:2}}>
        {[["calc","📐 Calc"],["quote","📋 Quote"],["company","🏢 Company"],["rates","⚙️ Rates"]].map(([t,l])=>(
          <button key={t} className={"ntab"+(tab===t?" on":"")} onClick={()=>setTab(t)}>{l}</button>
        ))}
        <a href="/visualiser.html" style={{padding:"9px 12px",border:"none",cursor:"pointer",fontSize:11,fontWeight:600,color:"rgba(255,255,255,0.75)",background:"transparent",textDecoration:"none",whiteSpace:"nowrap",borderBottom:"3px solid transparent"}}>🪟 View</a>
      </div>
    </div>

    <div style={{maxWidth:1200,margin:"0 auto",padding:"10px 10px"}}>
      {tab==="calc"&&<CalcTab rates={rates} addToQuote={addToQuote}/>}
      {tab==="quote"&&<QuoteTab rates={rates} co={co} rows={quoteRows} setRows={setQuoteRows}/>}
      {tab==="company"&&<CompanyTab co={co} setCo={setCo}/>}
      {tab==="rates"&&<RatesTab rates={rates} setRates={setRates}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
