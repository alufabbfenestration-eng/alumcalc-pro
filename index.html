<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AlumCalc Pro – Aluminium Window Estimator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0f1117;color:#e2e8f0;font-family:'Segoe UI',sans-serif;min-height:100vh}
    select,input{outline:none}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-track{background:#1e293b}
    ::-webkit-scrollbar-thumb{background:#374151;border-radius:3px}
    table{border-collapse:collapse;width:100%}
    @media(max-width:700px){
      .main-grid{grid-template-columns:1fr!important}
      .header-btns{gap:4px!important}
      .header-btns button{padding:5px 10px!important;font-size:11px!important}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useMemo} = React;

const DEFAULT_RATES = {
  aluminium:350, wastage:0.10, glass5mm:55, mosquitoNet:35, epdmRubber:10,
  labour2T:60, labour3T:65, transport:100, powderCoating:0,
  bearing2T:80, bearing3T:110, concealedLock:90, concealedLock3:210,
  multiPointSystem:300, nibHolder:45, tNib:25, polimaidRod:23, centerRodDevice:45,
  antiLift:5, topUGuide:4, buffer:5, woolPile:1, waterDrainageCap:7,
  fastner:4, wallScrew:3, bumpStopper:35, sticker:33, antiDust:45,
  silicon:185, kpaCover:25, siliconLabour:3, interlockCap:4.5,
  meshClipH:5, meshClipW:5, meshInterlock:8, centerClip:9,
};

const WEIGHTS = {
  track2:1.317, track3:1.943, shutterH:0.942, shutterW:0.942,
  trackCap:1.17, interlockKPA:1.063, interlockSlim:0.547, centerClip:0.532,
  meshShutterH:0.982, meshShutterW:0.982, meshInterlock:0.505, meshClip:0.144,
};

const WINDOW_TYPES = [
  {id:"2T2S", label:"2 Track – 2 Shutter", tracks:2, shutters:2, hasNet:false, centerOpening:false},
  {id:"3T3S", label:"3 Track – 3 Shutter", tracks:3, shutters:3, hasNet:false, centerOpening:false},
  {id:"2T4S_CO", label:"2 Track – 4 Shutter (Centre Opening)", tracks:2, shutters:4, hasNet:false, centerOpening:true},
  {id:"3T6S_CO", label:"3 Track – 6 Shutter (Centre Opening)", tracks:3, shutters:6, hasNet:false, centerOpening:true},
  {id:"3T2S1N", label:"3 Track – 2 Shutter + 1 Mosquito Net", tracks:3, shutters:2, hasNet:true, netCount:1, centerOpening:false},
  {id:"3T4S2N", label:"3 Track – 4 Shutter + 2 Mosquito Net", tracks:3, shutters:4, hasNet:true, netCount:2, centerOpening:false},
];

const mmToFt = mm => mm / 304.8;
const sqFt = (w,h) => (w/304.8)*(h/304.8);
const fmt = n => typeof n==="number" ? "₹"+n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",") : n;
const fmtN = (n,d=2) => typeof n==="number" ? n.toFixed(d) : n;

function calcWindow(W, H, type, rates, lockType="concealed") {
  const w=Number(W), h=Number(H);
  if(!w||!h||w<100||h<100) return null;
  const isKPA=h>1800, tracks=type.tracks, shutters=type.shutters, co=type.centerOpening, hasNet=type.hasNet, netCount=type.netCount||0;
  const sections=[];
  const add=(name,size,qty,weight)=>{
    const mtr=(size/1000)*qty, kg=mtr*weight, amount=kg*rates.aluminium;
    sections.push({name,size,qty,mtr,weight,kg,amount});
  };
  const tw=tracks===2?WEIGHTS.track2:WEIGHTS.track3;
  add(`${tracks} Track W`,w,2,tw);
  add(`${tracks} Track H`,h,2,tw);
  let swSize;
  if(!co){
    swSize=tracks===2?(w-107)/2:(w-106)/3;
    add("Shutter Bottom 45+90",swSize,4,WEIGHTS.shutterW);
    add("Shutter H 45+45",h-85,tracks===2?shutters:2,WEIGHTS.shutterH);
    if(tracks===3&&shutters===3) add("Centre Shutter 90+90",(w-106)/3-23,2,WEIGHTS.shutterW);
  } else {
    swSize=(w-136)/4;
    if(tracks===2){add("Shutter Bottom 45+90",swSize,8,WEIGHTS.shutterW);add("Shutter H 45+45",h-85,4,WEIGHTS.shutterH);}
    else{add("Shutter Bottom 45+90",swSize,8,WEIGHTS.shutterW);add("Centre Shutter 90+90",swSize-22,4,WEIGHTS.shutterW);add("Shutter H 45+45",h-85,4,WEIGHTS.shutterH);}
  }
  add("Track Cap Bottom",w-101,tracks,WEIGHTS.trackCap);
  let ilKPA=co?(tracks===2?2:4):(tracks===2?1:2), ilSlim=ilKPA;
  if(!isKPA) ilKPA=0;
  if(ilKPA>0) add("Interlock KPA",h-85,ilKPA,WEIGHTS.interlockKPA);
  add("Interlock Slim",h-85,ilSlim,WEIGHTS.interlockSlim);
  if(co) add("Centre Clip",h-85,1,WEIGHTS.centerClip);
  if(hasNet){
    add("Mesh Shutter H",h-85,netCount,WEIGHTS.meshShutterH);
    add("Mesh Top/Bottom",swSize||(w-107)/2,netCount*2,WEIGHTS.meshShutterW);
    add("Mesh Interlock",h-85,netCount,WEIGHTS.meshInterlock);
    add("Mesh Clip H",h-103,netCount*2,WEIGHTS.meshClip);
    add("Mesh Clip W",(w/(shutters/netCount))-35,netCount*2,WEIGHTS.meshClip);
  }
  const totalWeight=sections.reduce((s,x)=>s+x.kg,0);
  const wastageKg=totalWeight*rates.wastage;
  const alumAmount=(totalWeight+wastageKg)*rates.aluminium;

  const glasses=[];
  const gsw=(co?swSize-37:(tracks===2?(w-107)/2:(w-106)/3)-37), gsh=h-85-103;
  glasses.push({name:"5mm Clear Glass",sw:gsw,sh:gsh,qty:co?(tracks===2?4:4):2});
  if(!co&&tracks===3&&shutters===3) glasses.push({name:"5mm Clear (Centre)",sw:(w-106)/3-23+27,sh:gsh,qty:1});
  if(!co&&tracks===3&&shutters===3){} // already added
  if(co&&tracks===3) glasses.push({name:"5mm Clear (Centre)",sw:swSize-22+27,sh:gsh,qty:2});
  if(hasNet){const nsw=(w/shutters)*netCount,nsh=h;glasses.push({name:"Mosquito Net SS304",sw:nsw,sh:nsh,qty:netCount});}
  glasses.forEach(g=>{g.sqftEach=sqFt(g.sw,g.sh);g.totalSqft=g.sqftEach*g.qty;g.amount=g.totalSqft*(g.name.includes("Net")?rates.mosquitoNet:rates.glass5mm);});
  const totalGlassAmount=glasses.reduce((s,g)=>s+g.amount,0);

  const hardware=[];
  hardware.push({name:"Bearing",qty:shutters*2,rate:tracks===2?rates.bearing2T:rates.bearing3T});
  hardware.push({name:"Concealed Lock",qty:Math.ceil(shutters/2),rate:tracks===2?rates.concealedLock:rates.concealedLock3,note:"OPT."});
  const tSqFt=sqFt(w,h);
  const wpW=mmToFt(w)*(tracks===2?3:shutters), wpH=mmToFt(h)*(tracks===2?3:shutters);
  hardware.push({name:"Wool Pile (W)",qty:wpW.toFixed(2),rate:rates.woolPile,unit:"rft"});
  hardware.push({name:"Wool Pile (H)",qty:wpH.toFixed(2),rate:rates.woolPile,unit:"rft"});
  hardware.push({name:"Water Drainage Cap",qty:tracks===2?3:4,rate:rates.waterDrainageCap});
  hardware.push({name:"Fastener",qty:shutters*3,rate:rates.fastner});
  hardware.push({name:"Wall Screw",qty:shutters*3,rate:rates.wallScrew});
  hardware.push({name:"Bump Stopper",qty:Math.ceil(shutters/2),rate:rates.bumpStopper});
  hardware.push({name:"Sticker",qty:shutters*2,rate:rates.sticker});
  hardware.push({name:"Anti Dust",qty:Math.ceil(shutters/2),rate:rates.antiDust});
  hardware.push({name:"Silicon",qty:1,rate:rates.silicon});
  if(isKPA) hardware.push({name:"KPA Cover",qty:ilKPA*2,rate:rates.kpaCover});
  hardware.push({name:"Silicon Labour",qty:tSqFt.toFixed(2),rate:rates.siliconLabour,unit:"sqft"});
  hardware.push({name:"Interlock Cap",qty:(ilKPA+ilSlim)*2,rate:rates.interlockCap});
  if(hasNet) hardware.push({name:"Anti Lift Patti",qty:4,rate:rates.antiLift});
  const lockAmount=lockType==="multiPoint"?rates.multiPointSystem*Math.ceil(shutters/2)+(shutters<=2?3:shutters*1.5)*(rates.nibHolder+rates.tNib)+Math.ceil(h/1000)*rates.polimaidRod+Math.ceil(shutters/2)*rates.centerRodDevice:0;
  const hwAmount=hardware.reduce((s,h)=>s+Number(h.qty)*h.rate,0)+lockAmount;

  const epdmW=mmToFt(w)*shutters, epdmH=mmToFt(h)*shutters, trackEpdm=(mmToFt(w)+mmToFt(h))*tracks;
  let totalEpdmFt=epdmW+epdmH+trackEpdm;
  if(hasNet) totalEpdmFt+=mmToFt(w/shutters*netCount+h)*netCount;
  const epdmAmount=totalEpdmFt*rates.epdmRubber;

  const labourRate=tracks===2?rates.labour2T:rates.labour3T;
  const labourAmount=tSqFt*labourRate;
  const powderAmount=rates.powderCoating>0?tSqFt*rates.powderCoating:0;
  const total=alumAmount+totalGlassAmount+hwAmount+epdmAmount+labourAmount+rates.transport+powderAmount;
  return {w,h,type,totalSqFt:tSqFt,sections,totalWeight,wastageKg,alumAmount,glasses,totalGlassAmount,hardware,hwAmount,lockAmount,lockType,epdmW,epdmH,trackEpdm,totalEpdmFt,epdmAmount,labourSqFt:tSqFt,labourRate,labourAmount,powderAmount,transport:rates.transport,total,sqftRate:total/tSqFt,isKPA,ilKPA,ilSlim};
}

const S = {
  card:{background:"#1e293b",border:"1px solid #2d3748",borderRadius:12,padding:16,marginBottom:0},
  input:{width:"100%",padding:"8px 10px",background:"#0f1117",border:"1px solid #374151",borderRadius:6,color:"#e2e8f0",fontSize:13,boxSizing:"border-box"},
  select:{width:"100%",padding:"8px 10px",background:"#0f1117",border:"1px solid #374151",borderRadius:6,color:"#e2e8f0",fontSize:13},
  label:{fontSize:11,color:"#64748b",fontWeight:600,display:"block",marginBottom:4,marginTop:8},
  th:{padding:"6px 8px",color:"#64748b",fontWeight:600,fontSize:12,borderBottom:"1px solid #1e3a5f"},
  td:{padding:"6px 8px",fontSize:12,borderBottom:"1px solid #1e293b"},
};

function Card({title,children,style={}}) {
  return <div style={{...S.card,...style}}>
    {title&&<div style={{fontSize:13,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:1,marginBottom:12,borderBottom:"1px solid #2d3748",paddingBottom:8}}>{title}</div>}
    {children}
  </div>;
}

function SRow({label,value,highlight}) {
  return <div style={{display:"flex",justifyContent:"space-between",fontSize:highlight?13:12,fontWeight:highlight?700:400,marginBottom:5,color:highlight?"#4ade80":"#e2e8f0"}}>
    <span style={{color:highlight?"#93c5fd":"#94a3b8"}}>{label}</span><span>{value}</span>
  </div>;
}

function App() {
  const [tab,setTab]=useState("calc");
  const [typeId,setTypeId]=useState("2T2S");
  const [width,setWidth]=useState("");
  const [height,setHeight]=useState("");
  const [lockType,setLockType]=useState("concealed");
  const [rates,setRates]=useState(DEFAULT_RATES);
  const [results,setResults]=useState(null);
  const [qty,setQty]=useState(1);
  const [detTab,setDetTab]=useState("alum");

  const type=WINDOW_TYPES.find(t=>t.id===typeId);
  const calc=useMemo(()=>{
    if(!width||!height) return null;
    return calcWindow(width,height,type,rates,lockType);
  },[width,height,typeId,rates,lockType]);

  return <div style={{minHeight:"100vh"}}>
    {/* HEADER */}
    <div style={{background:"linear-gradient(135deg,#1e3a5f,#0d2137)",borderBottom:"2px solid #2d6a9f",padding:"14px 20px",display:"flex",alignItems:"center",gap:14}}>
      <div style={{width:38,height:38,background:"linear-gradient(135deg,#3b82f6,#1d4ed8)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>🪟</div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:18,fontWeight:700,color:"#93c5fd"}}>AlumCalc Pro</div>
        <div style={{fontSize:10,color:"#64748b"}}>Aluminium Window Estimator</div>
      </div>
      <div style={{display:"flex",gap:6}} className="header-btns">
        {["calc","rates"].map(t=><button key={t} onClick={()=>setTab(t)} style={{padding:"6px 14px",borderRadius:6,border:"1px solid",cursor:"pointer",fontSize:12,fontWeight:600,background:tab===t?"#2563eb":"transparent",borderColor:tab===t?"#3b82f6":"#374151",color:tab===t?"#fff":"#9ca3af"}}>
          {t==="calc"?"📐 Calc":"⚙️ Rates"}
        </button>)}
      </div>
    </div>

    <div style={{maxWidth:1100,margin:"0 auto",padding:"16px"}}>
      {tab==="rates"&&<RatesPanel rates={rates} setRates={setRates}/>}
      {tab==="calc"&&<div style={{display:"grid",gridTemplateColumns:"340px 1fr",gap:16}} className="main-grid">
        {/* LEFT */}
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Card title="Window Configuration">
            <label style={S.label}>Window Type</label>
            <select value={typeId} onChange={e=>{setTypeId(e.target.value);setResults(null);}} style={S.select}>
              {WINDOW_TYPES.map(t=><option key={t.id} value={t.id}>{t.label}</option>)}
            </select>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div><label style={S.label}>Width (mm)</label><input type="number" value={width} onChange={e=>{setWidth(e.target.value);setResults(null);}} placeholder="e.g. 2000" style={S.input}/></div>
              <div><label style={S.label}>Height (mm)</label><input type="number" value={height} onChange={e=>{setHeight(e.target.value);setResults(null);}} placeholder="e.g. 1500" style={S.input}/></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div><label style={S.label}>Quantity</label><input type="number" value={qty} min={1} onChange={e=>setQty(Number(e.target.value))} style={S.input}/></div>
              <div><label style={S.label}>Lock Type</label>
                <select value={lockType} onChange={e=>setLockType(e.target.value)} style={{...S.select,marginTop:0}}>
                  <option value="concealed">Concealed Lock</option>
                  <option value="multiPoint">Multi-Point Lock</option>
                </select>
              </div>
            </div>
            {calc&&<div style={{marginTop:10,padding:"8px 12px",background:"#1e3a5f22",borderRadius:8,border:"1px solid #2563eb44",fontSize:12,color:"#93c5fd"}}>
              <div style={{display:"flex",justifyContent:"space-between"}}><span>Area:</span><strong>{fmtN(calc.totalSqFt)} sq.ft</strong></div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}><span>KPA Interlock:</span><strong>{calc.isKPA?"Yes (H>1800mm)":"No"}</strong></div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}><span>Config:</span><strong>{type.tracks}T/{type.shutters}S{type.hasNet?` +${type.netCount}Net`:""}</strong></div>
            </div>}
            <button onClick={()=>setResults(calc)} disabled={!calc} style={{width:"100%",marginTop:12,padding:"11px",background:calc?"linear-gradient(135deg,#2563eb,#1d4ed8)":"#374151",color:"#fff",border:"none",borderRadius:8,fontWeight:700,fontSize:14,cursor:calc?"pointer":"not-allowed"}}>
              {calc?"📊 Generate Estimate":"Enter dimensions above"}
            </button>
          </Card>

          {results&&<Card title="Cost Summary">
            <SRow label="Aluminium" value={fmt(results.alumAmount)}/>
            <SRow label="Glass" value={fmt(results.totalGlassAmount)}/>
            <SRow label="Hardware" value={fmt(results.hwAmount)}/>
            <SRow label="EPDM Rubber" value={fmt(results.epdmAmount)}/>
            <SRow label="Labour" value={fmt(results.labourAmount)}/>
            <SRow label="Transport" value={fmt(results.transport)}/>
            {results.powderAmount>0&&<SRow label="Powder Coating" value={fmt(results.powderAmount)}/>}
            <div style={{borderTop:"1px solid #2d6a9f",marginTop:8,paddingTop:8}}>
              <SRow label="Total (1 window)" value={fmt(results.total)} highlight/>
              {qty>1&&<SRow label={`Total (${qty} windows)`} value={fmt(results.total*qty)} highlight/>}
              <SRow label="Rate per sq.ft" value={fmt(results.sqftRate)}/>
            </div>
          </Card>}
        </div>

        {/* RIGHT */}
        <div>
          {!results&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:360,color:"#4b5563",textAlign:"center"}}>
            <div style={{fontSize:56,marginBottom:12}}>🪟</div>
            <div style={{fontSize:17,fontWeight:600,color:"#6b7280"}}>Configure & Calculate</div>
            <div style={{fontSize:13,marginTop:8,maxWidth:280,color:"#4b5563"}}>Select window type, enter dimensions, click Generate Estimate</div>
          </div>}
          {results&&<div>
            <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
              {["alum","glass","hardware","rubber","labour"].map(t=><button key={t} onClick={()=>setDetTab(t)} style={{padding:"6px 12px",borderRadius:6,border:"1px solid",cursor:"pointer",fontSize:12,fontWeight:600,background:detTab===t?"#1d4ed8":"#1e293b",borderColor:detTab===t?"#3b82f6":"#374151",color:detTab===t?"#fff":"#9ca3af",textTransform:"capitalize"}}>
                {t==="alum"?"Aluminium":t==="rubber"?"EPDM Rubber":t.charAt(0).toUpperCase()+t.slice(1)}
              </button>)}
            </div>
            {detTab==="alum"&&<Card title="Aluminium Sections">
              <div style={{overflowX:"auto"}}>
              <table>
                <thead><tr>{["Section","Size mm","Qty","Mtrs","Wt/m","Total kg","Amount"].map(h=><th key={h} style={{...S.th,textAlign:h==="Section"?"left":"right"}}>{h}</th>)}</tr></thead>
                <tbody>{results.sections.map((s,i)=><tr key={i}>
                  <td style={{...S.td,color:"#93c5fd"}}>{s.name}</td>
                  <td style={{...S.td,textAlign:"right"}}>{fmtN(s.size,0)}</td>
                  <td style={{...S.td,textAlign:"right"}}>{s.qty}</td>
                  <td style={{...S.td,textAlign:"right"}}>{fmtN(s.mtr)}</td>
                  <td style={{...S.td,textAlign:"right"}}>{s.weight}</td>
                  <td style={{...S.td,textAlign:"right"}}>{fmtN(s.kg)}</td>
                  <td style={{...S.td,textAlign:"right",color:"#4ade80"}}>{fmt(s.amount)}</td>
                </tr>)}</tbody>
              </table>
              </div>
              <div style={{marginTop:8,padding:"8px 12px",background:"#0d2137",borderRadius:6,fontSize:12}}>
                <div style={{display:"flex",justifyContent:"space-between"}}><span>Net Weight:</span><strong>{fmtN(results.totalWeight)} kg</strong></div>
                <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}><span>Wastage (10%):</span><strong>{fmtN(results.wastageKg)} kg</strong></div>
                <div style={{display:"flex",justifyContent:"space-between",marginTop:3,color:"#4ade80"}}><span>Aluminium Total:</span><strong>{fmt(results.alumAmount)}</strong></div>
              </div>
            </Card>}
            {detTab==="glass"&&<Card title="Glass Calculation">
              <div style={{overflowX:"auto"}}>
              <table>
                <thead><tr>{["Type","W mm","H mm","Sq.ft each","Qty","Total Sq.ft","Rate","Amount"].map(h=><th key={h} style={{...S.th,textAlign:h==="Type"?"left":"right"}}>{h}</th>)}</tr></thead>
                <tbody>{results.glasses.map((g,i)=><tr key={i}>
                  <td style={{...S.td,color:"#93c5fd"}}>{g.name}</td>
                  <td style={{...S.td,textAlign:"right"}}>{fmtN(g.sw,0)}</td>
                  <td style={{...S.td,textAlign:"right"}}>{fmtN(g.sh,0)}</td>
                  <td style={{...S.td,textAlign:"right"}}>{fmtN(g.sqftEach)}</td>
                  <td style={{...S.td,textAlign:"right"}}>{g.qty}</td>
                  <td style={{...S.td,textAlign:"right"}}>{fmtN(g.totalSqft)}</td>
                  <td style={{...S.td,textAlign:"right"}}>{g.name.includes("Net")?"₹35":"₹55"}</td>
                  <td style={{...S.td,textAlign:"right",color:"#4ade80"}}>{fmt(g.amount)}</td>
                </tr>)}</tbody>
              </table>
              </div>
              <div style={{marginTop:8,padding:"8px 12px",background:"#0d2137",borderRadius:6,fontSize:12}}>
                <div style={{display:"flex",justifyContent:"space-between",color:"#4ade80"}}><span>Total Glass:</span><strong>{fmt(results.totalGlassAmount)}</strong></div>
              </div>
            </Card>}
            {detTab==="hardware"&&<Card title="Hardware Items">
              <div style={{overflowX:"auto"}}>
              <table>
                <thead><tr>{["Item","Qty","Rate","Amount"].map(h=><th key={h} style={{...S.th,textAlign:h==="Item"?"left":"right"}}>{h}</th>)}</tr></thead>
                <tbody>
                  {results.hardware.map((h,i)=><tr key={i}>
                    <td style={{...S.td,color:"#93c5fd"}}>{h.name}{h.note&&<span style={{color:"#fbbf24",fontSize:10}}> {h.note}</span>}</td>
                    <td style={{...S.td,textAlign:"right"}}>{fmtN(Number(h.qty),2)} {h.unit||""}</td>
                    <td style={{...S.td,textAlign:"right"}}>₹{h.rate}</td>
                    <td style={{...S.td,textAlign:"right",color:"#4ade80"}}>{fmt(Number(h.qty)*h.rate)}</td>
                  </tr>)}
                  {results.lockType==="multiPoint"&&<tr style={{background:"#1e3a5f22"}}>
                    <td style={{...S.td,color:"#fbbf24"}}>Multi-Point Lock System</td>
                    <td colSpan={2} style={{...S.td,textAlign:"right",color:"#9ca3af",fontSize:11}}>Calculated</td>
                    <td style={{...S.td,textAlign:"right",color:"#4ade80"}}>{fmt(results.lockAmount)}</td>
                  </tr>}
                </tbody>
              </table>
              </div>
              <div style={{marginTop:8,padding:"8px 12px",background:"#0d2137",borderRadius:6,fontSize:12}}>
                <div style={{display:"flex",justifyContent:"space-between",color:"#4ade80"}}><span>Total Hardware:</span><strong>{fmt(results.hwAmount)}</strong></div>
              </div>
            </Card>}
            {detTab==="rubber"&&<Card title="EPDM Rubber Gaskets">
              <table>
                <thead><tr>{["Item","Running Feet","Rate/ft","Amount"].map(h=><th key={h} style={{...S.th,textAlign:h==="Item"?"left":"right"}}>{h}</th>)}</tr></thead>
                <tbody>{[{name:"Shutter EPDM (Width)",ft:results.epdmW},{name:"Track EPDM (H+W)",ft:results.trackEpdm},{name:"Shutter EPDM (Height)",ft:results.epdmH}].map((r,i)=><tr key={i}>
                  <td style={{...S.td,color:"#93c5fd"}}>{r.name}</td>
                  <td style={{...S.td,textAlign:"right"}}>{fmtN(r.ft)}</td>
                  <td style={{...S.td,textAlign:"right"}}>₹10</td>
                  <td style={{...S.td,textAlign:"right",color:"#4ade80"}}>{fmt(r.ft*10)}</td>
                </tr>)}</tbody>
              </table>
              <div style={{marginTop:8,padding:"8px 12px",background:"#0d2137",borderRadius:6,fontSize:12}}>
                <div style={{display:"flex",justifyContent:"space-between"}}><span>Total:</span><strong>{fmtN(results.totalEpdmFt)} rft</strong></div>
                <div style={{display:"flex",justifyContent:"space-between",marginTop:3,color:"#4ade80"}}><span>EPDM Total:</span><strong>{fmt(results.epdmAmount)}</strong></div>
              </div>
            </Card>}
            {detTab==="labour"&&<Card title="Labour & Final Summary">
              <table>
                <tbody>
                  <tr style={{borderBottom:"1px solid #1e293b"}}>
                    <td style={{...S.td,color:"#93c5fd"}}>Window Labour ({results.type.tracks} Track)</td>
                    <td style={{...S.td,textAlign:"right"}}>{fmtN(results.labourSqFt)} sq.ft × ₹{results.labourRate}</td>
                    <td style={{...S.td,textAlign:"right",color:"#4ade80"}}>{fmt(results.labourAmount)}</td>
                  </tr>
                  <tr>
                    <td style={{...S.td,color:"#93c5fd"}}>Transport</td>
                    <td style={{...S.td,textAlign:"right"}}>Fixed</td>
                    <td style={{...S.td,textAlign:"right",color:"#4ade80"}}>{fmt(results.transport)}</td>
                  </tr>
                </tbody>
              </table>
              <div style={{marginTop:14,padding:14,background:"linear-gradient(135deg,#1e3a5f,#0d2137)",borderRadius:8,border:"1px solid #2d6a9f"}}>
                <div style={{fontSize:13,fontWeight:700,color:"#93c5fd",marginBottom:10}}>Final Breakdown (per window)</div>
                {[["Aluminium",results.alumAmount],["Glass",results.totalGlassAmount],["Hardware",results.hwAmount],["EPDM Rubber",results.epdmAmount],["Labour + Transport",results.labourAmount+results.transport]].map(([l,v])=><div key={l} style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}><span style={{color:"#94a3b8"}}>{l}</span><span>{fmt(v)}</span></div>)}
                <div style={{borderTop:"1px solid #2d6a9f",marginTop:8,paddingTop:8,display:"flex",justifyContent:"space-between",fontSize:16,fontWeight:700}}><span style={{color:"#93c5fd"}}>TOTAL</span><span style={{color:"#4ade80"}}>{fmt(results.total)}</span></div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginTop:4,color:"#64748b"}}><span>Rate/sq.ft</span><span>{fmt(results.sqftRate)}</span></div>
                {qty>1&&<div style={{marginTop:10,padding:"8px 12px",background:"#0d2137",borderRadius:6,display:"flex",justifyContent:"space-between"}}>
                  <span style={{fontSize:13,color:"#fbbf24",fontWeight:700}}>Total for {qty} windows</span>
                  <span style={{fontSize:15,fontWeight:700,color:"#4ade80"}}>{fmt(results.total*qty)}</span>
                </div>}
              </div>
            </Card>}
          </div>}
        </div>
      </div>}
    </div>
  </div>;
}

function RatesPanel({rates,setRates}) {
  const [local,setLocal]=useState({...rates});
  const groups=[
    {title:"Material Rates",fields:[{key:"aluminium",label:"Aluminium (₹/kg)"},{key:"glass5mm",label:"5mm Glass (₹/sq.ft)"},{key:"mosquitoNet",label:"Mosquito Net (₹/sq.ft)"},{key:"epdmRubber",label:"EPDM Rubber (₹/rft)"},{key:"wastage",label:"Wastage (%)",pct:true}]},
    {title:"Labour & Others",fields:[{key:"labour2T",label:"Labour 2 Track (₹/sqft)"},{key:"labour3T",label:"Labour 3 Track (₹/sqft)"},{key:"transport",label:"Transport (₹ fixed)"},{key:"powderCoating",label:"Powder Coating (₹/sqft)"}]},
    {title:"Hardware Rates",fields:[{key:"bearing2T",label:"Bearing 2T (₹)"},{key:"bearing3T",label:"Bearing 3T (₹)"},{key:"concealedLock",label:"Concealed Lock 2T (₹)"},{key:"concealedLock3",label:"Concealed Lock 3T (₹)"},{key:"silicon",label:"Silicon (₹)"},{key:"antiDust",label:"Anti Dust (₹)"},{key:"bumpStopper",label:"Bump Stopper (₹)"},{key:"sticker",label:"Sticker (₹)"},{key:"kpaCover",label:"KPA Cover (₹)"},{key:"interlockCap",label:"Interlock Cap (₹)"},{key:"siliconLabour",label:"Silicon Labour (₹/sqft)"}]},
  ];
  return <div>
    <div style={{fontSize:18,fontWeight:700,color:"#93c5fd",marginBottom:16}}>⚙️ Rate Configuration</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:14}}>
      {groups.map(g=><div key={g.title} style={{...S.card}}>
        <div style={{fontSize:12,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:1,marginBottom:10,borderBottom:"1px solid #2d3748",paddingBottom:6}}>{g.title}</div>
        {g.fields.map(f=><div key={f.key} style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <label style={{fontSize:12,color:"#94a3b8",flex:1}}>{f.label}</label>
          <input type="number" value={f.pct?local[f.key]*100:local[f.key]} onChange={e=>setLocal(p=>({...p,[f.key]:f.pct?Number(e.target.value)/100:Number(e.target.value)}))}
            style={{...S.input,width:80,textAlign:"right",padding:"4px 8px"}}/>
        </div>)}
      </div>)}
    </div>
    <div style={{marginTop:14,display:"flex",gap:10}}>
      <button onClick={()=>setRates({...local})} style={{padding:"10px 24px",background:"#2563eb",color:"#fff",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer"}}>✓ Save Rates</button>
      <button onClick={()=>{setLocal({...DEFAULT_RATES});setRates({...DEFAULT_RATES});}} style={{padding:"10px 24px",background:"#374151",color:"#9ca3af",border:"1px solid #4b5563",borderRadius:8,fontWeight:600,cursor:"pointer"}}>Reset to Default</button>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
