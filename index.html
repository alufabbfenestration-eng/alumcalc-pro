<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo}=React;

// ─── SERIES DEFINITIONS ──────────────────────────────────────────────────────
// Each series has its own profile weights and supported window types
const SERIES = {
  "29slim": {
    id:"29slim", label:"29mm Slim", badge:"29S", color:"#3b82f6",
    wt:{ t2:1.317, t3:1.943, sH:0.942, sW:0.942, cap:1.17, kpa:1.063, slim:0.547, cc:0.532, msH:0.982, msW:0.982, mi:0.505, mc:0.144 },
    hasCap:true, hasKPA:true,
    types:["2T2S","3T3S","2T4SCO","3T6SCO","3T2S1N","3T4S2N"],
  },
  "25mm": {
    id:"25mm", label:"25mm Prestige", badge:"25P", color:"#8b5cf6",
    wt:{ t2:1.01, t3:1.238, sH:0.741, sW:0.741, cap:0.18, kpa:0.975, slim:0.461, csW:0.741 },
    hasCap:true, hasKPA:true,
    types:["2T2S","3T3S"],
  },
  "27mm": {
    id:"27mm", label:"27mm", badge:"27", color:"#10b981",
    wt:{ t2:0.725, t3:1.172, sH:0.716, sW:0.716, interlock:0.309 },
    hasCap:false, hasKPA:false,
    types:["2T2S","3T3S","3T2S1N"],
  },
  "35mm": {
    id:"35mm", label:"35mm", badge:"35", color:"#f59e0b",
    wt:{ t2:1.996, t3:2.809, sH:1.326, sW:1.326, kpa:1.063, slim:0.481, csW:1.326 },
    hasCap:false, hasKPA:true,
    types:["2T2S","3T3S"],
  },
  "37mm": {
    id:"37mm", label:"37mm", badge:"37", color:"#ef4444",
    wt:{ t2:1.84, t3:2.678, sH:1.364, sW:1.364, kpa:1.063, slim:0.689, csW:1.364 },
    hasCap:false, hasKPA:true,
    types:["2T2S","3T3S"],
  },
};

const ALL_TYPES = [
  {id:"2T2S",   label:"2 Track – 2 Shutter",                  tracks:2,sh:2,hasNet:false,co:false},
  {id:"3T3S",   label:"3 Track – 3 Shutter",                  tracks:3,sh:3,hasNet:false,co:false},
  {id:"2T4SCO", label:"2 Track – 4 Shutter (Centre Opening)", tracks:2,sh:4,hasNet:false,co:true},
  {id:"3T6SCO", label:"3 Track – 6 Shutter (Centre Opening)", tracks:3,sh:6,hasNet:false,co:true},
  {id:"3T2S1N", label:"3 Track – 2 Shutter + 1 Net",         tracks:3,sh:2,hasNet:true, co:false,nc:1},
  {id:"3T4S2N", label:"3 Track – 4 Shutter + 2 Net",         tracks:3,sh:4,hasNet:true, co:false,nc:2},
];

const COLORS=[
  {id:"white", label:"White",      hex:"#F0F0EB",ral:"RAL 9016",add:0},
  {id:"black", label:"Black",      hex:"#2a2a2a",ral:"RAL 9005",add:15},
  {id:"grey",  label:"Grey",       hex:"#8a8a8a",ral:"RAL 7040",add:12},
  {id:"custom",label:"Custom RAL", hex:"#c084fc",ral:"Custom",  add:25},
];

const DR={al:350,wst:.10,g5:55,net:35,ep:10,lb2:60,lb3:65,tr:100,pc:0,
  b2:80,b3:110,cl:90,cl3:210,mp:300,nh:45,tn:25,pr:23,crd:45,
  alp:5,wp:1,wd:7,fn:4,ws:3,bs:35,st:33,ad:45,si:185,kp:25,sl:3,ic:4.5};

const mf=m=>m/304.8;
const sf=(w,h)=>(w/304.8)*(h/304.8);
const fm=n=>"₹"+n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",");
const fn=(n,d=2)=>typeof n==="number"?n.toFixed(d):n;

// ─── CALCULATION ENGINE (multi-series) ───────────────────────────────────────
function doCalc(W,H,type,series,rates,lock,cid){
  const w=+W,h=+H;
  if(!w||!h||w<200||h<200)return null;
  const wt=series.wt;
  const isKPA=series.hasKPA&&h>1800;
  const tr=type.tracks,SH=type.sh,co=type.co,hn=type.hasNet,nc=type.nc||0;
  const secs=[];
  const add=(n,sz,q,weight)=>{
    const mtr=(sz/1000)*q,kg=mtr*weight,amt=kg*rates.al;
    secs.push({n,sz,q,mtr,wt:weight,kg,amt});
  };

  const tw=tr===2?wt.t2:wt.t3;
  add(tr+" Track W",w,2,tw);
  add(tr+" Track H",h,2,tw);

  let sw;
  if(!co){
    if(tr===2){
      // 2T2S: shutter W = (W-107)/2
      sw=(w-107)/2;
      add("Shutter Bottom",sw,4,wt.sW);
      add("Shutter H",h-85,SH,wt.sH);
    } else {
      // 3T3S: 2 shutters (W-106)/3, 1 centre (W-106)/3 - 23
      sw=(w-106)/3;
      add("Shutter Bottom 45+90",sw,4,wt.sW);
      add("Shutter H",h-85,2,wt.sH);
      add("Centre Shutter 90+90",sw-23,2,wt.csW||wt.sW);
    }
  } else {
    // Centre Opening
    sw=(w-136)/4;
    add("Shutter Bottom",sw,8,wt.sW);
    if(tr===3)add("Centre Shutter 90+90",sw-22,4,wt.csW||wt.sW);
    add("Shutter H",h-85,4,wt.sH);
  }

  // Track cap (only series that have it)
  if(series.hasCap)add("Track Cap Bottom",w-101,tr,wt.cap);

  // Interlocks
  let ikpa=co?(tr===2?2:4):(tr===2?1:2), islim=ikpa;
  if(!isKPA||!series.hasKPA) ikpa=0;

  if(series.id==="27mm"){
    // 27mm uses a single interlock profile
    add("Interlock",h-85,islim,wt.interlock);
  } else {
    if(ikpa>0)add("Interlock KPA",h-85,ikpa,wt.kpa);
    add("Interlock Slim",h-85,islim,wt.slim);
    if(co)add("Centre Clip",h-85,1,0.532);
  }

  // Mosquito net sections (only 29mm & 27mm)
  if(hn){
    add("Mesh Shutter H",h-85,nc,0.982);
    add("Mesh Top/Bottom",sw||(w-107)/2,nc*2,0.982);
    add("Mesh Interlock",h-85,nc,0.505);
    add("Mesh Clip H",h-103,nc*2,0.144);
    add("Mesh Clip W",(w/(SH/nc))-35,nc*2,0.144);
  }

  const twt=secs.reduce((s,x)=>s+x.kg,0);
  const wst=twt*rates.wst;
  const alAmt=(twt+wst)*rates.al;

  // Glass
  const glass=[];
  const gsw=co?sw-37:(tr===2?(w-107)/2:(w-106)/3)-37;
  const gsh=h-85-103;
  if(tr===2||!co){
    glass.push({n:"5mm Clear Glass",sw:gsw,sh:gsh,q:co?4:2});
    if(tr===3&&!co)glass.push({n:"5mm Clear (Centre)",sw:(w-106)/3-23+27,sh:gsh,q:1});
  }
  if(co&&tr===3)glass.push({n:"5mm Clear (Centre)",sw:sw-22+27,sh:gsh,q:2});
  if(hn)glass.push({n:"Mosquito Net SS304",sw:(w/SH)*nc,sh:h,q:nc,isNet:true});
  glass.forEach(g=>{g.sqe=sf(g.sw,g.sh);g.tsq=g.sqe*g.q;g.amt=g.tsq*(g.isNet?rates.net:rates.g5);});
  const glAmt=glass.reduce((s,g)=>s+g.amt,0);

  // Hardware
  const hw=[];
  const tSq=sf(w,h);
  const is3T=tr===3;
  hw.push({n:"Bearing",q:SH*2,r:is3T?rates.b3:rates.b2});
  hw.push({n:"Concealed Lock",q:Math.ceil(SH/2),r:is3T?rates.cl3:rates.cl,note:"OPT."});
  hw.push({n:"Wool Pile W",q:+(mf(w)*(tr===2?3:SH)).toFixed(2),r:rates.wp,u:"rft"});
  hw.push({n:"Wool Pile H",q:+(mf(h)*(tr===2?3:SH)).toFixed(2),r:rates.wp,u:"rft"});
  hw.push({n:"Water Drain Cap",q:tr===2?3:4,r:rates.wd});
  hw.push({n:"Fastener",q:SH*3,r:rates.fn});
  hw.push({n:"Wall Screw",q:SH*3,r:rates.ws});
  hw.push({n:"Bump Stopper",q:Math.ceil(SH/2),r:rates.bs});
  hw.push({n:"Sticker",q:SH*2,r:rates.st});
  hw.push({n:"Anti Dust",q:Math.ceil(SH/2),r:rates.ad});
  hw.push({n:"Silicon",q:1,r:rates.si});
  if(isKPA&&series.hasKPA)hw.push({n:"KPA Cover",q:ikpa*2,r:rates.kp});
  hw.push({n:"Silicon Labour",q:+tSq.toFixed(2),r:rates.sl,u:"sqft"});
  hw.push({n:"Interlock Cap",q:(ikpa+islim)*2,r:rates.ic});
  if(hn)hw.push({n:"Anti Lift Patti",q:4,r:rates.alp});
  const lockAmt=lock==="mp"?rates.mp*Math.ceil(SH/2)+(SH<=2?3:SH*1.5)*(rates.nh+rates.tn)+Math.ceil(h/1000)*rates.pr+Math.ceil(SH/2)*rates.crd:0;
  const hwAmt=hw.reduce((s,x)=>s+(+x.q)*x.r,0)+lockAmt;

  // EPDM
  const epW=mf(w)*SH,epH=mf(h)*SH,epT=(mf(w)+mf(h))*tr;
  let totEp=epW+epH+epT;
  if(hn)totEp+=mf(w/SH*nc+h)*nc;
  const epAmt=totEp*rates.ep;

  // Labour
  const lbR=tr===2?rates.lb2:rates.lb3,lbAmt=tSq*lbR;

  // Colour
  const color=COLORS.find(c=>c.id===cid)||COLORS[0];
  const pcR=(rates.pc||0)+color.add,pcAmt=pcR>0?tSq*pcR:0;

  const total=alAmt+glAmt+hwAmt+epAmt+lbAmt+rates.tr+pcAmt;
  return{w,h,type,series,tSq,secs,twt,wst,alAmt,glass,glAmt,hw,hwAmt,lockAmt,lock,epW,epH,epT,totEp,epAmt,lbR,lbAmt,pcAmt,pcR,color,transport:rates.tr,total,sqR:total/tSq,isKPA,ikpa,islim,sw};
}

// ─── WINDOW DIAGRAM ──────────────────────────────────────────────────────────
function WinDiag({type,colorHex,W,H,seriesColor}){
  const PW=300,PH=195,fr=12,pd=10;
  const iW=PW-pd*2,iH=PH-pd*2;
  const {tracks:tr,sh,co,hasNet:hn,nc=0}=type;
  const fc=colorHex||"#cccccc";
  const gc="#a8d8f0",nc2="#86efac";
  const dim=W&&H?W+" × "+H+" mm":"";
  const shAW=hn?iW*0.68:iW;
  const ntAW=hn?iW*0.32:0;
  const shPW=shAW/sh, ntPW=nc>0?ntAW/nc:0;
  const gy=pd+fr,gh=iH-fr*2;
  const arrow=i=>co?i<Math.floor(sh/2)?"←":"→":i%2===0?"←":"→";
  return(
    <svg viewBox={"0 0 "+PW+" "+(PH+26)} style={{width:"100%",maxWidth:340,display:"block",margin:"0 auto"}}>
      <rect x={0} y={0} width={PW} height={PH+26} fill="#0f1117" rx={8}/>
      <rect x={pd} y={pd} width={iW} height={iH} fill="none" stroke={fc} strokeWidth={fr} rx={2}/>
      {Array.from({length:sh},(_,i)=>{
        const px=pd+fr/2+i*shPW,pw=shPW,gx=px+4,gw=pw-8;
        return <g key={"s"+i}>
          <rect x={px} y={gy} width={pw} height={gh} fill="none" stroke={fc} strokeWidth={4} rx={1} opacity={.8}/>
          <rect x={gx+3} y={gy+3} width={gw-6} height={gh-6} fill={gc} opacity={.2} rx={1}/>
          <text x={gx+gw/2} y={gy+gh/2+5} textAnchor="middle" fill="#93c5fd" fontSize={14} opacity={.75}>{arrow(i)}</text>
          <text x={gx+gw/2} y={gy+gh-7} textAnchor="middle" fill="#475569" fontSize={7}>{"S"+(i+1)}</text>
        </g>;
      })}
      {hn&&Array.from({length:nc},(_,i)=>{
        const px=pd+fr/2+shAW+i*ntPW,pw=ntPW,gx=px+3,gw=pw-6;
        return <g key={"n"+i}>
          <rect x={px} y={gy} width={pw} height={gh} fill="#052e16" stroke={nc2} strokeWidth={3} rx={1}/>
          {Array.from({length:8},(_,j)=><line key={"h"+j} x1={gx+2} y1={gy+5+j*(gh-10)/7} x2={gx+gw-2} y2={gy+5+j*(gh-10)/7} stroke={nc2} strokeWidth={.8} opacity={.5}/>)}
          {Array.from({length:3},(_,j)=><line key={"v"+j} x1={gx+3+j*(gw-6)/2} y1={gy+3} x2={gx+3+j*(gw-6)/2} y2={gy+gh-3} stroke={nc2} strokeWidth={.8} opacity={.35}/>)}
          <text x={gx+gw/2} y={gy+gh/2-2} textAnchor="middle" fill={nc2} fontSize={9} fontWeight="bold">NET</text>
          <text x={gx+gw/2} y={gy+gh/2+9} textAnchor="middle" fill={nc2} fontSize={7} opacity={.8}>SS304</text>
        </g>;
      })}
      {hn&&<rect x={pd+fr/2+shAW-fr/2} y={gy-2} width={fr} height={gh+4} fill={fc} opacity={.9}/>}
      {Array.from({length:tr},(_,i)=><line key={i} x1={pd+fr} y1={pd+iH-fr/2-i*3} x2={PW-pd-fr} y2={pd+iH-fr/2-i*3} stroke={seriesColor||fc} strokeWidth={1.5} opacity={.35}/>)}
      {hn&&<>
        <rect x={pd} y={PH+5} width={9} height={7} fill={gc} opacity={.5} rx={1}/>
        <text x={pd+12} y={PH+11} fill="#94a3b8" fontSize={7}>Glass Shutter</text>
        <rect x={pd+80} y={PH+5} width={9} height={7} fill={nc2} opacity={.5} rx={1}/>
        <text x={pd+92} y={PH+11} fill="#94a3b8" fontSize={7}>Mosquito Net</text>
      </>}
      <text x={PW/2} y={PH+22} textAnchor="middle" fill="#64748b" fontSize={8.5}>{dim||type.label}</text>
    </svg>
  );
}

// ─── COLOR PICKER ────────────────────────────────────────────────────────────
function ColPicker({sel,onChange,sqf,baseR}){
  const [ral,setRal]=useState("");
  const col=COLORS.find(c=>c.id===sel)||COLORS[0];
  return <div>
    <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:8}}>
      {COLORS.map(c=><div key={c.id} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
        <div className={"sw"+(sel===c.id?" on":"")} style={{background:c.hex,boxShadow:c.id==="white"?"inset 0 0 0 1px #777":""}} onClick={()=>onChange(c.id)} title={c.label}/>
        <span style={{fontSize:9,color:"#94a3b8"}}>{c.label}</span>
        {c.add>0&&<span style={{fontSize:8,color:"#fbbf24"}}>{"+₹"+c.add}</span>}
      </div>)}
    </div>
    {sel==="custom"&&<div style={{marginBottom:8}}>
      <input value={ral} onChange={e=>setRal(e.target.value)} placeholder="Enter RAL code e.g. RAL 3020"
        style={{width:"100%",padding:"6px 10px",background:"#0f1117",border:"1px solid #374151",borderRadius:6,color:"#e2e8f0",fontSize:12}}/>
      <div style={{fontSize:10,color:"#64748b",marginTop:3}}>Custom RAL +₹25/sqft</div>
    </div>}
    {sqf>0&&<div style={{padding:"6px 10px",background:"#0d2137",borderRadius:6,fontSize:11,display:"flex",justifyContent:"space-between"}}>
      <span style={{color:"#94a3b8"}}>{"Powder Coating ("+fn(sqf)+" sqft × ₹"+((baseR||0)+col.add).toFixed(0)+")"}</span>
      <span style={{color:"#fbbf24",fontWeight:700}}>{fm(sqf*((baseR||0)+col.add))}</span>
    </div>}
  </div>;
}

// ─── LOGIN ───────────────────────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const [phone,setPhone]=useState("");
  const [otp,setOtp]=useState("");
  const [step,setStep]=useState("phone");
  const [sending,setSending]=useState(false);
  const [err,setErr]=useState("");
  const [sentOtp,setSentOtp]=useState("");
  const send=()=>{
    if(phone.length!==10||!/^\d+$/.test(phone)){setErr("Enter valid 10-digit number");return;}
    setErr("");setSending(true);
    const code=Math.floor(100000+Math.random()*900000).toString();
    setSentOtp(code);
    setTimeout(()=>{setSending(false);setStep("otp");alert("Demo OTP: "+code+"\n(Production: sent via SMS to +91 "+phone+")");},1400);
  };
  const verify=()=>{if(otp===sentOtp)onLogin(phone);else setErr("Incorrect OTP");};
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#0f1117,#0d2137)",padding:20}}>
      <div style={{width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{width:64,height:64,background:"linear-gradient(135deg,#3b82f6,#1d4ed8)",borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,margin:"0 auto 12px"}}>🪟</div>
          <div style={{fontSize:24,fontWeight:800,color:"#93c5fd"}}>AlumCalc Pro</div>
          <div style={{fontSize:12,color:"#64748b",marginTop:4}}>Alufabb Fenestration • 5 Series Calculator</div>
        </div>
        <div style={{background:"#1e293b",borderRadius:16,padding:28,border:"1px solid #2d3748"}}>
          {step==="phone"?<>
            <div style={{fontSize:17,fontWeight:700,color:"#e2e8f0",marginBottom:4}}>Login with Mobile</div>
            <div style={{fontSize:12,color:"#64748b",marginBottom:18}}>Enter 10-digit mobile number</div>
            <div style={{fontSize:11,color:"#64748b",fontWeight:600,marginBottom:5}}>Mobile Number</div>
            <div style={{display:"flex",gap:8,marginBottom:4}}>
              <div style={{padding:"10px 12px",background:"#0f1117",border:"1px solid #374151",borderRadius:8,color:"#94a3b8",fontSize:13,flexShrink:0}}>🇮🇳 +91</div>
              <input type="tel" maxLength={10} value={phone} onChange={e=>setPhone(e.target.value.replace(/\D/g,""))}
                placeholder="9876543210" onKeyDown={e=>e.key==="Enter"&&send()}
                style={{flex:1,padding:"10px 12px",background:"#0f1117",border:"1px solid #374151",borderRadius:8,color:"#e2e8f0",fontSize:16,letterSpacing:2}}/>
            </div>
            {err&&<div style={{fontSize:11,color:"#f87171",marginBottom:4}}>{err}</div>}
            <button onClick={send} disabled={sending}
              style={{width:"100%",marginTop:14,padding:"13px",background:sending?"#374151":"linear-gradient(135deg,#2563eb,#1d4ed8)",color:"#fff",border:"none",borderRadius:10,fontWeight:700,fontSize:14,cursor:sending?"not-allowed":"pointer"}}>
              {sending?"Sending...":"Send OTP →"}
            </button>
          </>:<>
            <div style={{fontSize:17,fontWeight:700,color:"#e2e8f0",marginBottom:4}}>Enter OTP</div>
            <div style={{fontSize:12,color:"#64748b",marginBottom:18}}>
              Sent to +91 {phone} &nbsp;<span style={{color:"#3b82f6",cursor:"pointer"}} onClick={()=>{setStep("phone");setOtp("");setErr("");}}>Change</span>
            </div>
            <input type="tel" maxLength={6} value={otp} onChange={e=>setOtp(e.target.value.replace(/\D/g,""))}
              placeholder="● ● ● ● ● ●" onKeyDown={e=>e.key==="Enter"&&verify()}
              style={{width:"100%",padding:"12px",background:"#0f1117",border:"1px solid #374151",borderRadius:8,color:"#e2e8f0",fontSize:24,letterSpacing:12,textAlign:"center"}}/>
            {err&&<div style={{fontSize:11,color:"#f87171",marginTop:5}}>{err}</div>}
            <button onClick={verify}
              style={{width:"100%",marginTop:14,padding:"13px",background:"linear-gradient(135deg,#059669,#047857)",color:"#fff",border:"none",borderRadius:10,fontWeight:700,fontSize:14,cursor:"pointer"}}>
              Verify & Login ✓
            </button>
            <div style={{textAlign:"center",marginTop:10,fontSize:12,color:"#64748b"}}>
              Didn't receive? <span style={{color:"#3b82f6",cursor:"pointer"}} onClick={send}>Resend OTP</span>
            </div>
          </>}
        </div>
        <div style={{textAlign:"center",marginTop:14,fontSize:11,color:"#374151"}}>For business use only • Alufabb Fenestration</div>
      </div>
    </div>

}

// ─── PDF ─────────────────────────────────────────────────────────────────────
function makePDF(r,qty,cName,pName){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const PW=210,m=15;let y=m;
  doc.setFillColor(13,33,55);doc.rect(0,0,PW,40,"F");
  doc.setTextColor(147,197,253);doc.setFontSize(20);doc.setFont("helvetica","bold");doc.text("ALUFABB FENESTRATION",m,18);
  doc.setFontSize(9);doc.setFont("helvetica","normal");doc.setTextColor(100,116,139);
  doc.text("Aluminium Window Specialists | "+r.series.label+" Series",m,26);
  doc.setFillColor(37,99,235);doc.rect(0,40,PW,10,"F");
  doc.setTextColor(255,255,255);doc.setFontSize(11);doc.setFont("helvetica","bold");
  doc.text("WINDOW ESTIMATE / QUOTATION",m,47);doc.text("Date: "+new Date().toLocaleDateString("en-IN"),PW-m-40,47);
  y=58;
  if(cName||pName){
    doc.setFillColor(30,41,59);doc.roundedRect(m,y,PW-m*2,18,2,2,"F");
    doc.setTextColor(147,197,253);doc.setFontSize(9);doc.setFont("helvetica","bold");
    if(cName)doc.text("Customer: "+cName,m+4,y+7);
    if(pName)doc.text("Project: "+pName,m+4,y+13);
    y+=22;
  }
  doc.setFillColor(30,41,59);doc.roundedRect(m,y,PW-m*2,32,2,2,"F");
  doc.setTextColor(147,197,253);doc.setFontSize(10);doc.setFont("helvetica","bold");doc.text("WINDOW SPECIFICATIONS",m+4,y+7);
  doc.setTextColor(226,232,240);doc.setFontSize(9);doc.setFont("helvetica","normal");
  doc.text("Series: "+r.series.label,m+4,y+14);doc.text("Width: "+r.w+" mm",m+95,y+14);
  doc.text("Type: "+r.type.label,m+4,y+20);doc.text("Height: "+r.h+" mm",m+95,y+20);
  doc.text("Area: "+fn(r.tSq)+" sq.ft",m+4,y+26);doc.text("Quantity: "+qty,m+95,y+26);
  doc.text("Color: "+r.color.label+" ("+r.color.ral+")",m+4,y+32);
  y+=36;
  doc.setTextColor(147,197,253);doc.setFontSize(10);doc.setFont("helvetica","bold");doc.text("COST BREAKDOWN",m,y+6);y+=10;
  doc.setFillColor(37,99,235);doc.rect(m,y,PW-m*2,7,"F");
  doc.setTextColor(255,255,255);doc.setFontSize(8);doc.setFont("helvetica","bold");
  doc.text("ITEM",m+3,y+5);doc.text("AMOUNT",PW-m-3,y+5,"right");y+=7;
  const rows=[["Aluminium (incl. wastage)",r.alAmt],["Glass",r.glAmt],["Hardware & Fittings",r.hwAmt],["EPDM Rubber",r.epAmt],["Labour",r.lbAmt],["Transport",r.transport]];
  if(r.pcAmt>0)rows.push(["Powder Coating – "+r.color.label,r.pcAmt]);
  rows.forEach((row,i)=>{
    doc.setFillColor(i%2===0?30:22,i%2===0?41:33,i%2===0?59:48);doc.rect(m,y,PW-m*2,6,"F");
    doc.setTextColor(226,232,240);doc.setFont("helvetica","normal");
    doc.text(row[0],m+3,y+4.5);doc.text(fm(row[1]),PW-m-3,y+4.5,"right");y+=6;
  });
  doc.setFillColor(13,33,55);doc.rect(m,y,PW-m*2,9,"F");
  doc.setTextColor(74,222,128);doc.setFontSize(10);doc.setFont("helvetica","bold");
  doc.text("TOTAL (per window)",m+3,y+6.5);doc.text(fm(r.total),PW-m-3,y+6.5,"right");y+=9;
  if(qty>1){
    doc.setFillColor(37,99,235);doc.rect(m,y,PW-m*2,9,"F");
    doc.setTextColor(255,255,255);doc.text("TOTAL FOR "+qty+" WINDOWS",m+3,y+6.5);doc.text(fm(r.total*qty),PW-m-3,y+6.5,"right");y+=9;
  }
  y+=4;doc.setTextColor(100,116,139);doc.setFontSize(8);doc.setFont("helvetica","normal");
  doc.text("Rate per sq.ft: "+fm(r.sqR),m,y);y+=12;
  doc.setFillColor(30,41,59);doc.roundedRect(m,y,PW-m*2,26,2,2,"F");
  doc.setTextColor(147,197,253);doc.setFontSize(9);doc.setFont("helvetica","bold");doc.text("TERMS & CONDITIONS",m+4,y+7);
  doc.setTextColor(148,163,184);doc.setFont("helvetica","normal");doc.setFontSize(8);
  doc.text("• This estimate is valid for 15 days from the date of issue.",m+4,y+13);
  doc.text("• 50% advance payment required to confirm order.",m+4,y+18);
  doc.text("• Prices subject to change based on market rates of aluminium.",m+4,y+23);
  doc.setFillColor(13,33,55);doc.rect(0,282,PW,15,"F");
  doc.setTextColor(100,116,139);doc.setFontSize(8);
  doc.text("Generated by AlumCalc Pro | ALUFABB FENESTRATION",PW/2,290,"center");
  doc.save("AlumCalc_"+r.series.label.replace(/ /g,"_")+"_"+new Date().toLocaleDateString("en-IN").replace(/\//g,"-")+".pdf");
}

                </tr>}
              </tbody></table></div>
              <div style={{marginTop:8,padding:"8px 12px",background:"#0d2137",borderRadius:6}}>
                <div style={{display:"flex",justifyContent:"space-between",fontWeight:700,color:"#4ade80",fontSize:13}}><span>Hardware Total</span><span>{fm(res.hwAmt)}</span></div>
              </div>
            </Card>}

            {dt==="rubber"&&<Card title="EPDM Rubber Gaskets">
              <table><thead><tr>{["Item","Running Feet","Rate/ft","Amount"].map(h=><th key={h} style={{...S.th,textAlign:h==="Item"?"left":"right"}}>{h}</th>)}</tr></thead>
              <tbody>{[{n:"Shutter EPDM Width",ft:res.epW},{n:"Track EPDM (H+W)",ft:res.epT},{n:"Shutter EPDM Height",ft:res.epH}].map((r,i)=><tr key={i}>
                <td style={{...S.td,color:"#93c5fd"}}>{r.n}</td>
                <td style={{...S.td,textAlign:"right"}}>{fn(r.ft)}</td>
                <td style={{...S.td,textAlign:"right"}}>₹10</td>
                <td style={{...S.td,textAlign:"right",color:"#4ade80"}}>{fm(r.ft*10)}</td>
              </tr>)}</tbody></table>
              <div style={{marginTop:8,padding:"8px 12px",background:"#0d2137",borderRadius:6}}>
                <SR label="Total" value={fn(res.totEp)+" rft"}/>
                <div style={{display:"flex",justifyContent:"space-between",fontWeight:700,color:"#4ade80",fontSize:13}}><span>EPDM Total</span><span>{fm(res.epAmt)}</span></div>
              </div>
            </Card>}

            {dt==="labour"&&<Card title="Labour & Transport">
              <table><tbody>
                <tr style={{borderBottom:"1px solid #1e293b"}}>
                  <td style={{...S.td,color:"#93c5fd"}}>{"Labour ("+res.type.tracks+" Track)"}</td>
                  <td style={{...S.td,textAlign:"right"}}>{fn(res.tSq)+" sqft × ₹"+res.lbR}</td>
                  <td style={{...S.td,textAlign:"right",color:"#4ade80"}}>{fm(res.lbAmt)}</td>
                </tr>
                <tr>
                  <td style={{...S.td,color:"#93c5fd"}}>Transport</td>
                  <td style={{...S.td,textAlign:"right"}}>Fixed</td>
                  <td style={{...S.td,textAlign:"right",color:"#4ade80"}}>{fm(res.transport)}</td>
                </tr>
              </tbody></table>
            </Card>}
          </div>}
        </div>
      </div>}
    </div>
  </div>;
}

function RatesPanel({rates,setRates}){
  const [loc,setLoc]=useState({...rates});
  const grps=[
    {t:"Material Rates",f:[{k:"al",l:"Aluminium (₹/kg)"},{k:"g5",l:"5mm Glass (₹/sqft)"},{k:"net",l:"Mosquito Net (₹/sqft)"},{k:"ep",l:"EPDM Rubber (₹/rft)"},{k:"wst",l:"Wastage (%)",pct:true}]},
    {t:"Labour & Others",f:[{k:"lb2",l:"Labour 2 Track (₹/sqft)"},{k:"lb3",l:"Labour 3 Track (₹/sqft)"},{k:"tr",l:"Transport (₹ fixed)"},{k:"pc",l:"Base Powder Coating (₹/sqft)"}]},
    {t:"Hardware",f:[{k:"b2",l:"Bearing 2T (₹)"},{k:"b3",l:"Bearing 3T (₹)"},{k:"cl",l:"Concealed Lock 2T (₹)"},{k:"cl3",l:"Concealed Lock 3T (₹)"},{k:"si",l:"Silicon (₹)"},{k:"ad",l:"Anti Dust (₹)"},{k:"bs",l:"Bump Stopper (₹)"},{k:"st",l:"Sticker (₹)"},{k:"kp",l:"KPA Cover (₹)"},{k:"ic",l:"Interlock Cap (₹)"},{k:"sl",l:"Silicon Labour (₹/sqft)"}]},
  ];
  return<div>
    <div style={{fontSize:17,fontWeight:700,color:"#93c5fd",marginBottom:16}}>⚙️ Rate Configuration</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(270px,1fr))",gap:14}}>
      {grps.map(g=><div key={g.t} style={S.card}>
        <div style={{fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:1,marginBottom:10,borderBottom:"1px solid #2d3748",paddingBottom:6}}>{g.t}</div>
        {g.f.map(f=><div key={f.k} style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:7}}>
          <label style={{fontSize:12,color:"#94a3b8",flex:1}}>{f.l}</label>
          <input type="number" value={f.pct?loc[f.k]*100:loc[f.k]} onChange={e=>setLoc(p=>({...p,[f.k]:f.pct?+e.target.value/100:+e.target.value}))}
            style={{...S.inp,width:78,textAlign:"right",padding:"4px 8px"}}/>
        </div>)}
      </div>)}
    </div>
    <div style={{marginTop:14,display:"flex",gap:10}}>
      <button onClick={()=>setRates({...loc})} style={{padding:"10px 22px",background:"#2563eb",color:"#fff",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer"}}>✓ Save Rates</button>
      <button onClick={()=>{setLoc({...DR});setRates({...DR});}} style={{padding:"10px 22px",background:"#374151",color:"#9ca3af",border:"1px solid #4b5563",borderRadius:8,fontWeight:600,cursor:"pointer"}}>Reset</button>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
