<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AlumCalc Pro – Aluminium Window Estimator</title>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-JPJ6GD2X9J"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-JPJ6GD2X9J');
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0f1117;color:#e2e8f0;font-family:'Segoe UI',sans-serif;min-height:100vh}
    select,input{outline:none}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-track{background:#1e293b}
    ::-webkit-scrollbar-thumb{background:#374151;border-radius:3px}
    table{border-collapse:collapse;width:100%}
    .color-swatch{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all 0.2s;flex-shrink:0}
    .color-swatch:hover{transform:scale(1.1)}
    .color-swatch.active{border-color:#3b82f6;transform:scale(1.15);box-shadow:0 0 0 2px #1e293b,0 0 0 4px #3b82f6}
    @media(max-width:700px){.main-grid{grid-template-columns:1fr!important}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .fade-in{animation:fadeIn 0.3s ease}
    .tab-btn{padding:6px 14px;border-radius:6px;border:1px solid;cursor:pointer;font-size:12px;font-weight:600;transition:all 0.2s}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useMemo, useRef} = React;

// ── CONSTANTS ────────────────────────────────────────────────────────────────
const COLORS = [
  {id:"white",   label:"White",       hex:"#F5F5F0", ralCode:"RAL 9016", priceAdd:0},
  {id:"black",   label:"Black",       hex:"#1a1a1a", ralCode:"RAL 9005", priceAdd:15},
  {id:"grey",    label:"Grey",        hex:"#8a8a8a", ralCode:"RAL 7040", priceAdd:12},
  {id:"customRAL",label:"Custom RAL", hex:"#c084fc", ralCode:"Custom",   priceAdd:25},
];

const DEFAULT_RATES = {
  aluminium:350,wastage:0.10,glass5mm:55,mosquitoNet:35,epdmRubber:10,
  labour2T:60,labour3T:65,transport:100,powderCoating:0,
  bearing2T:80,bearing3T:110,concealedLock:90,concealedLock3:210,
  multiPointSystem:300,nibHolder:45,tNib:25,polimaidRod:23,centerRodDevice:45,
  antiLift:5,woolPile:1,waterDrainageCap:7,fastner:4,wallScrew:3,
  bumpStopper:35,sticker:33,antiDust:45,silicon:185,kpaCover:25,
  siliconLabour:3,interlockCap:4.5,meshClipH:5,meshClipW:5,
};

const WEIGHTS = {
  track2:1.317,track3:1.943,shutterH:0.942,shutterW:0.942,
  trackCap:1.17,interlockKPA:1.063,interlockSlim:0.547,centerClip:0.532,
  meshShutterH:0.982,meshShutterW:0.982,meshInterlock:0.505,meshClip:0.144,
};

const WINDOW_TYPES = [
  {id:"2T2S",    label:"2 Track – 2 Shutter",                    tracks:2,shutters:2,hasNet:false,centerOpening:false},
  {id:"3T3S",    label:"3 Track – 3 Shutter",                    tracks:3,shutters:3,hasNet:false,centerOpening:false},
  {id:"2T4S_CO", label:"2 Track – 4 Shutter (Centre Opening)",   tracks:2,shutters:4,hasNet:false,centerOpening:true},
  {id:"3T6S_CO", label:"3 Track – 6 Shutter (Centre Opening)",   tracks:3,shutters:6,hasNet:false,centerOpening:true},
  {id:"3T2S1N",  label:"3 Track – 2 Shutter + 1 Mosquito Net",  tracks:3,shutters:2,hasNet:true,netCount:1,centerOpening:false},
  {id:"3T4S2N",  label:"3 Track – 4 Shutter + 2 Mosquito Net",  tracks:3,shutters:4,hasNet:true,netCount:2,centerOpening:false},
];

// ── HELPERS ──────────────────────────────────────────────────────────────────
const mmToFt = mm=>mm/304.8;
const sqFt   = (w,h)=>(w/304.8)*(h/304.8);
const fmt    = n=>typeof n==="number"?"₹"+n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,","):n;
const fmtN   = (n,d=2)=>typeof n==="number"?n.toFixed(d):n;

// ── CALCULATION ENGINE ───────────────────────────────────────────────────────
function calcWindow(W,H,type,rates,lockType,colorId){
  const w=Number(W),h=Number(H);
  if(!w||!h||w<100||h<100) return null;
  const isKPA=h>1800,tracks=type.tracks,shutters=type.shutters,co=type.centerOpening,hasNet=type.hasNet,netCount=type.netCount||0;
  const sections=[];
  const add=(name,size,qty,weight)=>{
    const mtr=(size/1000)*qty,kg=mtr*weight,amount=kg*rates.aluminium;
    sections.push({name,size,qty,mtr,weight,kg,amount});
  };
  const tw=tracks===2?WEIGHTS.track2:WEIGHTS.track3;
  add(`${tracks} Track W`,w,2,tw);
  add(`${tracks} Track H`,h,2,tw);
  let swSize;
  if(!co){
    swSize=tracks===2?(w-107)/2:(w-106)/3;
    add("Shutter Bottom 45+90",swSize,4,WEIGHTS.shutterW);
    add("Shutter H 45+45",h-85,tracks===2?shutters:2,WEIGHTS.shutterH);
    if(tracks===3&&shutters===3) add("Centre Shutter 90+90",(w-106)/3-23,2,WEIGHTS.shutterW);
  } else {
    swSize=(w-136)/4;
    add("Shutter Bottom 45+90",swSize,8,WEIGHTS.shutterW);
    if(tracks===3) add("Centre Shutter 90+90",swSize-22,4,WEIGHTS.shutterW);
    add("Shutter H 45+45",h-85,4,WEIGHTS.shutterH);
  }
  add("Track Cap Bottom",w-101,tracks,WEIGHTS.trackCap);
  let ilKPA=co?(tracks===2?2:4):(tracks===2?1:2),ilSlim=ilKPA;
  if(!isKPA) ilKPA=0;
  if(ilKPA>0) add("Interlock KPA",h-85,ilKPA,WEIGHTS.interlockKPA);
  add("Interlock Slim",h-85,ilSlim,WEIGHTS.interlockSlim);
  if(co) add("Centre Clip",h-85,1,WEIGHTS.centerClip);
  if(hasNet){
    add("Mesh Shutter H",h-85,netCount,WEIGHTS.meshShutterH);
    add("Mesh Top/Bottom",swSize||(w-107)/2,netCount*2,WEIGHTS.meshShutterW);
    add("Mesh Interlock",h-85,netCount,WEIGHTS.meshInterlock);
    add("Mesh Clip H",h-103,netCount*2,WEIGHTS.meshClip);
    add("Mesh Clip W",(w/(shutters/netCount))-35,netCount*2,WEIGHTS.meshClip);
  }
  const totalWeight=sections.reduce((s,x)=>s+x.kg,0);
  const wastageKg=totalWeight*rates.wastage;
  const alumAmount=(totalWeight+wastageKg)*rates.aluminium;

  const glasses=[];
  const gsw=(co?swSize-37:(tracks===2?(w-107)/2:(w-106)/3)-37),gsh=h-85-103;
  glasses.push({name:"5mm Clear Glass",sw:gsw,sh:gsh,qty:co?(tracks===2?4:4):2});
  if(!co&&tracks===3&&shutters===3) glasses.push({name:"5mm Clear (Centre)",sw:(w-106)/3-23+27,sh:gsh,qty:1});
  if(co&&tracks===3) glasses.push({name:"5mm Clear (Centre)",sw:swSize-22+27,sh:gsh,qty:2});
  if(hasNet){const nsw=(w/shutters)*netCount,nsh=h;glasses.push({name:"Mosquito Net SS304",sw:nsw,sh:nsh,qty:netCount});}
  glasses.forEach(g=>{g.sqftEach=sqFt(g.sw,g.sh);g.totalSqft=g.sqftEach*g.qty;g.amount=g.totalSqft*(g.name.includes("Net")?rates.mosquitoNet:rates.glass5mm);});
  const totalGlassAmount=glasses.reduce((s,g)=>s+g.amount,0);

  const hardware=[];
  hardware.push({name:"Bearing",qty:shutters*2,rate:tracks===2?rates.bearing2T:rates.bearing3T});
  hardware.push({name:"Concealed Lock",qty:Math.ceil(shutters/2),rate:tracks===2?rates.concealedLock:rates.concealedLock3,note:"OPT."});
  const tSqFt=sqFt(w,h);
  hardware.push({name:"Wool Pile (W)",qty:+(mmToFt(w)*(tracks===2?3:shutters)).toFixed(2),rate:rates.woolPile,unit:"rft"});
  hardware.push({name:"Wool Pile (H)",qty:+(mmToFt(h)*(tracks===2?3:shutters)).toFixed(2),rate:rates.woolPile,unit:"rft"});
  hardware.push({name:"Water Drainage Cap",qty:tracks===2?3:4,rate:rates.waterDrainageCap});
  hardware.push({name:"Fastener",qty:shutters*3,rate:rates.fastner});
  hardware.push({name:"Wall Screw",qty:shutters*3,rate:rates.wallScrew});
  hardware.push({name:"Bump Stopper",qty:Math.ceil(shutters/2),rate:rates.bumpStopper});
  hardware.push({name:"Sticker",qty:shutters*2,rate:rates.sticker});
  hardware.push({name:"Anti Dust",qty:Math.ceil(shutters/2),rate:rates.antiDust});
  hardware.push({name:"Silicon",qty:1,rate:rates.silicon});
  if(isKPA) hardware.push({name:"KPA Cover",qty:ilKPA*2,rate:rates.kpaCover});
  hardware.push({name:"Silicon Labour",qty:+tSqFt.toFixed(2),rate:rates.siliconLabour,unit:"sqft"});
  hardware.push({name:"Interlock Cap",qty:(ilKPA+ilSlim)*2,rate:rates.interlockCap});
  if(hasNet) hardware.push({name:"Anti Lift Patti",qty:4,rate:rates.antiLift});
  const lockAmount=lockType==="multiPoint"?rates.multiPointSystem*Math.ceil(shutters/2)+(shutters<=2?3:shutters*1.5)*(rates.nibHolder+rates.tNib)+Math.ceil(h/1000)*rates.polimaidRod+Math.ceil(shutters/2)*rates.centerRodDevice:0;
  const hwAmount=hardware.reduce((s,h)=>s+Number(h.qty)*h.rate,0)+lockAmount;

  const epdmW=mmToFt(w)*shutters,epdmH=mmToFt(h)*shutters,trackEpdm=(mmToFt(w)+mmToFt(h))*tracks;
  let totalEpdmFt=epdmW+epdmH+trackEpdm;
  if(hasNet) totalEpdmFt+=mmToFt(w/shutters*netCount+h)*netCount;
  const epdmAmount=totalEpdmFt*rates.epdmRubber;

  const labourRate=tracks===2?rates.labour2T:rates.labour3T;
  const labourAmount=tSqFt*labourRate;

  // Color / powder coating
  const color=COLORS.find(c=>c.id===colorId)||COLORS[0];
  const powderRate=(rates.powderCoating||0)+color.priceAdd;
  const powderAmount=powderRate>0?tSqFt*powderRate:0;

  const total=alumAmount+totalGlassAmount+hwAmount+epdmAmount+labourAmount+rates.transport+powderAmount;
  return {w,h,type,totalSqFt:tSqFt,sections,totalWeight,wastageKg,alumAmount,glasses,totalGlassAmount,hardware,hwAmount,lockAmount,lockType,epdmW,epdmH,trackEpdm,totalEpdmFt,epdmAmount,labourSqFt:tSqFt,labourRate,labourAmount,powderAmount,powderRate,color,transport:rates.transport,total,sqftRate:total/tSqFt,isKPA,ilKPA,ilSlim,swSize};
}

// ── WINDOW DIAGRAM SVG ───────────────────────────────────────────────────────
function WindowDiagram({type, colorHex, width, height}){
  const W=260, H=200, frame=14, pad=10;
  const iW=W-pad*2, iH=H-pad*2;
  const tracks=type.tracks, shutters=type.shutters, co=type.centerOpening, hasNet=type.hasNet, netCount=type.netCount||0;
  const frameColor=colorHex||"#e0e0e0";
  const glassColor="#a8d8f0";
  const netColor="#c8e6c9";
  const dimLabel=width&&height?`${width}mm × ${height}mm`:"";

  // Calculate shutter panels
  const mainShutters=hasNet?shutters:shutters;
  const panelCount=hasNet?shutters+netCount:shutters;
  const panelW=iW/panelCount;

  const panels=[];
  for(let i=0;i<panelCount;i++){
    const isNet=hasNet&&i>=shutters;
    const x=pad+i*panelW;
    panels.push({x,w:panelW,isNet});
  }

  // Arrow direction alternates for sliding
  const getArrow=(i,co)=>{
    if(co){
      const half=Math.floor(shutters/2);
      return i<half?"←":"→";
    }
    return i%2===0?"←":"→";
  };

  return (
    <svg viewBox={`0 0 ${W} ${H+20}`} style={{width:"100%",maxWidth:320,display:"block",margin:"0 auto"}}>
      {/* Background */}
      <rect x={0} y={0} width={W} height={H+20} fill="#0f1117" rx={8}/>
      {/* Outer frame */}
      <rect x={pad} y={pad} width={iW} height={iH} fill={frameColor} rx={3} opacity={0.9}/>
      {/* Glass area */}
      <rect x={pad+frame} y={pad+frame} width={iW-frame*2} height={iH-frame*2} fill={glassColor} opacity={0.15} rx={1}/>

      {/* Panel dividers */}
      {panels.map((p,i)=>{
        const gx=p.x+frame/2, gy=pad+frame/2;
        const gw=p.w-frame/2, gh=iH-frame;
        return (
          <g key={i}>
            {/* Panel frame */}
            <rect x={p.x+(i===0?frame/2:0)} y={pad+frame/2} width={p.w-(i===0?frame/2:0)-(i===panelCount-1?frame/2:0)} height={iH-frame} fill={frameColor} rx={2} opacity={0.8}/>
            {/* Glass / net fill */}
            <rect x={gx+4} y={gy+4} width={gw-8} height={gh-8} fill={p.isNet?netColor:glassColor} opacity={p.isNet?0.4:0.3} rx={1}/>
            {/* Net hatching */}
            {p.isNet&&[...Array(6)].map((_,j)=>(
              <line key={j} x1={gx+4} y1={gy+4+j*(gh-8)/5} x2={gx+gw-4} y2={gy+4+j*(gh-8)/5} stroke="#4ade80" strokeWidth={0.5} opacity={0.5}/>
            ))}
            {/* Slide arrow */}
            {!p.isNet&&<text x={gx+gw/2} y={gy+gh/2+4} textAnchor="middle" fill={frameColor} fontSize={14} opacity={0.7}>{getArrow(i,co)}</text>}
            {p.isNet&&<text x={gx+gw/2} y={gy+gh/2+4} textAnchor="middle" fill="#4ade80" fontSize={9} opacity={0.8}>NET</text>}
          </g>
        );
      })}

      {/* Track lines at bottom */}
      {[...Array(tracks)].map((_,i)=>(
        <line key={i} x1={pad+frame} y1={H-pad-2-i*3} x2={W-pad-frame} y2={H-pad-2-i*3} stroke={frameColor} strokeWidth={1} opacity={0.4}/>
      ))}

      {/* Dimension label */}
      {dimLabel&&<text x={W/2} y={H+14} textAnchor="middle" fill="#64748b" fontSize={9}>{dimLabel}</text>}

      {/* Type label */}
      <text x={W/2} y={H+14} textAnchor="middle" fill="#64748b" fontSize={9}>{dimLabel||type.label}</text>
    </svg>
  );
}

// ── COLOR PICKER ─────────────────────────────────────────────────────────────
function ColorPicker({selected, onChange, sqft, baseRate}){
  const [ralInput, setRalInput]=useState("");
  return (
    <div>
      <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap",marginBottom:10}}>
        {COLORS.map(c=>(
          <div key={c.id} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
            <div className={`color-swatch${selected===c.id?" active":""}`}
              style={{background:c.hex,boxShadow:c.id==="white"?"inset 0 0 0 1px #555":""}}
              onClick={()=>onChange(c.id)} title={c.label}/>
            <span style={{fontSize:9,color:"#94a3b8",textAlign:"center"}}>{c.label}</span>
            {c.priceAdd>0&&<span style={{fontSize:8,color:"#fbbf24"}}>+₹{c.priceAdd}/sqft</span>}
          </div>
        ))}
      </div>
      {selected==="customRAL"&&(
        <div style={{marginTop:8}}>
          <input placeholder="Enter RAL code e.g. RAL 3020" value={ralInput} onChange={e=>setRalInput(e.target.value)}
            style={{width:"100%",padding:"6px 10px",background:"#0f1117",border:"1px solid #374151",borderRadius:6,color:"#e2e8f0",fontSize:12}}/>
          <div style={{fontSize:10,color:"#64748b",marginTop:4}}>Custom RAL adds ₹25/sqft. We'll confirm availability.</div>
        </div>
      )}
      {sqft>0&&(
        <div style={{marginTop:8,padding:"6px 10px",background:"#0d2137",borderRadius:6,fontSize:11,display:"flex",justifyContent:"space-between"}}>
          <span style={{color:"#94a3b8"}}>Powder Coating ({fmtN(sqft)} sqft × ₹{(baseRate+(COLORS.find(c=>c.id===selected)||COLORS[0]).priceAdd).toFixed(0)})</span>
          <span style={{color:"#fbbf24",fontWeight:700}}>{fmt(sqft*(baseRate+(COLORS.find(c=>c.id===selected)||COLORS[0]).priceAdd))}</span>
        </div>
      )}
    </div>
  );
}

// ── PDF GENERATOR ─────────────────────────────────────────────────────────────
function generatePDF(r, qty, customerName, projectName){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const W=210, margin=15;
  let y=margin;

  // Header background
  doc.setFillColor(13,33,55);
  doc.rect(0,0,W,40,"F");

  // Company name
  doc.setTextColor(147,197,253);
  doc.setFontSize(20);
  doc.setFont("helvetica","bold");
  doc.text("ALUFABB FENESTRATION",margin,18);
  doc.setFontSize(9);
  doc.setFont("helvetica","normal");
  doc.setTextColor(100,116,139);
  doc.text("Aluminium Window Specialists | 29mm Slim Series",margin,26);
  doc.text("📞 Contact us for installation & warranty",margin,32);

  // Quote title
  doc.setFillColor(37,99,235);
  doc.rect(0,40,W,10,"F");
  doc.setTextColor(255,255,255);
  doc.setFontSize(11);
  doc.setFont("helvetica","bold");
  doc.text("WINDOW ESTIMATE / QUOTATION",margin,47);
  doc.text(`Date: ${new Date().toLocaleDateString("en-IN")}`,W-margin-40,47);

  y=58;

  // Customer info box
  if(customerName||projectName){
    doc.setFillColor(30,41,59);
    doc.roundedRect(margin,y,W-margin*2,18,2,2,"F");
    doc.setTextColor(147,197,253);
    doc.setFontSize(9);
    doc.setFont("helvetica","bold");
    if(customerName){doc.text(`Customer: ${customerName}`,margin+4,y+7);}
    if(projectName){doc.text(`Project: ${projectName}`,margin+4,y+13);}
    y+=22;
  }

  // Window specs box
  doc.setFillColor(30,41,59);
  doc.roundedRect(margin,y,W-margin*2,28,2,2,"F");
  doc.setTextColor(147,197,253);
  doc.setFontSize(10);
  doc.setFont("helvetica","bold");
  doc.text("WINDOW SPECIFICATIONS",margin+4,y+7);
  doc.setTextColor(226,232,240);
  doc.setFontSize(9);
  doc.setFont("helvetica","normal");
  const col2=margin+95;
  doc.text(`Type: ${r.type.label}`,margin+4,y+14);
  doc.text(`Width: ${r.w} mm`,col2,y+14);
  doc.text(`Size: ${fmtN(r.totalSqFt)} sq.ft per window`,margin+4,y+20);
  doc.text(`Height: ${r.h} mm`,col2,y+20);
  doc.text(`Color: ${r.color.label} (${r.color.ralCode})`,margin+4,y+26);
  doc.text(`Quantity: ${qty} window${qty>1?"s":""}`,col2,y+26);
  y+=32;

  // Cost breakdown table
  doc.setTextColor(147,197,253);
  doc.setFontSize(10);
  doc.setFont("helvetica","bold");
  doc.text("COST BREAKDOWN",margin,y+6);
  y+=10;

  // Table header
  doc.setFillColor(37,99,235);
  doc.rect(margin,y,W-margin*2,7,"F");
  doc.setTextColor(255,255,255);
  doc.setFontSize(8);
  doc.setFont("helvetica","bold");
  doc.text("ITEM",margin+3,y+5);
  doc.text("AMOUNT",W-margin-3,y+5,"right");
  y+=7;

  const rows=[
    ["Aluminium Sections (incl. 10% wastage)",r.alumAmount],
    ["Glass (5mm Clear)",r.totalGlassAmount],
    ["Hardware & Fittings",r.hwAmount],
    ["EPDM Rubber Gaskets",r.epdmAmount],
    ["Labour Charges",r.labourAmount],
    ["Transport",r.transport],
  ];
  if(r.powderAmount>0) rows.push([`Powder Coating – ${r.color.label}`,r.powderAmount]);

  rows.forEach((row,i)=>{
    doc.setFillColor(i%2===0?30:22,i%2===0?41:33,i%2===0?59:48);
    doc.rect(margin,y,W-margin*2,6,"F");
    doc.setTextColor(226,232,240);
    doc.setFont("helvetica","normal");
    doc.text(row[0],margin+3,y+4.5);
    doc.text(fmt(row[1]),W-margin-3,y+4.5,"right");
    y+=6;
  });

  // Total row
  doc.setFillColor(13,33,55);
  doc.rect(margin,y,W-margin*2,9,"F");
  doc.setTextColor(74,222,128);
  doc.setFontSize(10);
  doc.setFont("helvetica","bold");
  doc.text("TOTAL (per window)",margin+3,y+6.5);
  doc.text(fmt(r.total),W-margin-3,y+6.5,"right");
  y+=9;

  if(qty>1){
    doc.setFillColor(37,99,235);
    doc.rect(margin,y,W-margin*2,9,"F");
    doc.setTextColor(255,255,255);
    doc.setFontSize(10);
    doc.text(`TOTAL FOR ${qty} WINDOWS`,margin+3,y+6.5);
    doc.text(fmt(r.total*qty),W-margin-3,y+6.5,"right");
    y+=9;
  }

  y+=4;
  doc.setTextColor(100,116,139);
  doc.setFontSize(8);
  doc.setFont("helvetica","normal");
  doc.text(`Rate per sq.ft: ${fmt(r.sqftRate)}`,margin,y);
  y+=12;

  // Terms
  doc.setFillColor(30,41,59);
  doc.roundedRect(margin,y,W-margin*2,28,2,2,"F");
  doc.setTextColor(147,197,253);
  doc.setFontSize(9);
  doc.setFont("helvetica","bold");
  doc.text("TERMS & CONDITIONS",margin+4,y+7);
  doc.setTextColor(148,163,184);
  doc.setFont("helvetica","normal");
  doc.setFontSize(8);
  doc.text("• This estimate is valid for 15 days from the date of issue.",margin+4,y+13);
  doc.text("• 50% advance payment required to confirm order.",margin+4,y+18);
  doc.text("• Prices subject to change based on market rates of aluminium.",margin+4,y+23);

  // Footer
  doc.setFillColor(13,33,55);
  doc.rect(0,282,W,15,"F");
  doc.setTextColor(100,116,139);
  doc.setFontSize(8);
  doc.text("Generated by AlumCalc Pro | ALUFABB FENESTRATION",W/2,290,"center");

  doc.save(`AlumCalc_Quote_${new Date().toLocaleDateString("en-IN").replace(/\//g,"-")}.pdf`);
}

// ── STYLES ────────────────────────────────────────────────────────────────────
const S={
  card:{background:"#1e293b",border:"1px solid #2d3748",borderRadius:12,padding:16},
  input:{width:"100%",padding:"8px 10px",background:"#0f1117",border:"1px solid #374151",borderRadius:6,color:"#e2e8f0",fontSize:13,boxSizing:"border-box"},
  select:{width:"100%",padding:"8px 10px",background:"#0f1117",border:"1px solid #374151",borderRadius:6,color:"#e2e8f0",fontSize:13},
  label:{fontSize:11,color:"#64748b",fontWeight:600,display:"block",marginBottom:4,marginTop:8},
  th:{padding:"6px 8px",color:"#64748b",fontWeight:600,fontSize:12,borderBottom:"1px solid #1e3a5f"},
  td:{padding:"6px 8px",fontSize:12,borderBottom:"1px solid #1e293b"},
};

function Card({title,children,style={}}){
  return <div style={{...S.card,...style}}>
    {title&&<div style={{fontSize:13,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:1,marginBottom:12,borderBottom:"1px solid #2d3748",paddingBottom:8}}>{title}</div>}
    {children}
  </div>;
}
function SRow({label,value,highlight,sub}){
  return <div style={{display:"flex",justifyContent:"space-between",fontSize:highlight?13:sub?11:12,fontWeight:highlight?700:400,marginBottom:5,color:highlight?"#4ade80":sub?"#64748b":"#e2e8f0"}}>
    <span style={{color:highlight?"#93c5fd":sub?"#64748b":"#94a3b8"}}>{label}</span><span>{value}</span>
  </div>;
}

      </div>}
    </div>

function RatesPanel({rates,setRates}){
  const [local,setLocal]=useState({...rates});

    {title:"Material Rates",fields:[{key:"aluminium",label:"Aluminium (₹/kg)"},{key:"glass5mm",label:"5mm Glass (₹/sq.ft)"},{key:"mosquitoNet",label:"Mosquito Net (₹/sq.ft)"},{key:"epdmRubber",label:"EPDM Rubber (₹/rft)"},{key:"wastage",label:"Wastage (%)",pct:true}]},
    {title:"Labour & Others",fields:[{key:"labour2T",label:"Labour 2 Track (₹/sqft)"},{key:"labour3T",label:"Labour 3 Track (₹/sqft)"},{key:"transport",label:"Transport (₹ fixed)"},{key:"powderCoating",label:"Base Powder Coating (₹/sqft)"}]},
    {title:"Hardware Rates",fields:[{key:"bearing2T",label:"Bearing 2T (₹)"},{key:"bearing3T",label:"Bearing 3T (₹)"},{key:"concealedLock",label:"Concealed Lock 2T (₹)"},{key:"concealedLock3",label:"Concealed Lock 3T (₹)"},{key:"silicon",label:"Silicon (₹)"},{key:"antiDust",label:"Anti Dust (₹)"},{key:"bumpStopper",label:"Bump Stopper (₹)"},{key:"sticker",label:"Sticker (₹)"},{key:"kpaCover",label:"KPA Cover (₹)"},{key:"interlockCap",label:"Interlock Cap (₹)"},{key:"siliconLabour",label:"Silicon Labour (₹/sqft)"}]},
  ];
  return <div>
    <div style={{fontSize:18,fontWeight:700,color:"#93c5fd",marginBottom:16}}>⚙️ Rate Configuration</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:14}}>
      {groups.map(g=><div key={g.title} style={{...S.card}}>
        <div style={{fontSize:12,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:1,marginBottom:10,borderBottom:"1px solid #2d3748",paddingBottom:6}}>{g.title}</div>
        {g.fields.map(f=><div key={f.key} style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>

          <input type="number" value={f.pct?local[f.key]*100:local[f.key]} onChange={e=>setLocal(p=>({...p,[f.key]:f.pct?Number(e.target.value)/100:Number(e.target.value)}))}

        </div>)}
      </div>)}
    </div>
    <div style={{marginTop:14,display:"flex",gap:10}}>
      <button onClick={()=>setRates({...local})} style={{padding:"10px 24px",background:"#2563eb",color:"#fff",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer"}}>✓ Save Rates</button>

        style={{padding:"10px 24px",background:"#374151",color:"#9ca3af",border:"1px solid #4b5563",borderRadius:8,fontWeight:600,cursor:"pointer"}}>Reset</button>
    </div>
  </div>;
}
