      const yr=+expiry.slice(0,4),mo=+expiry.slice(4,6)-1,dy=+expiry.slice(6,8);
      if(new Date(yr,mo,dy)<new Date())return null;

      if(serCode!=="A"){let i=0;while(i<serCode.length){const t=serCode.slice(i,i+2);if(ALL_S.includes(t)){series.push(t);i+=2;}else i++;}}
      return{tier,series};

  function hasSeries(lic,sid){

// CUT OPTIMISER TAB
// ═══════════════════════════════════════════════════════════════════════
const SAW_KERF = 3; // mm lost per cut
const OPTI_COLORS = ["#378ADD","#1D9E75","#D85A30","#D4537E","#BA7517","#634AB7","#0F6E56","#A32D2D","#856BBE","#2D8A6A"];

function getCutList(W, H, sid, tid){
  const s=SERIES[sid],t=TYPES.find(x=>x.id===tid);
  if(!s||!t)return[];
  const {tr,sh,co,net:hn,nc=1}=t;
  const cuts=[];
  const add=(sec,len,qty)=>cuts.push({sec,len:Math.round(len),qty});
  add("Track W",W,2); add("Track H",H,2);
  if(!co){
    if(tr===2){const sw=(W-107)/2;add("Shutter bot",sw,4);add("Shutter H",H-85,sh);}
    else{const sw=(W-106)/3;add("Shutter bot",sw,4);add("Shutter H",H-85,2);add("Centre shutter",sw-23,2);}
  }else{
    const sw=(W-136)/4;add("Shutter bot",sw,8);add("Shutter H",H-85,4);
    if(tr===3)add("Centre shutter",sw-22,4);
  }
  if(s.hasCap)add("Track cap",W-101,tr);
  const ilQ=co?(tr===2?2:4):(tr===2?1:2);
  if(sid==="27mm"){add("Interlock",H-85,ilQ);}
  else{if(s.hasKPA&&H>1800)add("Interlock KPA",H-85,ilQ);add("Interlock slim",H-85,ilQ);}
  if(hn){add("Mesh H",H-85,nc);add("Mesh W",(W/sh)*nc,nc*2);add("Mesh IL",H-85,nc);}
  return cuts;
}

function getGlassList(W, H, sid, tid){
  const s=SERIES[sid],t=TYPES.find(x=>x.id===tid);
  if(!s||!t)return[];
  const {tr,sh,co,net:hn,nc=1}=t;
  const glass=[];
  const gsw=co?(W-136)/4-37:(tr===2?(W-107)/2:(W-106)/3)-37;
  const gsh=H-85-103;
  glass.push({type:"5mm Clear Glass",W:Math.round(gsw),H:Math.round(gsh),qty:co?4:2});
  if(tr===3&&!co)glass.push({type:"5mm Clear (Centre)",W:Math.round((W-106)/3-23+27),H:Math.round(gsh),qty:1});
  if(co&&tr===3)glass.push({type:"5mm Clear (Centre)",W:Math.round((W-136)/4-22+27),H:Math.round(gsh),qty:2});
  if(hn)glass.push({type:"Mosquito Net SS304",W:Math.round((W/sh)*nc),H:Math.round(H),qty:nc});
  return glass;
}

function packBars(pieces, barLen){
  // Pack a single homogeneous list of pieces onto bars
  const sorted=[...pieces].sort((a,b)=>b.mm-a.mm);
  const bars=[];
  sorted.forEach(p=>{
    let placed=false;
    for(const bar of bars){
      const need=p.mm+(bar.cuts.length>0?SAW_KERF:0);
      if(bar.remaining>=need){bar.remaining-=need;bar.cuts.push({...p});placed=true;break;}
    }
    if(!placed)bars.push({remaining:barLen-p.mm,cuts:[{...p}]});
  });
  return bars;
}

// Map each cut section to its profile group
// Sections on the SAME bar must be the SAME extrusion profile
function getSectionGroup(sec){
  const s=sec.toLowerCase();
  if(s.includes("track w")||s.includes("track h"))        return "Track Profile";
  if(s.includes("shutter bot")||s.includes("shutter h"))  return "Shutter Profile";
  if(s.includes("centre shut"))                           return "Centre Shutter Profile";
  if(s.includes("track cap"))                             return "Track Cap";
  if(s.includes("interlock kpa"))                         return "Interlock KPA";
  if(s.includes("interlock slim")||s.includes("interlock")&&!s.includes("kpa")) return "Interlock Slim";
  if(s.includes("mesh h")||s.includes("mesh w"))          return "Mesh Frame";
  if(s.includes("mesh il"))                               return "Mesh Interlock";
  return sec; // fallback
}

function packBySection(allPieces, barLen){
  // Group pieces by their profile section
  const groups={};
  allPieces.forEach(p=>{
    const grp=getSectionGroup(p.sec);
    if(!groups[grp])groups[grp]=[];
    groups[grp].push(p);
  });
  // Pack each group independently
  const result={};
  Object.entries(groups).forEach(([grp,pieces])=>{
    result[grp]=packBars(pieces,barLen);
  });
  return result;
}
