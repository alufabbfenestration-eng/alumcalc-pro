<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#1d4ed8"/>
<title>Wind Load Calculator – AlumCalc Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f4f6fb;color:#1e2840;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
input,select{font-family:inherit;outline:none;background:#fff;border:1px solid #dde2ee;border-radius:6px;color:#1e2840;padding:7px 10px;font-size:12px;width:100%}
input:focus,select:focus{border-color:#2563eb;box-shadow:0 0 0 3px #dbeafe}
table{border-collapse:collapse;width:100%}
.card{background:#fff;border:1px solid #e4e8f0;border-radius:10px;padding:14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.lbl{font-size:11px;color:#6b7a99;font-weight:600;display:block;margin-bottom:3px;margin-top:8px}
.th{padding:7px 8px;font-size:11px;font-weight:700;color:#2563eb;background:#eff6ff;border-bottom:1px solid #dde8ff;text-align:left;white-space:nowrap}
.thr{padding:7px 8px;font-size:11px;font-weight:700;color:#2563eb;background:#eff6ff;border-bottom:1px solid #dde8ff;text-align:right;white-space:nowrap}
.td{padding:6px 8px;font-size:12px;border-bottom:1px solid #f0f2f8}
.tdr{padding:6px 8px;font-size:12px;border-bottom:1px solid #f0f2f8;text-align:right}
.tblwrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.g2{display:grid;grid-template-columns:320px 1fr;gap:14px}
.g2s{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:700px){.g2{grid-template-columns:1fr}.g2s{grid-template-columns:1fr}}

</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;color:#6b7a99"><div style="font-size:32px">⏳</div><div style="font-size:14px">Loading...</div></div></div>

<script type="text/babel">
const {useState}=React;

  // ── LICENSE CHECK ──────────────────────────────────────────────────────────
  const SK="acp_v2";
  function loadLic(){
    try{
      const d=JSON.parse(localStorage.getItem(SK)||"{}");
      const code=(d.licCode||"").trim().toUpperCase();
      if(!code)return null;
      const parts=code.split("-");
      if(parts.length!==4)return null;
      const tier=parts[0][0],expiry=parts[0].slice(1);
      const yr=+expiry.slice(0,4),mo=+expiry.slice(4,6)-1,dy=+expiry.slice(6,8);
      if(new Date(yr,mo,dy)<new Date())return null;
      const serCode=parts[2];
      const ALL_S=["29","25","27","35","37"];
      let series=serCode==="A"?ALL_S.slice():[];
      if(serCode!=="A"){let i=0;while(i<serCode.length){const t=serCode.slice(i,i+2);if(ALL_S.includes(t)){series.push(t);i+=2;}else i++;}}
      return{tier,series};
    }catch{return null;}
  }
  function hasSeries(lic,sid){
    if(!lic)return true;
    const map={"29slim":"29","25mm":"25","27mm":"27","35mm":"35","37mm":"37"};
    return(lic.series||[]).includes(map[sid]||sid.slice(0,2));
  }
  const uid=()=>Math.random().toString(36).slice(2,9);

  // ── SHARED HEADER ─────────────────────────────────────────────────────────
  function Header(){
    return React.createElement("div",{style:{background:"linear-gradient(135deg,#1d4ed8,#2563eb)",padding:"8px 14px",boxShadow:"0 2px 12px rgba(37,99,235,.3)",display:"flex",alignItems:"center",gap:10,marginBottom:0}},
      React.createElement("div",{style:{width:32,height:32,background:"rgba(255,255,255,.2)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}},'💨'),
      React.createElement("div",{style:{flex:1}},
        React.createElement("div",{style:{fontSize:14,fontWeight:800,color:"#fff"}},'💨 Wind Load Calculator'),
        React.createElement("div",{style:{fontSize:9,color:"rgba(255,255,255,.6)"}}, "AlumCalc Pro — Alufabb Fenestration")
      ),
      React.createElement("a",{href:"/",style:{padding:"5px 12px",borderRadius:6,border:"1px solid rgba(255,255,255,.3)",fontSize:11,fontWeight:600,color:"rgba(255,255,255,.9)",background:"transparent",textDecoration:"none"}},'← Back to App')
    );
  }


// ═══════════════════════════════════════════════════════════════════════
// WIND LOAD TAB
// ═══════════════════════════════════════════════════════════════════════
const WIND_ZONES=[
  {label:"Zone I",  Vb:33, cities:"Hyderabad, Bangalore, Chennai, Nagpur, Bhopal"},
  {label:"Zone II", Vb:39, cities:"Delhi, Mumbai, Kolkata, Pune, Ahmedabad, Jaipur, Lucknow, Surat"},
  {label:"Zone III",Vb:44, cities:"Bhubaneswar, Raipur, Patna, Ranchi, Guwahati"},
  {label:"Zone IV", Vb:47, cities:"Coastal Andhra, Odisha coast, Vishakhapatnam"},
  {label:"Zone V",  Vb:50, cities:"Cyclone zone — Coastal Tamil Nadu, parts of West Bengal"},
  {label:"Zone VI", Vb:55, cities:"Extreme cyclone — Andaman & Nicobar, Lakshadweep"},
];

const WIND_SERIES=[
  {id:"29slim",label:"29mm Slim",   color:"#2563eb",depth:29,wall:1.2,maxSpan:2000,cap:{1200:1200,1500:900, 1800:680, 2400:380},note:"Low-rise, up to 5 floors"},
  {id:"25mm",  label:"25mm Prestige",color:"#7c3aed",depth:25,wall:1.0,maxSpan:1800,cap:{1200:980, 1500:720, 1800:540, 2400:305},note:"Economy slim, up to 3 floors"},
  {id:"27mm",  label:"27mm",        color:"#059669",depth:27,wall:1.1,maxSpan:1900,cap:{1200:1050,1500:780, 1800:590, 2400:330},note:"Standard, up to 4 floors"},
  {id:"35mm",  label:"35mm",        color:"#d97706",depth:35,wall:1.4,maxSpan:2500,cap:{1200:1800,1500:1320,1800:1050,2400:600},note:"Heavy duty, up to 10 floors"},
  {id:"37mm",  label:"37mm",        color:"#dc2626",depth:37,wall:1.6,maxSpan:2800,cap:{1200:2200,1500:1600,1800:1280,2400:750},note:"Premium heavy, up to 15 floors"},
];

function windK2(h,tf){return Math.min(tf*Math.pow(Math.max(h,10)/10,0.14),1.45);}

function windCapAtSpan(ser,spanMm){
  const spans=Object.keys(ser.cap).map(Number).sort((a,b)=>a-b);
  if(spanMm<=spans[0])return ser.cap[spans[0]];
  if(spanMm>=spans[spans.length-1])return ser.cap[spans[spans.length-1]];
  for(let i=0;i<spans.length-1;i++){
    if(spanMm>=spans[i]&&spanMm<=spans[i+1]){
      const t=(spanMm-spans[i])/(spans[i+1]-spans[i]);
      return Math.round(ser.cap[spans[i]]+(ser.cap[spans[i+1]]-ser.cap[spans[i]])*t);
    }
  }
  return ser.cap[spans[spans.length-1]];
}

function WindTab({lic}){
  const [W,setW]=useState(1800);
  const [H,setH]=useState(1500);
  const [floor,setFloor]=useState(20);
  const [terrain,setTerrain]=useState(0.75);
  const [zone,setZone]=useState(1);

  const avSeries=WIND_SERIES.filter(s=>hasSeries(lic,s.id));

  const k2=windK2(floor,terrain);
  const z=WIND_ZONES[zone];
  const Vz=z.Vb*k2;
  const Pz=Math.round(0.6*Vz*Vz);
  const Pd=Math.round(Pz*1.5);
  const pdKpa=(Pd/1000).toFixed(3);

  const pdColor=Pd>1500?"#dc2626":Pd>900?"#d97706":"#2563eb";

  const inp2={background:"#fff",border:"1px solid #dde2ee",borderRadius:6,color:"#1e2840",padding:"7px 9px",fontSize:12,width:"100%"};

  return React.createElement("div",null,
    // ── TOP GRID ─────────────────────────────────────────────────────────
    React.createElement("div",{style:{display:"grid",gridTemplateColumns:"340px 1fr",gap:14,alignItems:"start"},className:"g2"},

      // LEFT — inputs
      React.createElement("div",null,
        React.createElement("div",{className:"card"},
          React.createElement("div",{style:{fontSize:11,fontWeight:700,color:"#6b7a99",textTransform:"uppercase",letterSpacing:.8,marginBottom:10,paddingBottom:8,borderBottom:"1px solid #eef0f8"}}),"🏗 Window & Site",

          React.createElement("div",{className:"g2s"},
            React.createElement("div",null,
              React.createElement("label",{className:"lbl",style:{marginTop:0}}),"Width (mm)",
              React.createElement("input",{type:"number",value:W,min:300,max:4000,onChange:e=>setW(+e.target.value),style:inp2})
            ),
            React.createElement("div",null,
              React.createElement("label",{className:"lbl",style:{marginTop:0}}),"Height (mm)",
              React.createElement("input",{type:"number",value:H,min:300,max:3000,onChange:e=>setH(+e.target.value),style:inp2})
            )
          ),

          React.createElement("label",{className:"lbl"}),"Floor / Height above ground",
          React.createElement("select",{value:floor,onChange:e=>setFloor(+e.target.value),style:inp2},
            [[5,"Ground – 1st floor (up to 10m)"],[10,"2nd – 3rd floor (10–15m)"],[20,"4th – 6th floor (15–30m)"],[50,"7th – 12th floor (30–50m)"],[100,"Above 12th floor (50m+)"]].map(([v,l])=>
              React.createElement("option",{key:v,value:v},l)
            )
          ),

          React.createElement("label",{className:"lbl"}),"Terrain Category (IS 875)",
          React.createElement("select",{value:terrain,onChange:e=>setTerrain(+e.target.value),style:inp2},
            [[1.00,"Category 1 — Open sea / coastal"],[0.88,"Category 2 — Open terrain (rural)"],[0.75,"Category 3 — Urban / suburbs"],[0.62,"Category 4 — Dense urban / city centre"]].map(([v,l])=>
              React.createElement("option",{key:v,value:v},l)
            )
          ),

          React.createElement("label",{className:"lbl"}),"Wind Zone — IS 875 Part 3",
          React.createElement("div",{style:{display:"flex",flexWrap:"wrap",gap:5,marginTop:6}},
            WIND_ZONES.map((z2,i)=>React.createElement("button",{key:i,onClick:()=>setZone(i),title:z2.cities,
              style:{padding:"4px 10px",borderRadius:99,border:"1px solid",fontSize:11,cursor:"pointer",fontWeight:600,
                background:zone===i?z2.Vb>47?"#fef2f2":z2.Vb>39?"#fffbeb":"#eff6ff":"transparent",
                borderColor:zone===i?z2.Vb>47?"#fca5a5":z2.Vb>39?"#fde68a":"#bfdbfe":"#e4e8f0",
                color:zone===i?z2.Vb>47?"#dc2626":z2.Vb>39?"#d97706":"#2563eb":"#6b7a99"
              }},z2.label+" ("+z2.Vb+"m/s)"))
          ),
          React.createElement("div",{style:{marginTop:8,fontSize:11,color:"#6b7a99",padding:"5px 8px",background:"#f8f9fb",borderRadius:6}}),z.cities
        ),

        // ── DESIGN PRESSURE CARD ─────────────────────────────────────────
        React.createElement("div",{className:"card"},
          React.createElement("div",{style:{fontSize:11,fontWeight:700,color:"#6b7a99",textTransform:"uppercase",letterSpacing:.8,marginBottom:10,paddingBottom:8,borderBottom:"1px solid #eef0f8"}}),"💨 Calculated Wind Pressure",
          [
            ["Basic wind speed Vb",z.Vb+" m/s",false],
            ["Height factor k2",k2.toFixed(3),false],
            ["Design wind speed Vz",Vz.toFixed(1)+" m/s",false],
            ["Basic pressure Pz = 0.6×Vz²",Pz+" Pa  /  "+(Pz/1000).toFixed(3)+" kPa",false],
          ].map(([l,v,hi])=>React.createElement("div",{key:l,style:{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid #f0f2f8",fontSize:12}},
            React.createElement("span",{style:{color:"#6b7a99"}}),l,
            React.createElement("span",{style:{fontWeight:600}}),v
          )),
          React.createElement("div",{style:{marginTop:10,padding:"12px 14px",background:"#f8f9fb",borderRadius:8,border:"1px solid #e4e8f0",display:"flex",justifyContent:"space-between",alignItems:"center"}},
            React.createElement("div",null,
              React.createElement("div",{style:{fontSize:11,color:"#6b7a99",marginBottom:2}}),"DESIGN PRESSURE Pd = Pz × 1.5",
              React.createElement("div",{style:{fontSize:10,color:"#6b7a99"}}),"Combined Cpe + Cpi for sliding windows"
            ),
            React.createElement("div",{style:{textAlign:"right"}},
              React.createElement("div",{style:{fontSize:24,fontWeight:800,color:pdColor}}),Pd+" Pa",
              React.createElement("div",{style:{fontSize:16,fontWeight:700,color:pdColor}}),pdKpa+" kPa"
            )
          ),
          React.createElement("div",{style:{marginTop:8,fontSize:11,color:"#6b7a99",lineHeight:1.5}}),
          "Window: "+W+"×"+H+"mm  ·  Critical span: "+H+"mm height"
        )
      ),

      // RIGHT — series result cards + table
      React.createElement("div",null,
        // Series capacity cards
        React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:14}},
          avSeries.map(ser=>{
            const cap=windCapAtSpan(ser,H);
            const ratio=Pd/cap;
            const ok=ratio<=1.0;
            const marginal=ratio>0.85&&ratio<=1.0;
            const pct=Math.min(100,Math.round(ratio*100));
            const fillColor=ok?(marginal?"#d97706":"#16a34a"):"#dc2626";
            const borderColor=ok?(marginal?"#fde68a":"#86efac"):"#fca5a5";
            const bgColor=ok?(marginal?"#fffbeb":"#f0fdf4"):"#fef2f2";
            const badgeBg=ok?(marginal?"#fffbeb":"#f0fdf4"):"#fef2f2";
            const badgeColor=ok?(marginal?"#92400e":"#166534"):"#991b1b";
            const badgeText=ok?(marginal?"⚠ Marginal":"✓ Safe"):"✗ Exceeds";
            return React.createElement("div",{key:ser.id,style:{background:"#fff",border:"1.5px solid "+borderColor,borderRadius:10,padding:"12px 10px",textAlign:"center",boxShadow:"0 1px 4px rgba(0,0,0,.04)"}},
              React.createElement("div",{style:{fontSize:13,fontWeight:700,color:ser.color,marginBottom:6}}),ser.label,
              React.createElement("div",{style:{display:"inline-block",padding:"3px 10px",borderRadius:99,fontSize:11,fontWeight:700,background:badgeBg,color:badgeColor,marginBottom:8}}),badgeText,
              // Gauge
              React.createElement("div",{style:{height:6,background:"#f0f2f8",borderRadius:3,overflow:"hidden",marginBottom:8}},
                React.createElement("div",{style:{height:"100%",width:pct+"%",background:fillColor,borderRadius:3,transition:"width .4s"}})
              ),
              React.createElement("div",{style:{fontSize:11,color:"#6b7a99",lineHeight:1.6}},
                React.createElement("div",null,
                  React.createElement("span",{style:{fontWeight:700,color:"#1e2840"}}),cap+" Pa",
                  React.createElement("br",null),
                  React.createElement("span",{style:{fontWeight:700,color:"#6b7a99",fontSize:10}}),(cap/1000).toFixed(3)+" kPa"
                ),
                React.createElement("div",{style:{color:"#9ba5bf",marginTop:2}}),"Usage: "+Math.round(ratio*100)+"%"
              )
            );
          })
        ),

        // Reference table
        React.createElement("div",{className:"card"},
          React.createElement("div",{style:{fontSize:11,fontWeight:700,color:"#6b7a99",textTransform:"uppercase",letterSpacing:.8,marginBottom:10,paddingBottom:8,borderBottom:"1px solid #eef0f8"}}),"📋 Capacity Reference Table",
          React.createElement("div",{className:"tblwrap"},
            React.createElement("table",null,
              React.createElement("thead",null,
                React.createElement("tr",{style:{background:"#eff6ff"}},
                  ["Series","Depth","1.2m span","1.5m span","1.8m span","2.4m span","Max span","Suitable for"].map((h,i)=>
                    React.createElement("th",{key:h,className:i>1&&i<7?"thr":"th",style:{whiteSpace:"nowrap"}},h)
                  )
                )
              ),
              React.createElement("tbody",null,
                avSeries.map((ser,i)=>{
                  const spans=[1200,1500,1800,2400];
                  const curCap=windCapAtSpan(ser,H);
                  const isCur=cap=>Math.abs(cap-curCap)<50;
                  return React.createElement("tr",{key:ser.id,style:{background:i%2===0?"#f8f9fc":"#fff"}},
                    React.createElement("td",{className:"td"},
                      React.createElement("div",{style:{display:"flex",alignItems:"center",gap:6}},
                        React.createElement("div",{style:{width:8,height:8,borderRadius:"50%",background:ser.color,flexShrink:0}}),
                        React.createElement("span",{style:{fontWeight:600}}),ser.label
                      )
                    ),
                    React.createElement("td",{className:"td",style:{color:"#6b7a99",fontSize:11}}),ser.depth+"mm/"+ser.wall+"mm",
                    ...spans.map(sp=>{
                      const v=ser.cap[sp];
                      const isActive=Math.abs(sp-H)<200;
                      return React.createElement("td",{key:sp,className:"tdr",style:{background:isActive?"#eff6ff":"transparent"}},
                        React.createElement("div",{style:{fontWeight:isActive?700:400,color:isActive?ser.color:"#1e2840",fontSize:12}}),v+" Pa",
                        React.createElement("div",{style:{fontSize:10,color:"#6b7a99"}}),(v/1000).toFixed(3)+" kPa"
                      );
                    }),
                    React.createElement("td",{className:"tdr",style:{color:"#6b7a99"}}),ser.maxSpan+" mm",
                    React.createElement("td",{className:"td",style:{fontSize:11,color:"#6b7a99"}}),ser.note
                  );
                })
              )
            )
          ),
          React.createElement("div",{style:{marginTop:10,fontSize:11,color:"#6b7a99",lineHeight:1.5,padding:"7px 10px",background:"#f8f9fb",borderRadius:6}}),
          "⚠ Values per IS 875 Part 3. 1 kPa = 1000 Pa. Actual capacity depends on glass thickness, fixing details & site conditions. Structural engineer sign-off required for high-rise & cyclone zones."
        )
      )
    )
  );
}



function App(){
  const lic=loadLic();
  return React.createElement("div",null,
    React.createElement(Header,null),
    React.createElement("div",{style:{maxWidth:1200,margin:"0 auto",padding:"12px 10px"}},
      React.createElement(WindTab,{lic})
    )
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body></html>
